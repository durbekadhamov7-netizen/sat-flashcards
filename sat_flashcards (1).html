designers included an imaginative purple and a deep red.","D":"Each Fashion Week, color consultants compile reports on the shades that have proved popular with fashion designers."},"a":"D"},{"s":"Rhetorical Synthesis","n":23,"p":"While researching a topic, a student has taken\nthe following notes:\n• Generally, an object will heat up when twisted.\n• The twisting of an object is known as torsion.\n• A 2019 study led by researchers Zunfeng Liu\nand Ray Baughman tested the torsional heating\nof various fibers.\n• When ethylene propylene diene monomer\n(EPDM) rubber fiber was twisted, its average\nsurface temperature increased by 12°C.\n• When four-ply nickel-titanium (NiTi) wire was\ntwisted, its average surface temperature\nincreased by 30.4°C.","q":"Which choice most effectively uses information from the given sentences to explain the concept of torsional heating?","o":{"A":"An object’s average surface temperature will generally change due to torsion.","B":"Torsional heating is the process by which an object increases in temperature when it is twisted.","C":"Researchers determined that when both fibers were twisted, the surface temperature of four-ply NiTi wire increased more than that of EPDM rubber.","D":"In 2019, researchers studied the effect of torsional heating on various fibers, like EPDM rubber and four-ply NiTi wire."},"a":"B"},{"s":"Rhetorical Synthesis","n":24,"p":"While researching a topic, a student has taken\nthe following notes:\n• A currency is a money system.\n• In 1999, Luxembourg adopted the euro as its\nofficial currency.\n• Most other countries in Europe have adopted\nthe euro.\n• In 1991, Peru adopted the sol as its official\ncurrency.\n• Peru is the only country to have adopted the\nsol.","q":"The student wants to emphasize the difference between the euro and the sol. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Like most countries in Europe, Luxembourg has adopted the euro as its official currency.","B":"Luxembourg and Peru do not share an official currency.","C":"A currency is a money system, like the euro in Luxembourg and the sol in Peru.","D":"The euro has been adopted by most European countries, whereas the sol has only been adopted by Peru."},"a":"D"},{"s":"Rhetorical Synthesis","n":25,"p":"While researching a topic, a student has taken\nthe following notes:\n• Yellowstone is a national park in the\nnorthwest United States.\n• In 1995, gray wolves were reintroduced into the\npark.\n• Since then, the number of gray wolves in the\npark has stabilized at roughly 100.\n• This number is believed to be the park’s\ncarrying capacity.\n• Carrying capacity describes the maximum\nnumber of a species that a specific environment’s\nresources can sustain over time.","q":"The student wants to specify the number of gray wolves in Yellowstone. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Gray wolves were reintroduced into Yellowstone, a national park in the northwest United States, in 1995.","B":"As of 1995, there were gray wolves living in Yellowstone, a national park in the northwest United States.","C":"The carrying capacity of an environment, such as Yellowstone, describes the maximum number of species that the environment can sustain over time.","D":"Yellowstone is a national park that has roughly 100 gray wolves living in it"},"a":"D"},{"s":"Rhetorical Synthesis","n":26,"p":"In a 2002 study, Delach and Kimmerer tested\nthe effect of plant litter on seedling emergence in\na grassland setting:\n• Plant litter includes dead leaves and other\nplant material.\n• The test site was a flooded grassland in the\nUnited States.\n• It was in a temperate midlatitude climate.\n• The researchers found that in these\nenvironmental conditions, the presence of plant\nlitter had a negative effect on seedling\nemergence.","q":"Which choice most effectively uses information from the given sentences to specify the characteristics of the test site?","o":{"A":"The test was conducted in the United States, in a flooded grassland with a temperate midlatitude climate.","B":"A study on the effects of plant litter on seedling emergence was conducted by Delach and Kimmerer in 2002.","C":"In a study, Delach and Kimmerer found that the presence of plant litter had a negative effect on seedling emergence.","D":"The researchers studied seedlings’ ability to sprout above ground and begin photosynthesis, given the presence of plant litter and certain environmental conditions."},"a":"A"},{"s":"Rhetorical Synthesis","n":27,"p":"While researching a topic, a student has taken\nthe following notes:\n• The Haystack Mountain School of Crafts\n(1961) is a building complex designed by\nAmerican architect Edward Larrabee Barnes.\n• It is located in Deer Isle, Maine.\n• It features a cluster of cedar-shingled buildings.\n• It is considered an impressive example of\ncritical regionalist architecture.","q":"Which choice most effectively uses information from the given sentences to emphasize the location of the Haystack Mountain School of Crafts?","o":{"A":"Those wishing to see the Haystack Mountain School of Crafts in person will have to travel to Deer Isle, Maine.","B":"A stunning example of critical regionalist architecture, Edward Larrabee Barnes’s Haystack Mountain School of Crafts features a cluster of cedar-shingled buildings.","C":"The architect responsible for designing the Haystack Mountain School of Crafts in Deer Isle, Maine, was Edward Larrabee Barnes.","D":"Edward Larrabee Barnes is known for designing a building complex that features a cluster of cedar-shingled buildings."},"a":"A"},{"s":"Rhetorical Synthesis","n":28,"p":"While researching a topic, a student has taken\nthe following notes:\n• A supercontinent is a single landmass made up\nof most or all of Earth’s continents.\n• Over time, continents merge together to form\nsupercontinents, which then break apart.\n• This process is believed to take hundreds of\nmillions of years and is known as the\nsupercontinent cycle.\n• Euramerica and Kenorland were\nsupercontinents.\n• Euramerica formed about 300 million years\nago.\n• Kenorland formed about 2.6 billion years ago.","q":"The student wants to specify when Euramerica formed. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The supercontinent Euramerica formed about 300 million years ago.","B":"Over hundreds of millions of years, the supercontinent cycle results in supercontinents forming and breaking apart.","C":"Euramerica was a supercontinent, a single landmass made up of most or all of Earth’s continents.","D":"Long ago, the Earth was home to supercontinents like Euramerica and Kenorland"},"a":"A"},{"s":"Rhetorical Synthesis","n":29,"p":"While researching a topic, a student has taken\nthe following notes:\n• Maya Lin is an American artist known for her\nmemorials and large-scale installation artworks.\n• She became famous in 1982 when she\ncompleted the Vietnam Veterans Memorial,\nwhich consists of two 246-foot granite walls.\n• She completed Water Line in 2006.\n• It is an installation composed of aluminum\ntubing that fills an entire gallery room.\n• She completed Seven Earth Mountain in 2015.\n• It is an installation composed of soil that fills\nan entire gallery room.","q":"Which choice most effectively uses information from the given sentences to emphasize a difference between Water Line and Seven Earth Mountain?","o":{"A":"After completing the Vietnam Veterans Memorial, Maya Lin completed Water Line, another large-scale work.","B":"The sprawling size of Maya Lin’s Vietnam Veterans Memorial is echoed in Water Line, a work made of aluminum tubing that fills an entire gallery room.","C":"Maya Lin’s Water Line is composed of aluminum tubing; Seven Earth Mountain, by contrast, is composed of soil.","D":"Maya Lin is known for her memorials and installation art, such as Water Line and Seven Earth Mountain."},"a":"C"},{"s":"Rhetorical Synthesis","n":30,"p":"While researching a topic, a student has taken\nthe following notes:\n• Richard Serra is an American artist.\n• He is known for his large metal sculptures.\n• His large sculpture Open Ended is made of\nweathering steel.\n• His large sculpture Strike: To Roberta and\nRudy is made of hot-rolled steel.","q":"Which choice most effectively uses information from the given sentences to emphasize a difference between the two sculptures?","o":{"A":"Open Ended and Strike: To Roberta and Rudy are both large metal sculptures by artist Richard Serra.","B":"Strike: To Roberta and Rudy is one of artist Richard Serra’s large metal sculptures.","C":"Artist Richard Serra is the creator of the weathering steel sculpture Open Ended.","D":"Open Ended is made from a different kind of steel than Strike: To Roberta and Rudy."},"a":"D"},{"s":"Rhetorical Synthesis","n":31,"p":"While researching a topic, a student has taken\nthe following notes:\n• A lever is a simple machine consisting of a\nrigid beam and a fulcrum.\n• The fulcrum is the point about which the beam\npivots.\n• The input force (effort) is the force applied to\nthe lever.\n• The output force (load) is the force that the\nlever exerts on another object.\n• In first-class levers, the fulcrum is located\nbetween the effort and the load.\n• In second-class levers, the load is located\nbetween the effort and the fulcrum.","q":"The student wants to contrast first-class levers and second-class levers. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"In levers, the effort is the force applied to the lever; the load, in contrast, is the force that the lever exerts on another object.","B":"In first-class and second-class levers, the fulcrum and the load are in different locations.","C":"First-class levers are simple machines consisting of a rigid beam and a fulcrum, but then again, the same is true of second-class levers.","D":"In first-class levers, the fulcrum is located between the effort and the load, but in second-class levers, the load is located between the effort and the fulcrum."},"a":"D"},{"s":"Rhetorical Synthesis","n":32,"p":"While researching a topic, a student has taken\nthe following notes:\n• Jean-Michel Basquiat was an American artist\nwho produced more than two thousand drawings\nand paintings.\n• Most of his works were completed in New York\nCity in the 1980s.\n• His work Mater was completed in 1982.\n• The work is composed of acrylic and oil stick\non canvas and measures 72 inches by 84 inches.\n• Mater was purchased by a private collection\nfor $5.8 million in a 2009 auction.","q":"Which choice most effectively uses information from the given sentences to emphasize the scope of Basquiat’s work?","o":{"A":"Mater is just one of more than two thousand drawings and paintings completed by American artist Jean-Michel Basquiat.","B":"Though artist Jean-Michel Basquiat completed most of his two thousand-plus drawings in the 1980s, his work Mater is composed of acrylic and oil stick on canvas.","C":"At an auction, artist Jean-Michel Basquiat’s Mater, composed of acrylic and oil stick on canvas, sold for $5.8 million.","D":"Decades after artist Jean-Michel Basquiat completed his work Mater, a private collection purchased it for $5.8 million."},"a":"A"},{"s":"Rhetorical Synthesis","n":33,"p":"While researching a topic, a student has taken\nthe following notes:\n• Calida Garcia Rawles is an African American\npainter.\n• She is known for her large-scale, hyperrealistic\npaintings depicting African American figures in\nwater.\n• The painting Lightness of Being ( 24 * 30 in)\ndepicts a young man with his arms outstretched\nfloating on the right side of the canvas.\n• Lost in the Shuffle (36 * 24in) depicts two\nyoung men with their arms outstretched floating\nin the bottom left and upper right corners of the\ncanvas.\n• She paints the water with vivid blue colors,\nincluding periwinkle and cobalt.\n• The mood in the paintings is placid.","q":"Which choice most effectively uses information from the given sentences to emphasize the location of the figures in Lost in the Shuffle?","o":{"A":"While the number of figures may differ, constant among Rawles’s hyperrealistic works is the placid mood that the paintings evoke.","B":"In Rawles’s painting Lost in the Shuffle, two young men are depicted in the bottom left and upper right corners of the canvas.","C":"At by inches, Rawles’s Lost in the Shuffle is even larger than the sizable 24- by-30-inch painting Lightness of Being.","D":"Rawles captures the water in paintings such as Lightness of Being and Lost in the Shuffle in vivid hues of periwinkle and cobalt."},"a":"B"},{"s":"Rhetorical Synthesis","n":34,"p":"While researching a topic, a student has taken\nthe following notes:\n• Documentary TV programs in the slow TV\ngenre consist of uninterrupted broadcasts of\nordinary events in real time.\n• Nordlandsbanen: Minutt for Minutt is a\nNorwegian slow TV program.\n• The 10-hour-long program documented a train\nride from Trondheim to Bodø.\n• It first aired in 2012.\n• In her book Spectacular Television: Exploring\nTelevisual Pleasure, British film scholar Helen\nWheatley writes that slow TV \"offers\n’unspectacular’ spectacle.\"","q":"The student wants to provide a specific example of a slow TV program. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"British film scholar Helen Wheatley writes about the slow TV genre in her book Spectacular Television: Exploring Televisual Pleasure.","B":"An example of the slow TV genre can be seen in Nordlandsbanen: Minutt for Minutt, a Norwegian show featuring an uninterrupted 10-hour real-time broadcast of a train ride from Trondheim to Bodø.","C":"Slow TV programs provide uninterrupted broadcasts of ordinary events, such as train rides, in real time.","D":"With their uninterrupted broadcasts, slow TV programs offer what film scholar Helen Wheatley calls the \"unspectacular’ spectacle\" of ordinary events occurring in real time."},"a":"B"},{"s":"Rhetorical Synthesis","n":35,"p":"While researching a topic, a student has taken\nthe following notes:\n• The poem “5 love haiku\" is by African\nAmerican writer Sonia Sanchez\n• It was published in her 2010 poetry book\nentitled Morning Haiku.\n• The poem is written as a sequence of five\nhaiku.\n• According to the book’s publisher, Penguin\nRandom House (PRH), the book “celebrates the\ngifts of life and mourns the deaths of revered\nAfrican American figures.”\n• According to Sanchez, she chose to write in the\nform of haiku because it helps “maintain memory\nand dignity.\"","q":"The student wants to provide an example of a poem from Morning Haiku. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Included in Sanchez’s poetry book Morning Haiku (2010),“love haiku” is a poem written as a sequence of five haiku.","B":"Sanchez chose to write in the form of the haiku because it helps “maintain memory and dignity.”","C":"The poetry book Morning Haiku “celebrates the gifts of life and mourns the deaths of revered African American figures.\"","D":"The poem by Sanchez is written as a sequence of five haiku."},"a":"A"},{"s":"Rhetorical Synthesis","n":36,"p":"While researching a topic, a student has taken\nthe following notes:\n• The Future of Nostalgia is a scholarly book by\nliterary theorist Svetlana Boym.\n• The book explores the concept of nostalgia\nfrom various angles.\n• Chapter 16 outlines the origins and use of the\nterm nostalgia.\n• Chapter 17 discusses various skeptics’ takes on\nthe concept of nostalgia.\n• In chapter 17, Boym writes, “The poethics of\nnostalgia combines estrangement and human\nsolidarity, affect and reflection.”","q":"The student wants to explain what Svetlana Boym writes about in chapter 16. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Literary theorist Svetlana Boym outlines the origins and use of the term nostalgia in chapter 16 of her book.","B":"As Svetlana Boym writes in the seventeenth chapter of her book, “The poethics of nostalgia combines estrangement and human solidarity, affect and reflection.”","C":"After outlining the origins and use of the term nostalgia, Svetlana Boym goes on to discuss various skeptics’ takes on the concept of nostalgia.","D":"Svetlana Boym’s The Future of Nostalgia explores the concept of nostalgia from various angles."},"a":"A"},{"s":"Rhetorical Synthesis","n":37,"p":"While researching a topic, a student has taken\nthe following notes:\n• Dinosaur fossil specimens can be found at\nscience museums all over the world.\n• A dinosaur fossil specimen nicknamed Jane is\nhoused at the Burpee Museum of Natural\nHistory and Culture in Rockford, Minois.\n• Jane, a Tyrannosaurus, lived in the Late\nCretaceous period.\n• A dinosaur fossil specimen nicknamed Fafnir\nis housed at the Science Museum of Minnesota\nin Saint Paul, Minnesota.\n• Fafnir, a Triceratops, lived in the Late\nCretaceous period.","q":"The student wants to emphasize a similarity between the two dinosaur fossil specimens. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Both the Tyrannosaurus fossil specimen Jane and the Triceratops fossil specimen Fafnir lived in the Late Cretaceous period.","B":"While the Tyrannosaurus fossil specimen Jane is in Rockford, Minois, the Triceratops fossil specimen Fafnir is in Saint Paul, Minnesota.","C":"The Burke Museum of Natural History is home to Jane, a Tyrannosaurus fossil specimen from the Late Cretaceous period.","D":"Dinosaur fossil specimens can be found at science museums all over the world, including in Rockford, Minois, and Saint Paul, Minnesota."},"a":"A"},{"s":"Rhetorical Synthesis","n":38,"p":"While researching a topic, a student has taken\nthe following notes:\n• Richard Serra is an American artist.\n• He is known for his large metal sculptures.\n• His sculpture Cycle is roughly 62 feet wide and\n56 feet tall.\n• It is made from weathering steel.","q":"Which choice most effectively uses information from the given sentences to emphasize the size of the sculpture?","o":{"A":"Richard Serra is an American artist known for his large metal sculptures.","B":"Cycle—a large metal sculpture by artist Richard Serra—stretches roughly 62 feet wide and 56 feet tall.","C":"American artist Richard Serra creates large sculptures from metals such as weathering steel.","D":"Richard Serra’s Cycle is made of weathering steel."},"a":"B"},{"s":"Rhetorical Synthesis","n":39,"p":"While researching a topic, a student has taken\nthe following notes:\n• In the 1930s, the Imperial Sugar Cane\nInstitute in India sought to limit the country’s\ndependence on imported sugarcane.\n• The institute enlisted botanist Janaki Ammal\nto breed a local variety of sugarcane.\n• She crossbred the imported sugarcane species\nSaccharum oficinarum with grasses native to\nIndia.\n• She succeeded in creating sugarcane hybrids\nwell suited to India’s climate.","q":"The student wants to emphasize Janaki Ammal’s achievement. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"By crossbreeding the imported sugarcane species Saccharum officinarum with grasses native to India, Ammal succeeded in creating sugarcane hybrids well suited to India’s climate.","B":"In the 1930s, the Imperial Sugar Cane Institute, which enlisted Ammal, sought to limit dependence on imported sugarcane.","C":"Ammal was enlisted by the Imperial Sugar Cane Institute at a time when a local variety of sugarcane needed to be produced.","D":"As part of efforts to breed a local variety of sugarcane, an imported sugarcane species called Saccharum officinarum was crossbred with grasses native to India."},"a":"A"},{"s":"Rhetorical Synthesis","n":40,"p":"While researching a topic, a student has taken\nthe following notes:\n• Documentary TV programs in the slow TV\ngenre consist of uninterrupted broadcasts of\nordinary events in real time.\n• All Aboard! The Sleigh Ride (running time: 2\nhour) is a British slow TV program that aired in\n2015.\n• It documented a sleigh ride along an arctic\npostal route.\n• Monsen: Minutt for Minutt (running time: 5\nhours) is a Norwegian slow TV program that\naired in 2020.\n• It documented a hike from Stigstuv to\nRauhelleren in Norway.","q":"The student wants to emphasize a similarity between the two TV programs. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"A prime example of the slow TV genre can be seen in All Aboard! The Sleigh Ride, a 2-hour British TV documentary program documenting a sleigh ride along an arctic postal route.","B":"While All Aboard! The Sleigh Ride depicts a sleigh ride along an arctic postal route, Monsen: Minutt for Minutt depicts a hike from Stigstuv to Rauhelleren in Norway.","C":"Compared to the 5-hour-long Monsen: Minutt for Minutt, the slow TV program All Aboard! The Sleigh Ride is relatively short, at hours.","D":"Documenting ordinary events in real time, All Aboard! The Sleigh Ride and Monsen: Minutt for Mintt are both documentary programs in the slow TV genre."},"a":"D"},{"s":"Rhetorical Synthesis","n":41,"p":"While researching a topic, a student has taken\nthe following notes:\n• In astronomy, the mass of stars can be\ndescribed in units called solar masses.\n• One solar mass is roughly equal to the mass of\nthe Sun.\n• The mass of the star Proxima Centauri is\n0.122 solar masses.\n• The mass of the star Sirius A is 2.063 solar\nmasses.","q":"The student wants to emphasize the mass of Sirius A. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The mass of stars, like Proxima Centauri, can be described in units called solar masses.","B":"In astronomy, the mass of stars can be described in units called solar masses, and one solar mass is roughly equal to the mass of the Sun.","C":"The Sun is more massive than Proxima Centauri, which has a mass of 0.122 solar masses.","D":"With a mass of 2.063 solar masses, Sirius A is more massive than the Sun."},"a":"D"},{"s":"Rhetorical Synthesis","n":42,"p":"While researching a topic, a student has taken\nthe following notes:\n• Dinosaur fossil specimens can be found at\nscience museums all over the world.\n• A dinosaur fossil specimen nicknamed Jane is\nhoused at the Burpee Museum of Natural\nHistory and Culture in Rockford, Minois.\n• Jane, a Tyrannosaurus, lived in the Late\nCretaceous period.\n• A dinosaur fossil specimen nicknamed Fafnir\nis housed at the Science Museum of Minnesota\nin Saint Paul, Minnesota.\n• Fafnir, a Triceratops, lived in the Late\nCretaceous period.","q":"The student wants to emphasize a similarity between the two dinosaur fossil specimens. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Both the Tyrannosaurus fossil specimen Jane and the Triceratops fossil specimen Fafnir lived in the Late Cretaceous period.","B":"While the Tyrannosaurus fossil specimen Jane is in Rockford, Minois, the Triceratops fossil specimen Fafnir is in Saint Paul, Minnesota.","C":"The Burke Museum of Natural History is home to Jane, a Tyrannosaurus fossil specimen from the Late Cretaceous period.","D":"Dinosaur fossil specimens can be found at science museums all over the world,including in Rockford, Minois, and Saint Paul, Minnesota."},"a":"A"},{"s":"Rhetorical Synthesis","n":43,"p":"While researching a topic, a student has taken\nthe following notes:\n• In astronomy, the mass of stars can be\ndescribed in units called solar masses.\n• One solar mass is roughly equal to the mass of\nthe Sun.\n• The mass of the star Proxima Centauri is\n0.122 solar masses.\n• The mass of the star Sirius A is 2.063 solar\nmasses.","q":"The student wants to emphasize the mass of Sirius A. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The mass of stars, like Proxima Centauri, can be described in units called solar masses.","B":"In astronomy, the mass of stars can be described in units called solar masses, and one solar mass is roughly equal to the mass of the Sun.","C":"The Sun is more massive than Proxima Centauri, which has a mass of 0.122 solar masses.","D":"With a mass of 2.063 solar masses, Sirius A is more massive than the Sun."},"a":"D"},{"s":"Rhetorical Synthesis","n":44,"p":"While researching a topic, a student has taken\nthe following notes:\n• Ynés Mexía was a Mexican American botanist.\n• Between 1917 and 1938, she collected over\n150,000 botanical samples throughout the\nAmericas.\n• She collected a sample of Achyrocline\nvauthieriana in Minas Gerais, Brazil, on May 3,\n1930.\n• She collected a sample of Vernonia liatroides\nin Jalisco, Mexico, on February 14, 1927.\n• These specimens are members of the\nAsteraceae family.\n• They can now be viewed online at the C.V.\nStarr Virtual Herbarium.","q":"Which choice most effectively uses information from the given sentences to emphasize when she collected both of the samples?","o":{"A":"Thousands of botanical samples collected by Ynés Mexía can now be found in one place: online at the C.V. Starr Virtual Herbarium.","B":"On May in 1930, Ynés Mexía added a new specimen to her growing collection of botanical samples: Achyrocline vauthieriana of the Asteraceae family.","C":"While both specimens collected by Ynés Mexía are members of the same family, Achyrocline vauthieriana was found in Minas Gerais and Vernonia liatroides was found in Jalisco.","D":"Ynés Mexía collected a sample of Achyrocline vauthieriana in May of 1930, after collecting Vernonia liatroides in February of 1927."},"a":"D"},{"s":"Rhetorical Synthesis","n":45,"p":"While researching a topic, a student has taken\nthe following notes:\n• The El Pinito Mountains are a mountain\nrange located in northwestern Mexico.\n• The range is one of the dozens of \"sky islands\"\nin the southwestern US and northwestern\nMexico.\n• A sky island is an isolated mountain range\nwhose environment differs drastically from that\nof the surrounding lowlands.\n• The US Forest Service (USFS) said, \"The\nmountains are ’islands’ surrounded by deserts\nthat are seas.\"\n• The USFS said, \"Each Sky Island is a unique\necosystem.\"","q":"The student wants to explain what a sky island is. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The USFS considers the El Pinito Mountains to be a \"unique ecosystem.\"","B":"The El Pinito Mountains are an isolated mountain range located in northwestern Mexico whose environment differs drastically from that of the surrounding lowlands.","C":"A sky island is an isolated mountain range, such as the El Pinito Mountains in northwestern Mexico, whose environment differs drastically from that of the surrounding lowlands","D":"The El Pinito Mountains, which are considered to be a sky island, are located in northwestern Mexico."},"a":"C"},{"s":"Rhetorical Synthesis","n":46,"p":"While researching a topic, a student has taken\nthe following notes:\n• In 1965, Yale University historians claimed\nthat a world map called the Vinland Map was\ndrawn in the fifteenth century.\n• Since that time, the map’s age has been the\nsubject of debate.\n• In 2021, researchers conducted a study to\nanalyze the elemental composition of the map’s\nink.\n• Their analysis revealed that the ink contains a\ntitanium compound not used in inks until the\n1920s.\n• The researchers concluded that the map was\ndrawn in the twentieth century.","q":"The student wants to present the study and its findings. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Given the debate about the Vinland Map’s age, researchers in 2021 conducted a study to analyze the elemental composition of the map’s ink.","B":"A study of the Vinland Map’s ink revealed that it contains a titanium compound not used in inks until the 1920s, indicating that the map was drawn in the twentieth century.","C":"The Vinland Map, believed by some to have been drawn in the fifteenth century, was the focus of a study.","D":"Aware that a certain titanium compound was not used in inks until the 1920s, researchers in studied the elemental composition of the Vinland Map’s ink."},"a":"B"},{"s":"Rhetorical Synthesis","n":47,"p":"While researching a topic, a student has taken\nthe following notes:\n• The University of Oslo in Oslo, Norway, is\nhome to a Foucault pendulum.\n• The pendulum consists of a weighted ball that\nswings at the end of a roughly 14- meter-long\ncable.\n• Like all Foucault pendulums, it dangles from a\nfixed point that ensures the swing path of the\npendulum doesn’t change.\n• To an observer, the swing path of a Foucault\npendulum appears to change over time because\nEarth rotates beneath it.\n• Foucault pendulums are used as a simple way\nto provide evidence of Earth’s rotation.","q":"The student wants to explain how a Foucault pendulum provides evidence of Earth’s rotation. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The Foucault pendulum at the University of Oslo in Oslo, Norway, swings on an unchanging path, but Earth rotates beneath it.","B":"A Foucault pendulum, which consists of a weighted ball at the end of a long cable, provides evidence of Earth’s rotation.","C":"Though it swings on an unchanging path, a Foucault pendulum appears to change its swing path over time because Earth rotates beneath it.","D":"In Oslo, Norway, a Foucault pendulum at the University of Oslo provides evidence of Earth’s rotation."},"a":"C"},{"s":"Rhetorical Synthesis","n":48,"p":"While researching a topic, a student has taken\nthe following notes:\n• Birds of Northern South America is an\nidentification guidebook by ornithologists Robin\nRestall, Clemencia Rodner, and Miguel Lentino.\n• It lists the thirty-five hummingbird species\nfound in Suriname.\n• The sooty-capped hermit is a large\nhummingbird found in Suriname.\n• It is identifiable by its distinctive facial\nmarkings and its long, black, curved bill.\n• The fiery-tailed awlbill is a small hummingbird\nfound in Suriname.\n• It is identifiable by its mostly dark green color\nand its short, black, upturned bill.","q":"Which choice most effectively uses information from the given sentences to emphasize a difference between the two birds?","o":{"A":"The sooty-capped hermit and the fiery-tailed awlbill are two of the thirty-five hummingbird species found in Suriname.","B":"Identifiable by its long, black, curved bill and its distinctive facial markings, the sooty-capped hermit is a large hummingbird found in Suriname.","C":"Though they share several traits in common, the sooty-capped hermit is larger than the fiery-tailed awlbill.","D":"The fiery-tailed awlbill is a small hummingbird identifiable by its mostly dark green color and its short, black, upturned bill."},"a":"C"},{"s":"Rhetorical Synthesis","n":49,"p":"While researching a topic, a student has taken\nthe following notes:\n• Iranian scholar Abu Rayhan al-Biruni studied\nEarth’s physical features.\n• He theorized that a large landmass existed west\nof Europe and east of Asia.\n• Al-Biruni published his landmass theory in\n1037 CE.","q":"The student wants to specify when al-Biruni published his landmass theory. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"In 1037 CE, al-Biruni published his theory that a large landmass existed west of Europe and east of Asia.","B":"Al-Biruni, who studied Earth’s physical features, published a theory about a large landmass.","C":"Al-Biruni was an Iranian scholar who studied Earth’s physical features.","D":"An Iranian scholar who studied Earth’s physical features, al-Biruni theorized that a large landmass existed west of Europe and east of Asia."},"a":"A"},{"s":"Rhetorical Synthesis","n":50,"p":"While researching a topic, a student has taken\nthe following notes:\n• The Mohs scale of mineral hardness is a\nten-point scale that orders minerals by hardness\nbased on their ability to scratch other minerals.\n• Minerals with larger numbers are harder than\nminerals with smaller numbers and can leave\nvisible scratches on them.\n• Minerals with smaller numbers are softer than\nminerals with larger numbers and cannot leave\nvisible scratches on them.\n• The mineral talc has a Mohs scale number of\n1.\n• The mineral fluorite has a Mohs scale number\nof 4.\n• The mineral quartz has a Mohs scale number\nof 7.","q":"The student wants to compare the hardness of talc and quartz. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The Mohs scale of mineral hardness can be used to order fluorite, talc, and quartz by their ability to scratch other minerals.","B":"A mineral with a Mohs number of 4, like fluorite, is harder than one with a Mohs number of 1, like talc.","C":"Quartz can leave visible scratches on fluorite, which is why quartz has a higher number than fluorite on the Mohs scale of mineral hardness.","D":"Quartz can leave visible scratches on talc, which means that quartz is harder than talc."},"a":"D"},{"s":"Rhetorical Synthesis","n":51,"p":"While researching a topic, a student has taken\nthe following notes:\n• Metztitlán is a municipality in the state of\nHidalgo, Mexico.\n• Municipalities are governmental regions\nresponsible for providing many public services to\ntheir residents.\n• One service they provide is water treatment.\n• Metztitlán’s population was 20,962 in 2020.\n• Hidalgo is divided into 84 municipalities.","q":"The student wants to provide an example of a public service that Metztitlán is responsible for. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Metztitlán, a governmental region in the state of Hidalgo, Mexico, provides public services to its residents.","B":"Metztitlán is one of municipalities in Hidalgo providing public services to their communities.","C":"In 2020, the municipality of Metztitlán had a population of 20,962.","D":"As a municipality, Metztitlán is responsible for providing water treatment to its residents."},"a":"D"},{"s":"Rhetorical Synthesis","n":52,"p":"While researching a topic, a student has taken\nthe following notes:\n• The human tongue contains taste receptors for\na rich, savory flavor called umami.\n• Umami is triggered by the compounds in a\nvariety of foods, including pork and tomato\npaste.\n• Participants in a study tasted a sample of\nmacrokelp, a type of brown seaweed.\n• They rated its umami intensity as moderate.\n• The participants tasted a sample of ma-konbu,\nanother type of brown seaweed.\n• They rated its umami intensity as high.","q":"The student wants to make a generalization about brown seaweed. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Macrokelp is a type of brown seaweed, as is ma-konbu.","B":"In a research study, participants tasted samples of macrokelp and ma-konbu, two types of brown seaweed.","C":"Participants in a study rated the umami intensity of various seaweeds.","D":"Some types of brown seaweed trigger umami flavor in human taste buds."},"a":"D"},{"s":"Rhetorical Synthesis","n":53,"p":"While researching a topic, a student has taken\nthe following notes:\n• The Paralympic Games are a series of\ninternational sporting events involving athletes\nwith an impairment.\n• A gold medal indicates that an athlete finished\nin first place.\n• Rolf Heinzmann competed as a Paralympic\nalpine skier from 1980 to 2002.\n• He won fourteen medals, twelve of which were\ngold.\n• Daniel Dias competed as a Paralympic\nswimmer from 2008 to 2020.\n• He won thirty-eight medals, twenty-five of\nwhich were gold.","q":"Which choice most effectively uses information from the given sentences to emphasize the number of gold medals won by Daniel Dias?","o":{"A":"In his career as a Paralympic swimmer, Daniel Dias won thirty-eight total medals; twenty- five of them were gold.","B":"Both multiple gold medalists, Rolf Heinzmann and Daniel Dias debuted at the Paralympic Games in 1980 and 2008, respectively.","C":"At the Paralympic Games, a gold medal indicates a first-place finish, and some accomplished athletes like Rolf Heinzmann have won many.","D":"An accomplished Paralympian with thirty- eight total medals, Daniel Dias competed as a swimmer from 2008 to 2020."},"a":"A"},{"s":"Rhetorical Synthesis","n":54,"p":"While researching a topic, a student has taken\nthe following notes:\n• Maya Lin is a US artist known for her\nmemorials and large-scale installation artworks.\n• She became famous in 1982 when she\ncompleted the Vietnam Veterans Memorial,\nwhich consists of two 246-foot granite walls.\n• She completed Water Line in 2006.\n• It is an installation composed of aluminum\ntubing that fills an entire gallery room.\n• She completed Seven Earth Mountain in 2015.\n• It is an installation composed of soil that fills\nan entire gallery room.","q":"Which choice most effectively uses information from the given sentences to emphasize a difference between Water Line and Seven Earth Mountain?","o":{"A":"Maya Lin’s Water Line is composed of aluminum tubing; Seven Earth Mountain, by contrast, is composed of soil.","B":"Maya Lin is known for her memorials and installation art, such as Water Line and Seven Earth Mountain.","C":"After completing the Vietnam Veterans Memorial, Maya Lin completed Water Line, another large-scale work.","D":"The sprawling size of Maya Lin’s Vietnam Veterans Memorial is echoed in Water Line, a work made of aluminum tubing that fills an entire gallery room."},"a":"A"},{"s":"Rhetorical Synthesis","n":55,"p":"While researching a topic, a student has taken\nthe following notes:\n• Scientists have long sought to determine the\norigin of glass in Chile’s Atacama Desert.\n• A 2017 study concluded that ancient grass fires\nhad melted the area’s sandy soil into glass.\n• In 2021, a different study revealed that the\nmineral signatures of glass samples were\nconsistent with the mineral signatures of comet\nsamples collected by NASA.\n• That study concluded that the glass had formed\nas a result of a cometary explosion close to the\ndesert’s surface.","q":"The student wants to describe how scientific understanding about the glass’s origin has evolved. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Mineral signatures of glass samples are consistent with those of comet samples collected by NASA, according to new research.","B":"A 2017 study concluded that ancient grass fires had caused the glass’s formation, but new research suggests that the glass formed as a result of a cometary explosion close to the desert’s surface.","C":"Scientists have long sought to determine the origin of the glass, with one study concluding that it formed when ancient grass fires melted the area’s sandy soil.","D":"Studies in 2017 and 2021 offered different explanations for the origin of glass."},"a":"B"},{"s":"Rhetorical Synthesis","n":56,"p":"While researching a topic, a student has taken\nthe following notes:\n• The Mohs scale of mineral hardness is a\nten-point scale that orders minerals by hardness\nbased on their ability to scratch other minerals.\n• Minerals with larger numbers are harder than\nminerals with smaller numbers and can leave\nvisible scratches on them.\n• Minerals with smaller numbers are softer than\nminerals with larger numbers and cannot leave\nvisible scratches on them.\n• The mineral apatite has a Mohs scale number\nof 5.\n• The mineral topaz has a Mohs scale number of\n8.\n• The mineral diamond has a Mohs scale\nnumber of 10.","q":"The student wants to compare the hardness of apatite and diamond. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"A mineral with a Mohs number of 8, like topaz, is harder than one with a Mohs number of 5, like apatite.","B":"The Mohs scale of mineral hardness can be used to order topaz, apatite, and diamond by their ability to scratch other minerals.","C":"Diamond can leave visible scratches on apatite, which means that diamond is harder than apatite.","D":"Diamond can leave visible scratches on topaz, which is why diamond has a higher number than topaz on the Mohs scale of mineral hardness."},"a":"C"},{"s":"Rhetorical Synthesis","n":57,"p":"While researching a topic, a student has taken\nthe following notes:\n• A copyright prevents a book’s contents from\nbeing reproduced (published) without permission\nfrom the copyright holder.\n• When a book’s copyright expires, the book\nenters the public domain.\n• Public domain books can be legally reproduced\nby anyone.\n• The Mother’s Recompense is a novel by Edith\nWharton.\n• It was published in 1925 and entered the public\ndomain on January 1, 2021 (ninety-six years\nlater).","q":"Which choice most effectively uses information from the given sentences to explain why The Mother’s Recompense entered the public domain?","o":{"A":"Once The Mother’s Recompense entered the public domain, anyone could publish its contents.","B":"The Mother’s Recompense, a novel by Edith Wharton, is freely available to the public.","C":"Before The Mother’s Recompense entered the public domain, only its copyright holder could give permission for others to reproduce its contents.","D":"The copyright to The Mother’s Recompense expired in 2021, causing the novel to enter the public domain."},"a":"D"},{"s":"Rhetorical Synthesis","n":58,"p":"While researching a topic, a student has taken\nthe following notes:\n• Cinematographers work with cameras and\nlighting.\n• They help translate film directors’ ideas into\nvisual images.\n• Biutiful (2010) was directed by Alejandro\nGonzález Iñárritu.\n• Rodrigo Prieto was the film’s cinematographer.","q":"Which choice most effectively uses information from the given sentences to emphasize Prieto’s role in helping to make Biutiful?","o":{"A":"In filmmaking, directors work with others to translate their ideas into the visual images that we encounter on the screen.","B":"Rodrigo Prieto and Alejandro González Iñárritu worked together on a 2010 film.","C":"As the cinematographer, Rodrigo Prieto worked with cameras and lighting to translate Alejandro González Iñárritu’s ideas into the visual images found in Biutiful.","D":"One example of Rodrigo Prieto’s work is Alejandro González Iñárritu’s film Biutiful (2010)."},"a":"C"},{"s":"Rhetorical Synthesis","n":59,"p":"While researching a topic, a student has taken\nthe following notes:\n• Sister cities are pairs of cities that form social\nor legal partnerships to promote each other’s\ncultures.\n• Previously known as \"town twinning\", the\nconcept of sister cities evolved in Europe after\nWorld War II as a way to repair bonds between\ncities.\n• Many cities in New York State maintain such\npartnerships with cities around the world.\n• Binghamton, New York, and Borovichi,\nRussia, became sister cities in 1990.","q":"Which choice most effectively uses information from the given sentences to emphasize the duration of Binghamton and Borovichi’s sister city relationship?","o":{"A":"As sister cities, Binghamton, New York, and Borovichi, Russia, have engaged in cultural exchange and partnership since 1990.","B":"Borovichi, which became a sister city–or \"twin town\"–to Binghamton, New York, is located in Russia.","C":"Despite their distance from each other, the sister cities of Binghamton, New York, and Borovichi, Russia, have enjoyed the same partnership as many other sister cities.","D":"Since the end of World War II, sister cities such as Binghamton, New York, and Borovichi, Russia, have continued to form social partnerships to promote each other’s cultures."},"a":"A"},{"s":"Rhetorical Synthesis","n":60,"p":"While researching a topic, a student has taken\nthe following notes:\n• In a 2012 study, Dybzinski and Tilman tested\nthe effect of plant litter on seedling emergence in\na grassland setting.\n• Plant litter includes dead leaves and other\nplant material.\n• The test site was a flooded grassland in the\nUnited States.\n• It was in a temperate midlatitude climate.\n• The researchers found that in these\nenvironmental conditions, the presence of plant\nlitter had a negative effect on seedling\nemergence.","q":"Which choice most effectively uses information from the given sentences to specify the test site’s climate?","o":{"A":"Dybzinski and Tilman tested the effect of dead leaves and other plant material on seedling emergence in the United States.","B":"In a study, Dybzinski and Tilman found that the presence of plant litter had a negative effect on seedling emergence.","C":"Dybzinski and Tilman’s study was conducted in a temperate midlatitude climate.","D":"A test was conducted in the United States to study the effect of plant litter on seedling emergence in a given climate."},"a":"C"},{"s":"Rhetorical Synthesis","n":61,"p":"While researching a topic, a student has taken\nthe following notes:\n• Thailand’s annual Songkran Water Festival is\nheld each April.\n• It marks Songkran, the traditional Thai New\nYear.\n• People splash and spray each other for fun at\nthe festival’s community-wide water fights.\n• In Bangkok, thousands gather along Silom\nRoad for the city’s largest water fight.\n• In Chiang Mai, thousands gather at a\nhistorical monument called the Tha Phae Gate\nfor the city’s largest water fight.","q":"The student wants to emphasize a similarity in how people in Bangkok and Chiang Mai celebrate Songkran. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"People in both Bangkok and Chiang Mai celebrate Songkran, but they don’t do so in exactly the same way.","B":"Each April, people in Thailand celebrate Songkran, the traditional Thai New Year.","C":"The largest water fight in Bangkok takes place along a city street, whereas the largest water fight in Chiang Mai takes place at a historical monument.","D":"In both Bangkok and Chiang Mai, thousands gather to celebrate Songkran with water fights."},"a":"D"},{"s":"Rhetorical Synthesis","n":62,"p":"While researching a topic, a student has taken\nthe following notes:\n• Grimanesa Amoros is a Peruvian American\nartist.\n• She is well known for her large-scale LED light\nsculptures.\n• Substancial (Phase 4) debuted in 2007 at the\nHudson River Community Health Center in\nPeekskill, New York.\n• It is made of iridescent multicolored LED\ndomes.\n• It occupies 2,816 cubic feet of space.","q":"Which choice most effectively uses information from the given sentences to emphasize when and where Substancial (Phase 4) debuted?","o":{"A":"Artist Grimanesa Amoros often works with light in her sculptures, which tend to be large in scale.","B":"Grimanesa Amoros is a Peruvian American artist who often works with LED light in her large-scale sculptures, such as Substancial (Phase 4) (2007).","C":"As is common of Grimanesa Amoros’s sculptures, the iridescent multicolored LED domes of Substancial (Phase 4) cut an imposing 2,816-cubic-foot figure when the piece debuted.","D":"In 2007, Grimanesa Amoros debuted Substantial (Phase 4) in Peekskill, New York."},"a":"D"},{"s":"Rhetorical Synthesis","n":63,"p":"While researching a topic, a student has taken\nthe following notes:\n• Marine biology is primarily the study of sea\nlife.\n• Mary Jane Rathbun was an American marine\nbiologist born in 1860.\n• She is known for her research on freshwater\ncrabs.\n• Ornithology is primarily the study of birds.\n• Emilie Snethlage was a German-Brazilian\nornithologist born in 1868.\n• She is known for her research on Brazilian\nbirds.","q":"Which choice most effectively uses information from the given sentences to emphasize a similarity between Rathbun and Snethlage?","o":{"A":"The marine biologist Mary Jane Rathbun was born in 1860, but ornithologist Emilie Snethlage was born later, in 1868.","B":"Marine biology and ornithology are just two examples of the myriad fields in which scientists can specialize.","C":"Mary Jane Rathbun conducted research on freshwater crabs; Emilie Snethlage, by contrast, is known for her research on Brazilian birds.","D":"Like marine biologist Mary Jane Rathbun, ornithologist Emilie Snethlage dedicated her scientific career to the study of living organisms."},"a":"D"},{"s":"Rhetorical Synthesis","n":64,"p":"While researching a topic, a student has taken\nthe following notes:\n• Dysphania pusilla is a plant species.\n• It was believed to be extinct until a living\nspecimen was identified in New Zealand in 2015.\n• Pseudorca crassidens is a mammal species.\n• It was believed to be extinct until a living\nspecimen was identified in Denmark in 1861.\n• They are considered Lazarus species.\n• \"Lazarus species\" is a term for living species of\norganisms that were once believed to be extinct.","q":"The student wants to specify where Dysphania pusilla was identified. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"In 1861, a living specimen of Pseudorca crassidens was found in Denmark.","B":"Previously believed to be extinct, a living specimen of Dysphania pusilla was identified in New Zealand.","C":"A living specimen of Dysphania pusilla, once believed to be extinct, was identified in 2015.","D":"Examples of Lazarus species can be found in Dysphania pusilla as well as Pseudorca crassidens."},"a":"B"},{"s":"Rhetorical Synthesis","n":65,"p":"While researching a topic, a student has taken\nthe following notes:\n• In 2022, University of Miami researchers\ndiscovered brine pools in the Gulf of Aqaba.\n• A brine pool is an underwater lake that sits on\nthe ocean floor.\n• The water in brine pools is three to eight times\nsaltier than the surrounding ocean.\n• The extreme saltiness of this water makes it\ntoxic to most sea life.\n• Some forms of bacteria are able to survive in\nbrine pools.","q":"The student wants to explain why brine pools are toxic to most sea life. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The brine pools in the Gulf of Aqaba are toxic to most sea life and were discovered by researchers in 2022.","B":"The water in brine pools is toxic to most sea life because it is three to eight times saltier than the surrounding ocean.","C":"The discovery of brine pools in the Gulf of Aqaba by University of Miami researchers highlighted the diverse types of marine life that can be found in underwater lakes.","D":"Brine pools are salty underwater lakes that sit on the ocean floor."},"a":"B"},{"s":"Rhetorical Synthesis","n":66,"p":"While researching a topic, a student has taken\nthe following notes:\n• Spinach is a vegetable that contains ascorbic\nacid, an essential nutrient for humans.\n• There is 30 milligrams (mg) of ascorbic acid\nin every 100 grams (g) of spinach.\n• Cauliflower is a vegetable that contains\nascorbic acid.\n• There is 48 mg of ascorbic acid in every 100 g\nof cauliflower.\n• Humans cannot make ascorbic acid in their\nbodies, so they must get it from foods, including\nfruits and vegetables.\n• Ascorbic acid is also known as vitamin C.","q":"The student wants to emphasize a similarity between spinach and cauliflower. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Humans cannot make vitamin C in their bodies, so they must get this essential nutrient from vegetables, such as spinach.","B":"Just like fruits, vegetables are a food that humans can eat to get ascorbic acid, also known as vitamin C.","C":"Cauliflower is a vegetable that contains ascorbic acid; in fact, there is 48 mg of it in every 100 g of cauliflower.","D":"One thing that spinach and cauliflower have in common is that they both contain vitamin C."},"a":"D"},{"s":"Rhetorical Synthesis","n":67,"p":"While researching a topic, a student has taken\nthe following notes:\n• Understanding the history of science is critical\nfor understanding how knowledge evolves.\n• Anna Vickers was a French algologist born in\n1852.\n• She is known for her research on algae in the\nCanary Islands.\n• Margaret Crosfield was a British geologist born\nin 1859.\n• She is known for her research on the hills of\nNortheast Wales.","q":"Which choice most effectively uses information from the given sentences to emphasize a difference between Vickers and Crosfield?","o":{"A":"Though it was conducted long ago, the research performed by algologist Anna Vickers and geologist Margaret Crosfield can help us understand how scientific knowledge evolves.","B":"Algology and geology are just two examples of the myriad fields in which scientists can specialize.","C":"Anna Vickers studied algae in the Canary Islands; Margaret Crosfield, however, studied the hills of Northeast Wales.","D":"Both Anna Vickers and Margaret Crosfield are known for their contributions to science."},"a":"C"},{"s":"Rhetorical Synthesis","n":68,"p":"While researching a topic, a student has taken\nthe following notes:\n• Crown shyness is a phenomenon in which the\ntops (crowns) of neighboring trees grow close\ntogether but don’t overlap.\n• To explain how this happens, Australian\nforester M.R. Jacobs proposes the mutual\nabrasion theory.\n• According to Jacobs’s theory, when trees brush\nagainst one another, branches break off.\n• Malaysian scholar Francis S.P. Ng posits the\nmutual shade avoidance theory.\n• According to Ng’s theory, when tree branches\ndetect shade from nearby trees’ branches, they\nstop growing.","q":"The student wants to compare the causes of crown shyness proposed in the two theories. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Ng posits the mutual shade avoidance theory, whereas Jacobs proposes an alternative theory.","B":"Both Jacobs and Ng have proposed theories to explain what causes crown shyness.","C":"While Jacobs proposes that crown shyness is caused by neighboring tree branches brushing against one another, Ng posits that it occurs when branches detect shade from nearby trees’ branches.","D":"Jacobs’s mutual abrasion theory proposes that when neighboring trees brush against one another, branches break off, resulting in a phenomenon in which the tops of trees grow close together but don’t overlap."},"a":"C"},{"s":"Rhetorical Synthesis","n":69,"p":"While researching a topic, a student has taken\nthe following notes:\n• Chromosomes are cellular structures that\ncontain genes.\n• Genes carry critical instructions for\ndetermining an organism’s physical traits.\n• The fennec fox and the red fox are both species\nof foxes.\n• As a species, the fennec fox has sixty-four\nchromosomes.\n• As a species, the red fox has thirty-four\nchromosomes.","q":"The student wants to emphasize a difference between the two species of foxes. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Genes, which are in fennec fox chromosomes, carry critical instructions for determining the fox’s physical traits.","B":"While both are species of foxes, the fennec fox and the red fox don’t have the same number of chromosomes: fennec foxes have sixty-four, whereas red foxes have only thirty-four.","C":"The fennec fox and the red fox both have chromosomes, which contain genes.","D":"The red fox, a species of fox, has thirty-four cellular structures called chromosomes."},"a":"B"},{"s":"Rhetorical Synthesis","n":70,"p":"While researching a topic, a student has taken\nthe following notes:\n• The poem \"7 haiku (for St. Augustine)\" is by\nAfrican American writer Sonia Sanchez.\n• It was published in her 2010 poetry book\nentitled Morning Haiku.\n• The poem is written as a sequence of seven\nhaiku.\n• According to the book’s publisher, Penguin\nRandom House (PRH), the book \"celebrates the\ngifts of life and mourns the deaths of revered\nAfrican American figures.\"\n• According to Sanchez, she chose to write in the\nform of haiku because it helps \"maintain\nmemory and dignity.\"","q":"The student wants to describe the format of \"7 haiku (for St. Augustine).\" Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Sanchez chose the form used in the poem \"7 haiku (for St. Augustine)\" because it helps \"maintain memory and dignity.”","B":"The poem \"7 haiku (for St. Augustine)\" was published in the book Morning Haiku, which \"celebrates the gifts of life and mourns the deaths of revered African American figures.\"","C":"The poems in Morning Haiku (2010) are each written as a sequence of haiku.","D":"The poem \"haiku (for St. Augustine)\" is written as a sequence of seven haiku."},"a":"D"},{"s":"Rhetorical Synthesis","n":71,"p":"While researching a topic, a student has taken\nthe following notes:\n• The international Slow Food movement was\nfounded in 1989 with the signing of the \"Slow\nFood Manifesto.\"\n• The movement promotes universal access to\nhealthy, high-quality food.\n• It calls for sustainable food production\npractices that protect local environments,\necosystems, and biodiversity.\n• It advocates for fair treatment of and\ncompensation for food production workers.\n• The Slow Food USA organization was founded\nin 2000.","q":"The student wants to introduce the Slow Food movement to a new audience. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The international Slow Food movement, founded in 1989, promotes universal access to healthy, high-quality food that is produced sustainably by workers who are treated and compensated fairly","B":"The Slow Food movement advocates for food production workers.","C":"The signing of the \"Slow Food Manifesto\" in marked the founding of the international Slow Food movement, while the Slow Food USA organization was founded in 2000.","D":"Goals of the movement include universal access to healthy, high-quality food and sustainable food practices."},"a":"A"},{"s":"Rhetorical Synthesis","n":72,"p":"While researching a topic, a student has taken\nthe following notes:\n• The Great Salt Lake is one of the world’s\nsaltiest bodies of water.\n• The lake is located in Utah.\n• The northern portion of the lake has a higher\nconcentration of salt than the southern portion.\n• Crustaceans called Artemia franciscana live in\nthe southern portion.\n• Bacteria called Nodularia live in the southern\nportion.","q":"The student wants to emphasize a similarity between Artemia franciscana and Nodularia. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Crustaceans called Artemia franciscana and bacteria called Nodularia both live in the southern portion of the Great Salt Lake.","B":"Bacteria called Nodularia live in the Great Salt Lake, which is located in Utah.","C":"The Great Salt Lake in Utah is one of the saltiest bodies of water in the world.","D":"Artemia franciscana, a type of crustacean, lives in the Great Salt Lake."},"a":"A"},{"s":"Rhetorical Synthesis","n":73,"p":"While researching a topic, a student has taken\nthe following notes:\n• Since 1931, the New York Times (NYT) Best\nSellers list has been a measure of the most\nsuccessful books in the US.\n• Kwame Alexander and Diana Ross are Black\nauthors who have reached the NYT Best Sellers\nlist.\n• The Crossover is a children’s book by Kwame\nAlexander.\n• It reached the NYT Best Sellers list on August\n27, 2017.\n• Secrets of a Sparrow is a memoir by Diana\nRoss.\n• It reached the NYT Best Sellers list on\nNovember 21, 1993.","q":"Which choice most effectively uses information from the given sentences to emphasize the different years in which the books reached the NYT Best Sellers list?","o":{"A":"Kwame Alexander and Diana Ross are both NYT best-selling authors.","B":"The Crossover and Secrets of a Sparrow are both books by Black authors that have reached the NYT Best Sellers list.","C":"Kwame Alexander’s The Crossover and Diana Ross’s Secrets of a Sparrow are both NYT best sellers, but the former is a children’s book, whereas the latter is a memoir.","D":"The memoir Secrets of a Sparrow became an NYT best seller in 1993; The Crossover, a children’s book, joined this list as well, but in 2017."},"a":"D"},{"s":"Rhetorical Synthesis","n":74,"p":"While researching a topic, a student has taken\nthe following notes:\n• Hina Hanta is an online archive curated by the\nChoctaw Nation of Oklahoma.\n• Hina Hanta means \"bright path\" in Choctaw.\n• It features images of cultural artifacts relevant\nto the history of the Choctaw people.\n• It includes a shawl (anchi in Choctaw) made\nfrom cloth.\n• It includes a fanner basket (ufko) made from\ncane.","q":"The student wants to specify the shawl’s name in Choctaw. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The cloth shawl, which is included in the Hina Hanta online archive, is called an anchi in Choctaw.","B":"Hina Hanta, which means \"bright path\" in Choctaw, includes a shawl in its archive.","C":"The Hina Hanta archive features cultural artifacts, such as a shawl and a fanner basket, that are relevant to the history of the Choctaw people.","D":"The name of the online archive Hina Hanta means \"bright path\" in Choctaw."},"a":"A"},{"s":"Rhetorical Synthesis","n":75,"p":"While researching a topic, a student has taken\nthe following notes:\n• Asparagus is a vegetable that contains ascorbic\nacid, an essential nutrient for humans.\n• Every 100 grams (g) of asparagus contains 6\nmilligrams (mg) of ascorbic acid.\n• Many animals can make ascorbic acid in their\nbodies, but humans cannot.\n• Humans must get ascorbic acid from foods,\nincluding fruits and vegetables.\n• Ascorbic acid is also known as vitamin C.","q":"The student wants to provide an example of a vegetable that contains vitamin C. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Humans cannot make ascorbic acid in their bodies, but they can get it from foods, such as vegetables, for example.","B":"Many animals can make ascorbic acid, which is also known as vitamin C, in their bodies, but humans cannot.","C":"Vitamin C, also known as ascorbic acid, can be found in asparagus as well as other vegetables.","D":"Since humans cannot make vitamin C in their bodies, they must get it from food."},"a":"C"},{"s":"Rhetorical Synthesis","n":76,"p":"While researching a topic, a student has taken\nthe following notes:\n• The Future of Nostalgia is a scholarly book by\nliterary theorist Svetlana Boym.\n• The book explores the concept of nostalgia\nfrom various angles.\n• Chapter 3 explores nostalgia in the 1993 sci-fi\naction movie Jurassic Park.\n• Chapter 16 discusses the nostalgic home décor\nof Russian émigrés.\n• In chapter 16, Boym writes, \"Their rooms\nfilled with diasporic souvenirs are not altars to\ntheir unhappiness, but rather places for\ncommunication.\"","q":"The student wants to explain what Svetlana Boym writes about in chapter 3. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"After exploring nostalgia in the sci-fi action movie Jurassic Park, Svetlana Boym goes on to discuss the nostalgic home décor of Russian émigrés.","B":"Literary theorist Svetlana Boym explores nostalgia in the sci-fi action movie Jurassic Park in chapter 3 of her book.","C":"As Svetlana Boym writes in the sixteenth chapter of her book, \"Their rooms filled with diasporic souvenirs are not altars to their unhappiness, but rather places for communication.\"","D":"Svetlana Boym’s The Future of Nostalgia explores the concept of nostalgia from various angles."},"a":"B"},{"s":"Rhetorical Synthesis","n":77,"p":"While researching a topic, a student has taken\nthe following notes:\n• Somalia is a country in East Africa.\n• A high percentage of Somalia’s population\n(46.4 percent) is under fifteen years old.\n• It has the sixth-largest under-fifteen population\nin the world.\n• Roughly 40 percent of Africa’s population is\nunder fifteen years old–the highest of any\ncontinent.\n• According to the United Nations (UN),\nAfrica’s \"high number of young people is an\nopportunity for the continent’s growth–but only\nif these new generations are fully empowered to\nrealise their best potential.\"","q":"The student wants to emphasize the global rank of Somalia’s youth population. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Africa’s high population of young people is due in part to the high percentage of young people in Somalia.","B":"With 46 percent of its population under fifteen years of age, Somalia has the sixth-largest population for that age range in the world.","C":"Making up roughly 40 percent of the continent’s total population, Africa’s under-fifteen population offers \"an opportunity for the continent’s growth,\" according to the UN.","D":"\"Only if these new generations are fully empowered to realise their best potential,\" says the UN, will Africa’s high percentage of young people lead to the continent’s growth."},"a":"B"},{"s":"Rhetorical Synthesis","n":78,"p":"While researching a topic, a student has taken\nthe following notes:\n• Mary Kang is a Korean American portrait\nphotographer.\n• She is based in New York City and in Austin,\nTexas.\n• One of Kang’s photographs features artist\nDominique Fung.\n• In the portrait, Fung is seated on the floor.\n• Five of Fung’s paintings are resting against the\nwall behind her.","q":"The student wants to describe where Fung is in the photograph to an audience already familiar with Kang and Fung. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Dominique Fung is in a photograph by Mary Kang, a portrait photographer based in New York City and Austin, Texas.","B":"Mary Kang is a photographer based in both New York City and Austin, Texas","C":"In Kang’s portrait of her, Fung is seated on the floor, with five of her paintings resting against the wall behind her.","D":"Five paintings by artist Dominique Fung can be seen in the background of Mary Kang’s photograph."},"a":"C"},{"s":"Rhetorical Synthesis","n":79,"p":"While researching a topic, a student has taken\nthe following notes:\n• In 1897, twenty Black US Army infantrymen\nrode bicycles from Montana to Missouri.\n• The 1,900-mile journey took forty-one days.\n• The goal was to test the idea of forming a\nmilitary bicycle corps.\n• In 2022, Erick Cedeño, a Black long-distance\ncyclist, reenacted the journey.\n• Cedeño wanted to honor the infantrymen on\nthe journey’s 125th anniversary.","q":"The student wants to emphasize how far the infantrymen traveled. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The 125th anniversary of the infantrymen’s journey was in 2022.","B":"The US infantrymen rode their bicycles from Montana to Missouri–traveling a total of 1,900 miles.","C":"The goal of the journey was to test the idea of forming a military bicycle corps.","D":"Over a century later, Erick Cedeño honored the infantrymen by reenacting their journey."},"a":"B"},{"s":"Rhetorical Synthesis","n":80,"p":"While researching a topic, a student has taken\nthe following notes:\n• Vexillology is the study of flags.\n• The flags of many countries include symbols\nlike animals, plants, or landforms.\n• These symbols often represent an aspect of the\nregion’s history, culture, or landscape.\n• The flag of Papua New Guinea includes a\nraggiana bird-of-paradise.\n• The flag of El Salvador includes a palm\nbranch.","q":"Which choice most effectively uses information from the given sentences to make and support a generalization about symbols on flags?","o":{"A":"Papua New Guinea’s flag includes a raggiana bird-of-paradise, a symbol that is important to that country’s national identity.","B":"The flags of some countries include symbols of animals; Papua New Guinea’s, for example, includes a raggiana bird-of-paradise.","C":"Many countries feature symbols on their flags, and the study of these designs is known as vexillology.","D":"Vexillology is the study of flags; accordingly, vexillologists are interested in flags from around the world."},"a":"B"},{"s":"Rhetorical Synthesis","n":81,"p":"While researching a topic, a student has taken\nthe following notes:\n• Onomatopoeias are words that imitate the\nsounds they represent.\n• Onomatopoeias used to represent the same\nsound often vary from language to language.\n• This variation is due in part to differences in\nhow languages are structured.\n• \"Ba-dumm\" is a German onomatopoeia that\nrepresents the sound of a heartbeat.\n• \"Doki doki\" is a Japanese onomatopoeia that\nrepresents the sound of a heartbeat.\n• The term \"onomatopoeia\" combines the Greek\nwords for \"name\" (onota) and \"to make\"\n(poiein).","q":"The student wants to provide a specific example of onomatopoeia. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Differences in how languages are structured can cause variations in the words used in different languages to represent the same sound.","B":"The Japanese word \"doki doki\" both imitates and represents the sound of a heartbeat.","C":"The languages of German and Japanese use different words to represent the sound of a heartbeat.","D":"The term \"onomatopoeia,\" which refers to words that imitate the sound they represent, combines the Greek words for \"name\" and \"to make.\""},"a":"B"},{"s":"Rhetorical Synthesis","n":82,"p":"While researching a topic, a student has taken\nthe following notes:\n• Artist Pablo Picasso of Spain won a Carnegie\nPrize gold medal in 1930.\n• The Carnegie Prize is an international art\ncompetition.\n• It is administered by the Carnegie Museum of\nArt in Pittsburgh, Pennsylvania.\n• Picasso’s winning artwork was a painting\nentitled Portrait of Mme. Picasso.","q":"The student wants to identify the painting for which Picasso won a Carnegie Prize gold medal. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Picasso won a Carnegie Prize gold medal for the painting Portrait of Mme. Picasso.","B":"The Carnegie Museum of Art awarded Picasso a gold medal in 1930.","C":"The Carnegie Prize is an international art competition administered by the Carnegie Museum of Art in Pittsburgh, Pennsylvania.","D":"In 1930, an artist from Spain won a Carnegie Prize gold medal for a painting."},"a":"A"},{"s":"Rhetorical Synthesis","n":83,"p":"While researching a topic, a student has taken\nthe following notes:\n• Richard Serra is an American artist.\n• He is known for his large metal sculptures.\n• His sculpture Gutter Corner Splash: Night\nShift is roughly 2 feet wide and 9 feet tall.\n• It is made from lead.","q":"Which choice most effectively uses information from the given sentences to emphasize the size of the sculpture?","o":{"A":"Richard Serra is an American artist known for his large metal sculptures.","B":"Richard Serra’s Gutter Corner Splash: Night Shift is made of lead.","C":"Gutter Corner Splash: Night Shift–a large metal sculpture by artist Richard Serra–stretches roughly 2 feet wide and 9 feet tall.","D":"American artist Richard Serra creates large sculptures from metals such as lead."},"a":"C"},{"s":"Rhetorical Synthesis","n":84,"p":"While researching a topic, a student has taken\nthe following notes:\n• The Zim Smith Mid-County Trail is located in\nNew York.\n• It is one of more than 2,000 disused railroad\ncorridors in the US that have been converted\ninto public trails since the 1960s.\n• Such trails are known as rail trails.\n• The Union Pacific Railroad Trail in Nevada is\nparallel to an active railway, the Union Pacific\nRailroad.\n• It is one of approximately 400 trails in the US\nthat share a right-of-way with an active rail line.\n• Such trails are known as rails-with-trails.","q":"The student wants to make a generalization about rails-with-trails. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"In the US, trails have been constructed from disused railroad corridors as well as on property parallel to active rail lines.","B":"In the US, trails that share a right-of-way with an active rail line are less common than some other types of railway trails.","C":"The Union Pacific Railroad Trail in Nevada is one of approximately US trails that share a right-of-way with an active rail line","D":"Since the 1960s, thousands of public trails in the US have been created from disused railroad corridors."},"a":"B"},{"s":"Rhetorical Synthesis","n":85,"p":"While researching a topic, a student has taken\nthe following notes:\n• Author H.P. Lovecraft wrote a number of\nhorror stories.\n• Designer Richard Launius created a board\ngame based on these stories.\n• The game is called Arkham Horror.\n• It was released in 2005.","q":"The student wants to indicate when the board game was released. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The board game Arkham Horror was designed by Richard Launius.","B":"The board game Arkham Horror was released in 2005.","C":"The board game Arkham Horror is based on horror stories.","D":"The board game Arkham Horror is based on the writing of H.P. Lovecraft."},"a":"B"},{"s":"Rhetorical Synthesis","n":86,"p":"While researching a topic, a student has taken\nthe following notes:\n• Sue is the nickname of a dinosaur fossil\nspecimen housed at the Field Museum of Natural\nHistory.\n• The Field Museum of Natural History is\nlocated in Chicago, Illinois.\n• Sue is a member of the genus Tyrannosaurus.\n• Thomas is the nickname of a dinosaur fossil\nspecimen housed at the Natural History Museum\nof Los Angeles County.\n• The Natural History Museum of Los Angeles\nCounty is located in Los Angeles, California.\n• Thomas is a member of the genus\nTyrannosaurus.","q":"The student wants to emphasize a similarity between the two specimens. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The dinosaur fossil specimens Sue and Thomas are both members of the genus Tyrannosaurus.","B":"While Sue is housed at the Field Museum of Natural History, Thomas is housed at the Natural History Museum of Los Angeles County.","C":"The Field Museum of Natural History, where Sue is housed, is located in Chicago, Illinois.","D":"Thomas is the nickname of a Tyrannosaurus fossil specimen housed at the Natural History Museum of Los Angeles County in Los Angeles, California."},"a":"A"},{"s":"Rhetorical Synthesis","n":87,"p":"While researching a topic, a student has taken\nthe following notes:\n• The black-footed ferret is a mammal species.\n• Up until 1981, it was believed to be extinct.\n• That year, a live black-footed ferret was\nidentified in the wild in the United States.\n• The black-footed ferret is considered a Lazarus\nspecies.\n• \"Lazarus species\" is a term for living species of\norganisms that were once believed to be extinct.","q":"The student wants to define the term \"Lazarus species\" and provide an example of one. Which choice most effectively uses relevant information from the notes to accomplish these goals?","o":{"A":"The term \"Lazarus species\" describes a living species of organism, such as the black-footed ferret, that was once believed to be extinct.","B":"Sometimes, a species once believed to be extinct is later found living in the wild.","C":"The black-footed ferret, a species of mammal, was identified in the wild in 1981.","D":"One example of a Lazarus species is the black-footed ferret, a mammal species that was identified in the wild in the United States in 1981."},"a":"A"},{"s":"Rhetorical Synthesis","n":88,"p":"While researching a topic, a student has taken\nthe following notes:\n• The French Republican calendar was used in\nFrance from 1793 to 1805.\n• Each calendar week had ten days, two of which\nwere called quintidi and decadi.\n• Each quintidi was given a unique name in\nhonor of an animal.\n• Each decadi was given a unique name in honor\nof an agricultural tool.\n• Bélier, a quintidi in the month of Thermidor,\nwas named after the ram.\n• Crible, a decadi in the month of Nivo¯se, was\nnamed after the sieve.","q":"The student wants to emphasize a difference between quintidi and decadi. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"One quintidi during the month of Thermidor was named after an animal, the ram.","B":"Each quintidi in the calendar honored an animal, such as the ram, whereas each decadi honored an agricultural tool, such as the sieve.","C":"There were ten days in each week of the French Republican calendar, and two of these days were called quintidi and decadi.","D":"Each decadi was named after an agricultural tool; for example, a decadi during the month of Nivôse was named after the sieve."},"a":"B"},{"s":"Rhetorical Synthesis","n":89,"p":"While researching a topic, a student has taken\nthe following notes:\n• A merchant ship is any ship hired to carry\ncargo or passengers.\n• A ship’s carrying capacity is also known as its\ndeadweight tonnage (DWT).\n• In 2021, there were a total of 392 merchant\nships registered in Saudi Arabia.\n• The combined DWT of these ships was 13.7\nmillion tons.","q":"The student wants to specify the number of merchant ships in Saudi Arabia in 2021. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"In total, Saudi Arabia’s merchant ships had a carrying capacity, or deadweight tonnage, of 13.7 million tons in 2021.","B":"Combined, Saudi Arabia’s merchant ships had a deadweight tonnage of 13.7 million tons in 2021.","C":"The carrying capacity of a merchant ship is also known as deadweight tonnage.","D":"There were a total of 392 merchant ships–ships hired to carry cargo or passengers–registered in Saudi Arabia in 2021."},"a":"D"},{"s":"Rhetorical Synthesis","n":90,"p":"While researching a topic, a student has taken\nthe following notes:\n• Vexillology is the study of flags.\n• The flags of many countries include symbols\nlike animals, plants, or landforms.\n• These symbols often represent an aspect of the\nregion’s history, culture, or landscape.\n• The flag of Kazakhstan includes an eagle.\n• The flag of Slovenia includes Triglav\nmountain.","q":"Which choice most effectively uses information from the given sentences to make and support a generalization about symbols on flags?","o":{"A":"Many countries feature symbols on their flags, and the study of these designs is known as vexillology.","B":"Kazakhstan’s flag includes an eagle, a symbol that is important to that country’s national identity.","C":"Vexillology is the study of flags; accordingly, vexillologists are interested in flags from around the world.","D":"The flags of some countries include symbols of animals; Kazakhstan’s, for example, includes an eagle."},"a":"D"},{"s":"Rhetorical Synthesis","n":91,"p":"While researching a topic, a student has taken\nthe following notes:\n• Artist Jean Arp of Germany won a Carnegie\nPrize gold medal in 1964.\n• The Carnegie Prize is an international art\ncompetition.\n• It is admi
