<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAT Writing Flashcards – SAToplam</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3348;
    --text: #e8eaf0;
    --muted: #8890a4;
    --accent: #6c63ff;
    --accent-dim: rgba(108,99,255,0.15);
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.15);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.15);
    --radius: 14px;
    --radius-sm: 8px;
  }

  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

  /* HEADER */
  header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px;
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500; color: var(--accent); letter-spacing: 0.06em; }
  .header-title { font-size: 15px; font-weight: 600; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .score-pill { display: flex; gap: 10px; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .sc { color: var(--green); } .sw { color: var(--red); }
  .progress-pill { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); background: var(--surface2); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); }

  /* SECTION TABS */
  .tabs { padding: 16px 24px 0; display: flex; flex-wrap: wrap; gap: 8px; max-width: 960px; margin: 0 auto; width: 100%; }
  .tab { padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .tab:hover { border-color: var(--accent); color: var(--text); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tab .cnt { font-family: 'JetBrains Mono', monospace; font-size: 10px; opacity: 0.75; margin-left: 4px; }

  /* MAIN */
  main { flex: 1; padding: 20px 24px 48px; max-width: 960px; margin: 0 auto; width: 100%; }

  .top-row { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
  .btn { padding: 7px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .btn:hover { background: var(--surface2); border-color: var(--accent); }
  .btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .stats-row { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .chip { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-family: 'JetBrains Mono', monospace; border: 1px solid var(--border); background: var(--surface); color: var(--muted); }
  .chip.green { border-color: var(--green); color: var(--green); background: var(--green-dim); }
  .chip.red { border-color: var(--red); color: var(--red); background: var(--red-dim); }
  .chip.blue { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  .prog-track { height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; margin-bottom: 18px; }
  .prog-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s ease; }

  /* CARD */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; animation: fadeIn 0.22s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .card-header { padding: 12px 20px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .q-badge { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; background: var(--accent-dim); color: var(--accent); padding: 3px 8px; border-radius: 4px; }
  .s-badge { font-size: 11px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; }

  /* PASSAGE */
  .card-passage {
    padding: 20px 22px;
    font-size: 14.5px;
    line-height: 1.75;
    color: #cdd0db;
    border-bottom: 1px solid var(--border);
    font-family: Georgia, 'Times New Roman', serif;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .blank {
    display: inline-block;
    background: rgba(108,99,255,0.18);
    border-bottom: 2.5px solid var(--accent);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    padding: 1px 10px;
    border-radius: 4px 4px 0 0;
    letter-spacing: 0.12em;
    vertical-align: middle;
    margin: 0 2px;
  }

  .notes-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 12px; font-family: 'Inter', sans-serif; }
  .notes-body { font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.7; white-space: pre-wrap; }

  /* QUESTION PROMPT */
  .card-prompt {
    padding: 16px 22px;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.5;
    color: var(--text);
    border-bottom: 1px solid var(--border);
  }

  /* OPTIONS */
  .options { padding: 14px 20px 18px; display: flex; flex-direction: column; gap: 9px; }

  .option {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 16px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--border); background: var(--bg);
    cursor: pointer; transition: border-color 0.14s, background 0.14s, box-shadow 0.14s;
    text-align: left; font-family: inherit; width: 100%;
    font-size: 14px; line-height: 1.55; color: var(--text);
  }

  .option:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-dim); }
  .option:disabled { cursor: default; }

  .opt-letter {
    font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700;
    color: var(--muted); min-width: 18px; padding-top: 2px;
    transition: color 0.14s;
  }
  .opt-text { flex: 1; }

  /* Answer glow states */
  .option.correct {
    border-color: var(--green) !important; background: var(--green-dim) !important;
    box-shadow: 0 0 0 1px var(--green), 0 0 14px rgba(34,197,94,0.22);
    animation: glowG 0.4s ease;
  }
  .option.correct .opt-letter { color: var(--green) !important; }
  .option.wrong {
    border-color: var(--red) !important; background: var(--red-dim) !important;
    box-shadow: 0 0 0 1px var(--red), 0 0 14px rgba(239,68,68,0.22);
    animation: glowR 0.4s ease;
  }
  .option.wrong .opt-letter { color: var(--red) !important; }
  .option.reveal { border-color: var(--green) !important; background: var(--green-dim) !important; }
  .option.reveal .opt-letter { color: var(--green) !important; }

  @keyframes glowG {
    0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.6); }
    50% { box-shadow: 0 0 0 5px rgba(34,197,94,0.25), 0 0 24px rgba(34,197,94,0.3); }
    100% { box-shadow: 0 0 0 1px var(--green), 0 0 14px rgba(34,197,94,0.22); }
  }
  @keyframes glowR {
    0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.6); }
    50% { box-shadow: 0 0 0 5px rgba(239,68,68,0.25), 0 0 24px rgba(239,68,68,0.3); }
    100% { box-shadow: 0 0 0 1px var(--red), 0 0 14px rgba(239,68,68,0.22); }
  }

  /* FEEDBACK */
  .feedback { display: none; margin: 0 20px 16px; padding: 11px 16px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; align-items: center; gap: 8px; }
  .feedback.show { display: flex; }
  .feedback.ok { background: var(--green-dim); border: 1px solid var(--green); color: var(--green); }
  .feedback.bad { background: var(--red-dim); border: 1px solid var(--red); color: var(--red); }

  /* NAV */
  .nav-row { display: flex; gap: 10px; margin-top: 18px; align-items: center; }
  .nav-row .sp { flex: 1; }
  .nav-pos { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); }
</style>
</head>

  <div id="card-container"></div>
  <div class="nav-row" id="nav-row" style="display:none">

</main>

spanning","C":"span","D":"spanned"},"a":"B"},{"s":"Form, Structure, and Sense","n":65,"p":"In knot theory (the mathematical study of\ncurved, closed loops), knots are characterized by\ntheir crossing numbers—that is, the number of\ntimes the knotted thread crosses over itself. The\ntrefoil knot and the figure-eight knot, each with\na crossing number below five,\namong the simplest possible knots with the\nfewest number of crossings.","q":"Which choice completes the text so that it conforms to the conventions of Standard English?","o":{"A":"was","B":"is","C":"has been","D":"are"},"a":"D"},{"s":"Form, Structure, and Sense","n":66,"p":"Latvia, Greece, and the other member nations of\nthe North Atlantic Treaty Organization, or\nNATO, share a commitment to the principle of\ncollective defense, each NATO member\nto defend the others if\nnecessary.","q":"Which choice completes the text so that it conforms to the conventions of Standard English?","o":{"A":"has pledged","B":"pledging","C":"pledges","D":"is pledging"},"a":"B"},{"s":"Form, Structure, and Sense","n":67,"p":"Often anthologized alongside the\nassociated with the Black Arts\nmovement—such as Henry Dumas and Ntozake\nShange—Haki Madhubuti’s poem \"Quality:\nGwendolyn Brooks at 73\" stands out for its\nmemorable first lines: \"breath, / life after seven\ndecades plus three years / is a lot of breathing.\"","q":"Which choice completes the text so that it conforms to the conventions of Standard English?","o":{"A":"works of other writer’s","B":"work’s of other writer’s","C":"works of other writers","D":"work’s of other writers"},"a":"C"},{"s":"Form, Structure, and Sense","n":68,"p":"When a given industry—water and electricity\nare two well-known examples—carries high\ninfrastructural start-up costs and other barriers\nthat discourage competition, _____ of\njust one or two suppliers per municipality. Such\nindustries are known as natural monopolies.","q":"Which choice completes the text so that it conforms to the conven e had at least\none woman serve as governor. In Nebraska, for\nexample, Governor Kay A. Orr took office on\nJanuary 9, 1987. In fact, the number of states\nand territories that have had only male\ngovernors _____ almost every year.","q":"Which choice completes the text so that it conforms to the conventions of Standard English?","o":{"A":"shrinks","B":"shrink","C":"are shrinking","D":"have been shrinking"},"a":"A"},{"s":"Form, Structure, and Sense","n":78,"p":"Trade with other societies was vital to the\nByzantine Empire, which reigned in the\nMediterranean from around 330 CE to 1453 CE.\nIts people profited by selling salt, textiles, and\niron, items that _____ greatly in\ndemand.","q":"Which choice completes the text so that it conforms to the conventions of Standard English?","o":{"A":"has been","B":"were","C":"was","D":"is"},"a":"B"},{"s":"Form, Structure, and Sense","n":79,"p":"In her work as a sociocultural anthropologist,\nLivia Barbosa studies food and sociability in\ncontemporary Brazil—namely, how common\nBrazilian foods like tareco (a disk-shaped\nbiscuit) and coxinha (a stuffed fried dough)\nas central mechanisms in\nbuilding social relationships, values, and\nidentities.","q":"Which choice completes the text so that it conforms to the conventions of Standard English?","o":{"A":"is functioning","B":"functions","C":"has functioned","D":"function"},"a":"D"},{"s":"Form, Structure, and Sense","n":80,"p":"Contrasting a high saturation color palette\nagainst dark paper and stoneware,\nAtlanta-based artist Jiha Moon creates fused\npieces, wherein Korean folk art, Western\ncontemporary art, and global popular culture\nmix. New York’s Derek Eller Gallery\nher work in a solo exhibition\nthat ran in early 2022.","q":"Which choice completes the text so that it conforms to the conventions of Standard English?","o":{"A":"features","B":"has been featured","C":"featured","D":"will feature"},"a":"C"},{"s":"Form, Structure, and Sense","n":81,"p":"In the list \"Things That  that\nsuch geoglyphs are quite common in the state.","q":"Which choice completes the text so that it conforms to the conventions of Standard English?","o":{"A":"notice","B":"are noticing","C":"will notice","D":"noticed"},"a":"D"},{"s":"Form, Structure, and Sense","n":164,"p":"Koumanthio Zeinab Diallo, born in 1956, is a\npoet and novelist from Labé, Guinea. In recent\nyears more writers from Guinea, including\nDiallo, _____ to reach audiences\nbeyond the African nation’s borders.","q":"Which choice completes the text so that it conforms to the conventions of Standard English?","o":{"A":"is beginning","B":"has begun","C":"have begun","D":"begins"},"a":"C"},{"s":"Form, Structure, and Sense","n":165,"p":"Among the world’s largest deserts are the Syrian\nDesert, ranked _____ and the Chalbi\nDesert, ranked twenty-ninth.","q":"Which choice completes the text so that it conforms to the conventions of Standard English?","o":{"A":"ninth in size, the Kyzylkum Desert; ranked sixteenth,","B":"ninth in size; the Kyzylkum Desert, ranked sixteenth;","C":"ninth in size the Kyzylkum Desert, ranked sixteenth","D":"ninth in size; the Kyzylkum Desert; ranked sixteenth;"},"a":"B"},{"s":"Form, Structure, and Sense","n":166,"p":"Was the Greek mythological figure Dionysus,\ngod of wine and the theater, based on a real\nperson? That was the question posed by the\nwriter Euhemerus (fourth century BCE).\nEuhemerus claimed that Dionysus and the other\nGreek deities were based on real-life heroes or\nleaders, tales of whose exploits, told and retold\nover time, _____ myths—a position\nlater known as euhemerism.","q":"Which choice completes the text so that it conforms to the conventions of Standard English?","o":{"A":"having eventually become","B":"eventually became","C":"to eventually become","D":"eventually becoming"},"a":"B"},{"s":"Form, Structure, and Sense","n":167,"p":"In 19th-century Bengal, cowry shells were used\nas a commodity currency. By using specific\ngoods like cowry shells as common units of\nexchange, commodity currency economies\nstreamline trade, which is why they often\nreplaced barter economies. Barter economies\neschew _____ that requires what\neconomist W.S. Jevons deems a \"double\ncoincidence of wants\"—in other words, each\ntrading party must want precisely what the\nother has.","q":"Which choice completes the text so that it conforms to the conventions of Standard English?","o":{"A":"currency, in favor of a direct trade system","B":"currency—in favor of a direct trade system","C":"currency in favor of a direct trade system","D":"currency, in favor of a direct trade system,"},"a":"C"},{"s":"Form, Structure, and Sense","n":168,"p":"In economics, soybeans are considered a\ncommodity because they are essentially\ninterchangeable, \"essentially\" being a word that\nadmits a degree of latitude. In 2021, researchers\nJ. Shorish, M. Stephenson, and M. Zargham\ndevised a mathematical model of fungibility\n(interchangeability) that would account for such\nvariation. Distinguishing \"exactly the same\"\nand \"nearly the same\" commodities—whether\ncrops, lumber, or precious metals—\namong their primary aims.","q":"Which choice completes the text so that it conforms to the conventions of Standard English?","o":{"A":"were","B":"was","C":"having been","D":"being"},"a":"B"},{"s":"Form, Structure, and Sense","n":169,"p":"In recent years, the English writer Mary Ann\nBrowne (1812-1845), whose poetry was widely\nread during her lifetime, has been rediscovered\nby contemporary audiences—a resurgence of\ninterest that is largely due to literary scholars\nsuch as Adriana Craciun, whose work\nthe richness of Browne’s poems\nand the poet’s historical importance to the\nRomantic literary movement encourages a\nbroader rethinking of British Romanticism itself.","q":"Which choice completes the text so that it conforms to the conventions of Standard English?","o":{"A":"highlights","B":"highlighting","C":"has highlighted","D":"is highlighting"},"a":"B"},{"s":"Form, Structure, and Sense","n":170,"p":"The extensive impact that polymeric\nnanoparticles (PNPs) have had on medicine\nbelies their minuscule size, the nanoparticles\ntypically _____ from only 100 to 300\nbillionths of a meter.","q":"Which choice completes the text so that it conforms to the conventions of Standard English?","o":{"A":"range","B":"can range","C":"ranging","D":"will range"},"a":"C"},{"s":"Form, Structure, and Sense","n":171,"p":"In the periodic table, an element’s atomic\nnumber indicates how many protons there are in\nan atom of the element. For example, a calcium\natom _____ 20 protons. Professor\nRaymond Chang explains this concept in more\ndetail in the textbook Chemistry.","q":"Which choice completes the text so that it conforms to the conventions of Standard English?","o":{"A":"is having","B":"had","C":"has had","D":"has"},"a":"D"},{"s":"Form, Structure, and Sense","n":172,"p":"Yvonne Adhiambo Owuor, born in 1968, is a\nnovelist from Nairobi, Kenya. In recent years\nmore writers from Kenya, including Owuor,\nto reach audiences beyond the\nAfrican nation’s borders.","q":"Which choice completes the text so that it conforms to the conventions of Standard English?","o":{"A":"begins","B":"is beginning","C":"has begun","D":"have begun"},"a":"D"},{"s":"Form, Structure, and Sense","n":173,"p":"The Hereford map is a mappa mundi from the\nfourteenth century. Currently held at Hereford\nCathedral in Hereford, England, it is one of over\n1,000 such world maps from the European\nMiddle Ages still remaining, with the even older\nTheodulf of Orleans map from the eleventh\ncentury (now held at the Vatican Library in\nVatican City) _____ another one.","q":"Which choice completes the text so that it conforms to the conventions of Standard English?","o":{"A":"is","B":"has been","C":"being","D":"was"},"a":"C"},{"s":"Form, Structure, and Sense","n":174,"p":"The African baobab (Adansonia digitata) known\nas Panke Baobab, located in Zimbabwe, was one\nof the oldest known trees in the world, at 2,419\nyears old. With over two millennia of climate\ndata in its tree _____ single tree like\nthis, claims dendrochronologist Valerie Trouet,\ncan tell the history of the world.","q":"Which choice completes the text so that it conforms to the conventions of Standard English?","o":{"A":"rings. A","B":"rings and a","C":"rings, a","D":"rings; a"},"a":"C"},{"s":"Form, Structure, and Sense","n":175,"p":"Topographical prominence is a measure of a\nmountain’s independence from other mountains.\nHaving 9,721 feet of prominence,\n.","q":"Which choice completes the text so that it conforms to the conventions of Standard English?","o":{"A":"Pico do Ramelau, a peak located in Timor-Leste, is ranked by geographers as the world’s 98th most prominent mountain.","B":"the list of mountains geographers rank as the world’s most prominent includes Pico do Ramelau, a peak located in Timor-Leste, at number 98.","C":"geographers have ranked Pico do Ramelau, a peak in Timor-Leste, as the world’s 98th most prominent mountain.","D":"the ranking given by geographers to Pico do Ramelau, a peak located in Timor-Leste, is 98th most prominent mountain in the world."},"a":"A"},{"s":"Form, Structure, and Sense","n":176,"p":"The radial velocity method, a means of indirect\nplanetary discovery, has detected previously\nunknown exoplanets at vast distances from\nthe Neptune-like planet\nDMPP-1 b; at 296 light-years away, the gas\ngiant 42 Draconis b; and, as of 2023, over 1,000\nother exoplanets that are too far away and dim\nto be observed directly.","q":"Which choice completes the text so that it conforms to the conventions of Standard English?","o":{"A":"Earth, at 204 light-years away,","B":"Earth at 204 light-years away,","C":"Earth at 204 light-years away:","D":"Earth: at 204 light-years away,"},"a":"D"},{"s":"Form, Structure, and Sense","n":177,"p":"L. Leann Kanda, a researcher and sewing\nenthusiast, experimented with several techniques\nin her attempt to repl tamia from around 911\nBCE to 609 BCE. By supplying grain, textiles,\nand tin to societies that lacked these valuable\nNeo-Assyrian Empire grew not\nonly in wealth but also in power and influence.","q":"Which choice completes the text so that it conforms to the conventions of Standard English?","o":{"A":"items. The","B":"items the","C":"items; the","D":"items, the"},"a":"D"},{"s":"Form, Structure, and Sense","n":181,"p":"Released in 1987, the Acorn ARM2 microchip\ncontained a single CPU, or core, to execute\ncommands. As processing speeds of single-core\nchips increased over time, so too did the heat\nthe chips generated. _____ a \"power\nwall\" in which more heat was produced than\ncould be efficiently dissipated led developers to\ninvent the dual-core chip in the early 2000s.","q":"Which choice completes the text so that it conforms to the conventions of Standard English?","o":{"A":"Hitting","B":"When they hit","C":"They hit","D":"Upon hitting"},"a":"A"},{"s":"Form, Structure, and Sense","n":182,"p":"In a 2018 study, Ceri Shipton et al. concluded\nthat stone tools excavated from an\narchaeological site in Saudi Arabia date to\nbetween 197,000 and 276,000 years ago. The\nreliability of the dates that Shipton et al. have\nposited, which were obtained through processes\nthat determined when buried mineral grains\nsurrounding the tools were last exposed to\nsunlight, _____ in part upon the\nresearchers’ exclusion of mineral grains that\nlacked adequate sun exposure before burial.","q":"Which choice completes the text so that it conforms to the conventions of Standard English?","o":{"A":"depending","B":"depend","C":"depends","D":"having depended"},"a":"C"},{"s":"Form, Structure, and Sense","n":183,"p":"Conceiving of a communal gathering space in the\nstyle of European town centers,\nrecalled those he saw in his native Vienna.","q":"Which choice completes the text so that it conforms to the conventions of Standard English?","o":{"A":"architect Victor Gruen’s designs for Pennsylvania’s South Hills Village, an indoor shopping mall completed in 1965, contained promenades, fountains, and greenery that","B":"South Hills Village, an indoor shopping mall in Pennsylvania completed in 1965, was designed by architect Victor Gruen with promenades, fountains, and greenery that","C":"the promenades, fountains, and greenery of Pennsylvania’s South Hills Village, an indoor shopping mall designed by architect Victor Gruen and completed in 1965,","D":"architect Victor Gruen designed Pennsylvania’s South Hills Village, an indoor shopping mall completed in 1965, with promenades, fountains, and greenery that"},"a":"D"},{"s":"Form, Structure, and Sense","n":184,"p":"As an object-oriented computer programming\nlanguage, Perl is used by coders like Black Girls\nCode founder Kimberly Bryant to create\ncomputer programs by manipulating \"objects\"\n(that is, specifically defined variables or\ncombinations of variables) into interacting with\neach other. Conversely, languages like Scheme,\nused in software development,\nobject oriented.","q":"Which choice completes the text so that it conforms to the conventions of Standard English?","o":{"A":"is not","B":"are not","C":"were not","D":"has not been"},"a":"B"},{"s":"Form, Structure, and Sense","n":185,"p":"The Greek philosopher Aristotle had ideas that\nwould have substantial influence thousands of\nyears after he taught _____ .\nAmerican Framers would use his philosophies\nlike government moderation, the rule of law, and\ncitizen rights when writing the United States\nConstitution.","q":"Which choice completes the text so that it conforms to the conventions of Standard English?","o":{"A":"it.","B":"that.","C":"this.","D":"them."},"a":"D"},{"s":"Form, Structure, and Sense","n":186,"p":"Having devised an optical spectroscopy\ntechnique that allowed researchers to study\nultrafast chemical reactions within molecules,\nknown as femtochemistry. For\nthis groundbreaking work, he won the Othmer\nGold Medal and the Davy Medal from the Royal\nSociety.","q":"Which choice completes the text so that it conforms to the conventions of Standard English?","o":{"A":"chemist Ahmed Zewail introduced a new scientific discipline","B":"a new scientific discipline was introduced by Ahmed Zewail, a chemist","C":"the introduction of a new scientific discipline was initiated by chemist Ahmed Zewail","D":"chemist Ahmed Zewail’s introduction of a new scientific discipline would be"},"a":"A"},{"s":"Transitions","n":1,"p":"Of Names, an essay by French philosopher\nMichel de Montaigne, explores a relatively light\nsubject, while his essay \"Of the Punishment of\nCowardice\" takes on heavier fare. No matter the\nessay topic, Montaigne challenges his own ideas,\nbeliefs, and values. ____________ he\nquestions his own perspective, regardless of\nsubject matter.","q":"Which choice completes the text with the most logical transition?","o":{"A":"For example,","B":"At that time,","C":"Indeed,","D":"However,"},"a":"C"},{"s":"Transitions","n":2,"p":"Though Middle English was widely spoken in\nfourteenth-century England, the language was\nrarely employed in literature until poet Geoffrey\nChaucer helped pioneer its literary use.\n____________ his manuscripts contain\nthe first documented uses of over 2,000 English\nwords–like the word \"exaltation\" in his 1386\npoem \"The Squire’s Tale\"–which led a\ncontemporary to dub him \"the first finder of our\nfair language.\"","q":"Which choice completes the text with the most logical transition?","o":{"A":"However,","B":"That being said,","C":"Besides,","D":"Indeed,"},"a":"D"},{"s":"Transitions","n":3,"p":"Built at a scale of 1:110, the Eiffel Tower in\nBaku, Azerbaijan, is one of many replicas of the\nfamous Eiffel Tower in Paris, France.\n____________ towers like the Metallic\nTower of Fourviere in Lyon, France, though not\nexact replicas, pay homage to the Eiffel’s iconic\nspire-like design.","q":"Which choice completes the text with the most logical transition?","o":{"A":"On the contrary,","B":"Consequently,","C":"Invariably,","D":"Moreover,"},"a":"D"},{"s":"Transitions","n":4,"p":"The Cheruku rasamu mango variety is from the\nSouth Asian country of India.\n____________ in 2018, 18.8 million\nmetric tons of mangoes were produced.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Hence,","B":"There,","C":"In fact,","D":"Specifically,"},"a":"B"},{"s":"Transitions","n":5,"p":"Nineteenth century Modernista architect\nchampioned nature in their designs.\n____________ the dramatic archway and\nbotanical glasswork of Palau, a Modernista\nprivate home designed by Manuell Raspel, could\nnot exactly grow in a forest. Still, one sees\nnatural influences in Raspel’s penchant for\ncurves and plant and animal inspired flourishes.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Of course,","B":"Similarly,","C":"Furthermore,","D":"Thus,"},"a":"A"},{"s":"Transitions","n":6,"p":"In the West African country of Burkina, the\npercentage of the population living in cities\nincreased from 27.5% to 30.6% between 2015\nand 2020; this upward trend in urbanization was\nseen throughout that part of the continent.\n____________ from 2015 to 2020, the\noverall percentage of the West African\npopulation living in cities rose from 44.5% to\n47.7%.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Nevertheless,","B":"Later,","C":"Indeed,","D":"In reality,"},"a":"C"},{"s":"Transitions","n":7,"p":"The first documented use of the English word\n\"session\" is attributed to poet Geoffrey\nChaucer’s 1386 work \"Canterbury Prologue.\"\nHowever, Chaucer didn’t write in Modern\nEnglish; ____________ he wrote in what\nwe now call Middle English, which was\ncommonly used during the period.","q":"Which choice completes the text with the most logical transition?","o":{"A":"rather,","B":"as a result,","C":"similarly,","D":"finally,"},"a":"A"},{"s":"Transitions","n":8,"p":"According to traditional classifications, each of\nWilliam Shakespeare’s plays belongs to one of\nthree distinct genres: comedy, history, or\ntragedy. The play Much ado About Nothing\n(1598-99), ____________ is classified as a\ncomedy, whereas Richard II (1595) is classified\nas a history.","q":"Which choice completes the text with the most logical transition?","o":{"A":"in addition,","B":"similarly,","C":"for instance,","D":"however,"},"a":"C"},{"s":"Transitions","n":9,"p":"In 1940, scientists first isolated a sample of the\nsteroid hormone androstenone, which they knew\nexisted in animals–and, they assumed, only in\nanimals ____________ scientists know\nthat androstenone can also be found in\nchokecherry plants (Pruntes virginiano), but this\ndiscovery didn’t occur until decades later.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Today,","B":"For instance,","C":"In other words,","D":"Thus,"},"a":"A"},{"s":"Transitions","n":10,"p":"The city of Jinan, China, expanded its rapid\ntransit system, the Jinan Metro, as recently as\n2020 . ____________ the system will\nlikely need to undergo further expansions as the\nsize and needs of the city’s population shift.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Still,","B":"By contrast,","C":"For example,","D":"Instead,"},"a":"A"},{"s":"Transitions","n":11,"p":"In his essay \"Of Coaches,\" French philosopher\nMichel de Montaigne explores a relatively light\nsubject, but he expresses heavier fare in \"Of the\nInconvenience of Greatness.\" Regardless of\nsubject matter, Montaigne works to question his\nown perspective throughout his essay.\n____________ his personal motto was\n\"What do I know?\"","q":"Which choice completes the text with the most logical transition?","o":{"A":"Still,","B":"Conversely,","C":"Fittingly,","D":"Nowadays,"},"a":"C"},{"s":"Transitions","n":12,"p":"The first documented use of the English word\n\"depart\" is attributed to y,","D":"Granted,"},"a":"A"},{"s":"Transitions","n":16,"p":"Those who looked up at the right time on July\n9, 1926, would have witnessed an annular solar\neclipse, during which the Moon blocks most of\nthe Sun and causes it to look like a ring of light.\n____________ stargazers on December\n24, 1927, would have seen a partial solar eclipse,\nduring which the Moon only blocks a portion of\nthe Sun and causes it to look like a crescent.","q":"Which choice completes the text with the most logical transition?","o":{"A":"As a result,","B":"On the other hand,","C":"Simultaneously,","D":"Indeed,"},"a":"B"},{"s":"Transitions","n":17,"p":"One might assume that Germany’s Amrumbank\nWest offshore wind farm produces the same\namount of energy as land-based wind farms of a\nsimilar size. ____________ because wind\nspeeds over open water are generally higher than\nthose over land, Amrumbank West’s turbines\nturn faster and produce more energy than do\nmost land farms’ turbines.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Actually,","B":"For example,","C":"Therefore,","D":"Finally,"},"a":"A"},{"s":"Transitions","n":18,"p":"When using hairy coneflower for dyeing cloth,\ntextile artists first soak it in water to release its\ncolor. Next, they add the cloth to the dye bath\nand simmer it for hours, perhaps even days.\n____________ they remove the cloth\nfrom the dye bath, revealing that the cloth has\nturned a vibrant blue color.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Finally,","B":"However,","C":"Therefore,","D":"Actually,"},"a":"A"},{"s":"Transitions","n":19,"p":"Though Middle English was widely spoken in\nfourteenth-century England, the English\nlanguage was rarely employed in literature until\npoet Geoffrey Chaucer pioneered its literary use.\n____________ his manuscripts contain\nthe first documented uses of over 2,000 English\nwords–like the word \"conspiracy\" in his 1386\npoem \"The Monk’s Tale inal as possible. ________ they\nmight name themselves after a recognizable song\nby a favorite band. This is what the Japanese\nexperimental rock band Boris did when they\nnamed themselves after the song \"Boris\" by the\nMelvins.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Thus,","B":"Alternatively,","C":"In other words,","D":"For instance,"},"a":"D"},{"s":"Transitions","n":46,"p":"If you could travel in a spaceship to Elara, one\nof Jupiter’s many moons, you’d find a moon\nwith a prograde orbit. This means that Elara\norbits Jupiter in the same direction that Jupiter\nrotates on its axis. ____________ at\nPasiphae, another Jovian moon, you’d find an\nexample of a retrograde orbit, with the moon\nrevolving around Jupiter in the opposite\ndirection.","q":"Which choice completes the text so that it conforms to the conventions of Standard English?","o":{"A":"For example,","B":"Specifically,","C":"In other words,","D":"Elsewhere,"},"a":"D"},{"s":"Transitions","n":47,"p":"Monument 61 is the name given to a 13-ton\nstone statue of a human head that was created\nduring the ancient Olmec civilization. It was\ndiscovered in Veracruz, Mexico, at the San\nLorenzo archaeological site. __________\nat the La Venta site in the state of Tabasco,\nanother colossal head statue called Monument 4\nwas discovered.","q":"Which choice completes the text with the most logical transition?","o":{"A":"As a result,","B":"Specifically,","C":"For example,","D":"Elsewhere,"},"a":"D"},{"s":"Transitions","n":48,"p":"In the South Asian country of Sri Lanka, the\npercentage of the population living in cities\nincreased from 18.3% to 18.7% between 2015\nand 2020; this upward trend in urbanization was\nseen throughout that part of the continent.\n__________ from 2015 to 2020, the overall\npercentage of the South Asian population living\nin cities rose from 34.5% to 36.6%.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Neverthe s.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Instead,","B":"For example,","C":"Later,","D":"In other words,"},"a":"C"},{"s":"Transitions","n":124,"p":"F. Julius LeMoyne was an outspoken\nabolitionist whose Pennsylvania home was a\nstop on the underground railroad (the network\nof people and places that some enslaved people\nused to escape to freedom). It was relatively\nrare for supporters of the railroad to be secretive\nabout their antislavery views. ________\nthey were vocal abolitionists like LeMoyne.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Fittingly,","B":"Granted,","C":"More often,","D":"For example,"},"a":"C"},{"s":"Transitions","n":125,"p":"Though Middle English was widely spoken in\nfourteenth-century England, the English\nlanguage was rarely employed in literature until\npoet Geoffrey Chaucer pioneered its literary use.\n__________ his manuscripts contain the\nfirst documented uses of over 2,000 English\nwords – like the word \"digestion\" in his 1395\npoem \"The Squire’s Tale\"– which led a\ncontemporary to dub him \"the first finder of our\nfair language.\"","q":"Which choice completes the text with the most logical transition?","o":{"A":"However,","B":"Besides,","C":"In fact,","D":"On the contrary,"},"a":"C"},{"s":"Transitions","n":126,"p":"In skateboarding, the 900 – a trick in which the\nskateboarder spins two and a half times in\nmidair – is so rare that every successful\nexecution of it is a historic occasion.\n____________ ever since Mitchie Brusco\nand Tas Pappas performed their 900s (in 2011\nand 2014, respectively), fans have revered them\nas titans of the sport.","q":"Which choice completes the text with the most logical transition?","o":{"A":"In conclusion,","B":"By comparison,","C":"For this reason,","D":"Regardless,"},"a":"C"},{"s":"Transitions","n":127,"p":"Visually distinguishing the common raven\n(Corvus corax) from the Chihuahuan raven\n(Corvus cryptoleuc A":"Meanwhile,","B":"That is,","C":"For example,","D":"Nonetheless,"},"a":"B"},{"s":"Transitions","n":131,"p":"John Thomson employed the pseudonym\n\"Gracchus\" – the name of an ancient Roman\npolitician – in political essays he wrote in 1795,\na choice that accomplished far more than simply\nconcealing his authorship. ________ it\nwasn’t an arbitrary pen name but rather a\ncomplex rhetorical strategy through which\nThomson aligned his political views with the\nvenerated republican ideals of the ancient world,\nthereby bolstering the authority of his writing.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Indeed,","B":"Conversely,","C":"In addition,","D":"However,"},"a":"A"},{"s":"Transitions","n":132,"p":"In Annie Dillard’s Pilgrim at Tinker Creek –\nwhere, early on, the author marvels at a single\ngoldfish’s delicate fins but later winces when\nimagining a horde of goldfish laying and eating\ntheir own eggs –Dillard struggles to reconcile the\ncomplicated juxtapositions of the natural world.\n________ nature’s mesmerizing intricacy\nand pitiless harshness prove inextricably linked\nfor Dillard, like \"two branches of the same\ncreek.\"","q":"Which choice completes the text with the most logical transition?","o":{"A":"Ultimately,","B":"To that end,","C":"Hence,","D":"Moreover,"},"a":"A"},{"s":"Transitions","n":133,"p":"Textile artist Amber Joy Greenidge-Sabral\nwanted to avoid using harsh synthetic dyes that\ncould be damaging to the environment.\n______________ she began\nexperimenting with more environmentally\nfriendly natural dye methods, using organic\nmaterials like Texas paintbrush and madder root\nfor their natural brown and red colors.","q":"Which choice completes the text with the most logical transition?","o":{"A":"With this in mind,","B":"To sum up,","C":"Nevertheless,","D":"In actuality,"},"a":"A"},{"s":"Transitions","n":134,"p":"While most animals prefer the safety of\nnighttime migration, many poisonous\namphibians – a category that includes the\nred-bellied newt and the fire salamander – safely\nengage in migratory behavior during the day.\n__________ with the sun in the sky, the\namphibians’ striking color patterns deter\nvisually oriented daytime predators by serving\nas a warning of toxicity.","q":"Which choice completes the text with the most logical transition?","o":{"A":"At that time,","B":"For example,","C":"In other words,","D":"However,"},"a":"A"},{"s":"Transitions","n":135,"p":"Residents of Cairo, Egypt, rely on its rapid\ntransit system, the Cairo Metro, for millions of\ntrips each year. ____________ city\nofficials strive to maintain the system’s 71\nstations to ensure each of these journeys is as\nsmooth as possible.","q":"Which choice completes the text with the most logical transition?","o":{"A":"For this reason,","B":"However,","C":"For example,","D":"Alternatively,"},"a":"A"},{"s":"Transitions","n":136,"p":"Box modeling, used by digital artists to develop\n3D assets for video games, yields objects with\nprecise mathematical proportions. Granted, as\nthey are formed from perfect geometric shapes,\nsuch 3D elements lack organic realism;\n__________ post-modeling processes such\nas UV surface mapping are needed to achieve\nthe level of verisimilitude gamers expect.","q":"Which choice completes the text with the most logical transition?","o":{"A":"consequently,","B":"similarly,","C":"in sum,","D":"however,"},"a":"A"},{"s":"Transitions","n":137,"p":"In his painting At the Cycle-Race Track, Jean\nMetzinger aims to depict a bike race in\nfour-dimensional space. Of course, Metzinger’s\npainting doesn’t technically represent a fourth\ndimension; humans can only see in three\ndimensions. ______________ by\ndepicting the race through multiple,\nsimultaneous perspectives, Metzinger offers a\nfascinating glimpse at what this other universe\nmight look like.","q":"Which choice completes the text with the most logical transition?","o":{"A":"For example,","B":"That said,","C":"In other words,","D":"Moreover,"},"a":"B"},{"s":"Transitions","n":138,"p":"In 2015, geologist Peter Rogerson recalculated\nthe geographic center of Nebraska, which had\npreviously been determined in 1920 by the US\nGeological Survey (USGS). The USGS,\nRogerson contended, had omitted important\nconsiderations, not least the curvature of the\nearth. __________ the state’s\nUSGS-determined center – a point 10 miles\nnorthwest of the municipality of Broken Bow –\nwas inaccurate.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Next,","B":"That being said,","C":"Hence,","D":"However,"},"a":"C"},{"s":"Transitions","n":139,"p":"On August 5, 1938, aviator Douglas Corrigan\nreceived a ticker-tape parade in New York City\nin recognition of his transatlantic flight. Of the\n206 ticker-tape parades held between 1886 and\n2022, a number were for achievements in\naviation. ____________ Corrigan’s\nparade was just one of 16 honoring pilots.","q":"Which choice completes the text with the most logical transition?","o":{"A":"In addition,","B":"Therefore,","C":"Indeed,","D":"Nevertheless,"},"a":"C"},{"s":"Transitions","n":140,"p":"Guard cells are specialized cells that are part of\na plant’s pores. These cells help regulate the\namount of carbon dioxide a plant takes in.\n__________ they help regulate a plant’s\nwater loss.","q":"Which choice completes the text with the most logical transition?","o":{"A":"In conclusion,","B":"Additionally,","C":"Instead,","D":"Previously,"},"a":"B"},{"s":"Transitions","n":141,"p":"Elara, one of the eighty known moons of\nJupiter, is designated as Jupiter VII (\"VII\"\nmeans \"7\"). Roman numerals typically indicate\nthe order in which the moons were named rather\nthan the order of their proximity to Jupiter. It\nis incorrect to assume, ______________\nthat Elara is the seventh moon from Jupiter in\nterms of proximity.","q":"Which choice completes the text with the most logical transition?","o":{"A":"however,","B": likewise,","D":"moreover,"},"a":"A"},{"s":"Transitions","n":160,"p":"In Ethiopia, citizens must be at least 18 years\nold to vote in their country’s elections.\ncitizens in Cuba need only be\n16 years old to cast their vote.","q":"Which choice completes the text with the most logical transition?","o":{"A":"By contrast,","B":"Firstly,","C":"Forexample,","D":"Therefore,"},"a":"A"},{"s":"Transitions","n":161,"p":"In astrophysics, a ring of debris orbiting a larger\nobject within the object’s Roche limit is\nexpected to persist as a ring, whereas a ring of\ndebris orbiting outside this limit would likely\naccrete into a satellite (e.g., a moon). Bruno\nMorgado and colleagues,\ndetected a dense ring of material orbiting the\ntrans-Neptunian object Quaoar at a distance of\n2,500 miles, well outside the calculated Roche\nlimit of 1.100 miles, that has remained Intact.","q":"Which choice completes the text with the most logical transition?","o":{"A":"likewise,","B":"for example,","C":"fittingly,","D":"though,"},"a":"D"},{"s":"Transitions","n":162,"p":"To notice subtle variations in the progression of\nthe still life painting genre in Europe, first\nconsider Abraham Mignon’s \"Still Life with\nFruit and a Beaker on a Cock’s Foot\" from 1669;\ncompare it to Jean-Siméon\nChardin’s \"Still Life with Herrings\" from 1735.","q":"Which choice completes the text with the most logical transition?","o":{"A":"instead,","B":"next,","C":"still,","D":"therefore,"},"a":"B"},{"s":"Transitions","n":163,"p":"In an ekphrastic poem, a poet explores a work\nof visual art, such as a drawing, sculpture, or\npainting. Robert Hayden’s 1994 poem \"Monet’s\nWaterlilies,\" for example, meditates on Claude\nMonet’s 1899 painting Water Lilies: Elizabeth\nAlexander’s 2001 poem \"Islands Number Four,\"\ntakes a painting as its subject:\nAgnes Martin’s 1961 work Islands No. 4.","q":"Which choice completes the text with the most logical transition?","o":{"A":"conversely,","B":"nevertheless,","C":"hence,","D etic response to-and implicit\ncritique of-England’s rapid industrialization and\nurbanization at that time.\ndespite its idyllic quality, the poem bears the\nimprint of the dramatic changes affecting\nEnglish life.","q":"Which choice completes the text with the most logical transition?","o":{"A":"For example,","B":"As such,","C":"Nevertheless,","D":"Moreover,"},"a":"C"},{"s":"Transitions","n":175,"p":"Generally, sleek vehicles are more aerodynamic\nthan bulkier ones. For example, the streamlined\nnose of the T-38 Talon jet helps it glide through\nwind with relative ease. _____ a boxy\nsemitruck encounters more wind resistance,\nmaking it less aerodynamic.","q":"Which choice completes the text with the most logical transition?","o":{"A":"As a result,","B":"Specifically,","C":"In conclusion,","D":"On the other hand,"},"a":"D"},{"s":"Transitions","n":176,"p":"To notice subtle variations in the progression of\nthe still life painting genre in Europe, first\nconsider Willem van Aelst’s \"Still Life with\nDead Game\" from 1661;\ncompare it to Jan van\nHuysum’s \"Still Life with Flowers\" from 1723.","q":"Which choice completes the text with the most logical transition?","o":{"A":"therefore,","B":"still,","C":"instead,","D":"next,"},"a":"D"},{"s":"Transitions","n":177,"p":"Soil polluted with iron (a heavy metal) is\nharmful to many plants and animals, but the\nplant species Limnocharis flava, or yellow\nvelvetleaf, not only thrives in such conditions\nbut also helps remediate them. As a metal\nhyperaccumulator, Limnocharis flava absorbs a\nlarge amount of iron and stores it safely in its\nroots and shoots: _____ iron\nconcentrations in the soll decrease.","q":"Which choice completes the text with the most logical transition?","o":{"A":"specifically,","B":"nevertheless,","C":"in addition,","D":"accordingly,"},"a":"D"},{"s":"Transitions","n":178,"p":"In a 2024 study, researchers investigating the\nbiodiversity of trees in Amsterdam counted and\nclassified the city’s trees.  Cole, to visual artists like\nAllen Stringfellow and Frank Hayden.\nit has garnered a reputation as\na hub of Black art and culture in Chicago.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Accordingly,","B":"On the other hand,","C":"Nevertheless,","D":"Periodically,"},"a":"A"},{"s":"Transitions","n":189,"p":"For several centuries after the birth of opera in\nsixteenth-century Florence, Italian remained the\ndefault language in which most opera scores\nwere written. _____ opera singers\ntoday, such as the soprano Pretty Yende,\nencounter a wide range of Italian terms-from\nfurioso (furiously) to affrettando (at a hurried\ntempo)-when following many eighteenth-century\nopera scores.","q":"Which choice completes the text with the most logical transition?","o":{"A":"However,","B":"Thus,","C":"Lastly,","D":"Granted,"},"a":"B"},{"s":"Transitions","n":190,"p":"At Storm King Art Center, an outdoor sculpture\npark in New York, Herbert Ferber’s Konkapot\nIlis exposed to rain, snow, heat, and humidity.\nit remains in good condition\ndue to its material: Ferber’s sculpture is made\nof corrosion-resistant steel.","q":"Which choice completes the text with the most logical transition?","o":{"A":"As a result,","B":"That said,","C":"In addition,","D":"On the contrary,"},"a":"B"},{"s":"Transitions","n":191,"p":"Known as an \"empire on which the sun never\nsets,\" the Spanish Empire once controlled\nportions of five continents. Its legacy can still be\nseen, and heard, in the Spanish-speaking nation\nof Cuba, which gained its independence from\nSpain in the nineteenth century.\na former colony’s tie to the\nSpanish Empire is so tenuous that Spanish is\nseldom spoken there; an example is Sardinia,\nwhich ceased to be part of the empire in 1720.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Sometimes,","B":"On the other hand,","C":"At the same time,","D":"In addition,"},"a":"B"},{"s":"Transitions","n":192,"p":"While studying joro¯ spiders, a large species\noriginally from East Asia, University of Georgia\nresearchers wondered if the spiders’ rapid spread\nthroughout the southeastern US was a result of\naggressive behavior. _____ they\ndiscovered that jorõ spiders are gentle giants\nwho react to even minor disturbances by\n\"freezing\" in place for an hour or more.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Instead,","B":"Therefore,","C":"For example,","D":"In other words,"},"a":"A"},{"s":"Transitions","n":193,"p":"Some bands choose a name that’s as unique as\npossible to distinguish themselves from other\nbands. The experimental rock band Boris,\ntook a different approach.\nThey chose to name themselves after a song by\na well-known band, the Melvins.","q":"Which choice completes the text with the most logical transition?","o":{"A":"therefore,","B":"secondly,","C":"by contrast,","D":"for example,"},"a":"C"},{"s":"Transitions","n":194,"p":"Portuguese researcher Isabel C.F.R. Ferreira\nreports that the cinnamic acid in termite\nmushrooms benefits the mushroom by\ncombating harmful molecules called free\nradicals. _____ Ferreira suggests that\nthe acid can promote cellular health in humans,\nwho also experience free radical damage.","q":"Which choice completes the text with the most logical transition?","o":{"A":"For example,","B":"Moreover,","C":"Conversely,","D":"Rather,"},"a":"B"},{"s":"Transitions","n":195,"p":"The Eloi are not real: they are fictional\ncreatures that feature in H.G. Wells’s acclaimed\nscience fiction novella The Time Machine. the\nEloi were prime candidates for inclusion in Jorge\nLuis Borges and Margarita Guerrero’s The Book\nof Imaginary Beings, a compendium of\nfantastical entities from legend and literature.","q":"Which choice completes the text with the most logical transition?","o":{"A":"In reality,","B":"Granted,","C":"For example,","D":"As such,"},"a":"D"},{"s":"Transitions","n":196,"p":"In contrast to firs  completes the text with the most logical transition?","o":{"A":"usually,","B":"for instance,","C":"in any case,","D":"in doing so,"},"a":"D"},{"s":"Transitions","n":200,"p":"The lack of accessible written sources is a\ncommon challenge faced by biographers of\npre-nineteenth-century subjects.\nwhen writing his biography of\nAlexander Hamilton (1755-1804), historian Ron\nChernow had at his disposal Harold Syrett’s\n26-volume, 19,000-document Papers of\nAlexander Hamilton.","q":"Which choice completes the text with the most logical transition?","o":{"A":"To take one well-known example,","B":"In accordance with this premise,","C":"It thus came as no surprise that,","D":"On the other end of the spectrum,"},"a":"D"},{"s":"Transitions","n":201,"p":"At a time when many women writers used male\npseudonyms to gain greater freedom of\nself-expression by evading gender conventions,\nKatherine Bradley and Edith Cooper adapted\nthe practice by publishing poetry, prose, and\ndrama for four decades under the shared name\nMichael Field. _____ the duo was\nable to express the joint creative vision that\nsustained their long personal and professional\npartnership.","q":"Which choice completes the text with the most logical transition?","o":{"A":"In this way,","B":"For instance,","C":"Later,","D":"On the other hand,"},"a":"A"},{"s":"Transitions","n":202,"p":"In a 2005 study by Mellado et al., the\nresearchers’ aim was to analyze the diet\ncomposition of cattle in Coahuila, Mexico.\nthey aimed to analyze the ratio\nof three different plant subtypes within these\nanimals’ diet: graminoids, forbs, and browse.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Instead,","B":"All the same,","C":"Therefore,","D":"Specifically,"},"a":"D"},{"s":"Transitions","n":203,"p":"John Quincy Adams employed the pseudonym\n\"Marcellus\"-a reference to a leader of an ancient\nRoman army-in political essays he wrote in 1793,\na choice that accomplished far more than simply\nconcealing his authorship. _____ it\nwasn’t an arbitrary pen name but rather a\ncomplex rhetorical strategy through which\nAdams aligned his political views with the\nvenerated republican ideals of the ancient world,\nthereby bolstering the authority of his writing.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Conversely,","B":"In addition,","C":"However,","D":"Indeed,"},"a":"D"},{"s":"Rhetorical Synthesis","n":1,"p":"While researching a topic, a student has taken\nthe following notes:\n• The Music by Black Composers (MBC) project\naims to inspire aspiring music students by\narchiving and sharing information about the\nmusic of Black classical composers.\n• George Theophilus Walker is a Black classical\nmusic composer included in MBC’s Historic\nComposers Directory.\n• He was born in 1922 and died in 2018.","q":"Which choice most effectively uses information from the given sentences to set up a discussion of Walker’s career for an audience already familiar with the MBC Project?","o":{"A":"While George Theophilus Walker is considered a great composer, there are many more such composers included in MBC’s Historic Composers Directory.","B":"Born in 1922, George Theophilus Walker passed away in 2018 according to the MBC project.","C":"Among the many talented figures included in the MBC project is classical music composer George Theophilus Walker.","D":"The MBC project’s Historic Composers Directory highlights Black classical composers of the past, such as George Theophilus Walker (1922-2018), in order to inspire music students to become the classical composers of the future."},"a":"C"},{"s":"Rhetorical Synthesis","n":2,"p":"While researching a topic, a student has taken\nthe following notes:\n• Blackberries are fruits that contain ascorbic\nacid, an essential nutrient for humans.\n• Every 100 grams (g) of blackberries contains\n21 milligrams (mg) of ascorbic acid.\n• Many animals can make ascorbic acid in their\nbodies, but humans cannot.\n• Humans must get ascorbic acid from foods,\nincluding fruits and vegetables.\n• Ascorbic acid is also known as vitamin C.","q":"The student wants to specify how much vitamin C is in blackberries. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Many animals can make ascorbic acid, which is also known as vitamin C, in their bodies, but humans cannot.","B":"There is 21 mg of vitamin C in every 100 g of blackberries.","C":"Since humans cannot make vitamin C in their bodies, they must get this essential nutrient from foods like blackberries.","D":"Blackberries contain vitamin C, which humans must get from food."},"a":"B"},{"s":"Rhetorical Synthesis","n":3,"p":"While researching a topic, a student has taken\nthe following notes:\n• Sister cities are pairs of cities that form social\nor legal partnerships to promote each other’s\ncultures.\n• Previously known as \"town twinning,\" the\nconcept of sister cities evolved in Europe after\nWORLD WAR II as a way to repair bonds\nbetween cities.\n• Many cities in New York State maintain such\npartnerships with cities around the world.\n• Rhinebeck, New York, and Larreynaga,\nNicaragua, became sister cities in 1989.","q":"The student wants to emphasize the duration of Rhinebeck and Larreynaga’s sister city relationship. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Since the end of WORLD WAR II, sister cities such as Rhinebeck, New York, and Larreynaga, Nicaragua, have continued to form social partnerships to promote each other’s cultures.","B":"As sister cities, Rhinebeck, New York, and Larreynago, Nicaragua, have engaged in cultural exchange and partnerships since 1989.","C":"Larreyna, which became a sister city–or \"twin town\"-to Rhinebeck, New York, is located in Nicaragua.","D":"Despite their distance from each other, the sister cities of Rhinebeck, New York, and Larreyna Nicaragua have enjoyed the same partnerships as many other sister cities."},"a":"B"},{"s":"Rhetorical Synthesis","n":4,"p":"While researching a topic, a student has taken\nthe following notes:\n• In a 2011 study, Loydi tested the effect of\nplant litter on seeding emergence in a grassland\nsetting.\n• Plant litter includes dead leaves and other\nplant material.\n• The test site was a mesic grassland in\nArgentina.\n• It was in a subtropic climate with year-round\nrain.\n• The researcher found that in these\nenvironmental conditions, the presence of plant\nlitter had a neutral effect on seeding emergence.","q":"Which choice most effectively uses information from the given sentences to specify the test site’s climate?","o":{"A":"Loydi’s study was conducted in a subtropical, climate with year-round rain.","B":"A test was conducted in Argentina to study the effect of plant litter on seedling emergence in a given climate.","C":"Loydi tested the effect of dead leaves and other plant material on seedling emergence in Argentina.","D":"In a study, Loydi found that the presence of plant litter had a neutral effect on seedling emergence."},"a":"A"},{"s":"Rhetorical Synthesis","n":5,"p":"While researching a topic, a student has taken\nthe following notes:\n• Trans Siberrean Orchestra (OTS) is a band\nfrom US that was created in 1996.\n• The band’s sound combines the genres of hard\nrock and classical music, with an epic assembly\nof nearly fifty musicians that includes over a\ndozen singers.\n• Musicians are regularly invited to perform with\nOTS on tour.\n• Keyboardist Paul Morris toured with OTS in\n2000.\n• Electric violinist Alison toured with OTS in\n2008.","q":"Which choice most effectively uses information from the given sentences to emphasize the role Paul Morris played when performing with OTS?","o":{"A":"In 2000, Paul Morris performed with OTS as a touring keyboardist.","B":"From keyboardist Paul Morris to electric violinist Alison, musicians all over the world have taken the opportunity to perform with OTS.","C":"Musicians Paul Morris and Alison both toured with OTS.","D":"It was in 2000 that keyboardist Paul Morris performed with OTS."},"a":"A"},{"s":"Rhetorical Synthesis","n":6,"p":"While researching a topic, a student has taken\nthe following notes:\n• Maya Lin is an American artist known for her\nmemorials and works of installation art.\n• She completed the Women’s Table in 1993.\n• It is a memorial sculpture consisting of\nthirty-two-ton granite fountain, and it is\ndesigned to commemorate female students at\nYale University.\n• She completed Untitled in 1997.\n• It is an installation artwork composed of wood\nthat fills an entire gallery room.","q":"Which choice most effectively uses information from the given sentences to emphasize the difference between the two works?","o":{"A":"Maya is well known for her memorials and installation art, such as the Women’s table and Untitled.","B":"Completed in 1997, respectively, the Women’s Table and Untitled are both large scale works.","C":"Maya’s Women’s Table is a memorial sculpture, while Untitled is an installation artwork.","D":"Though Maya’s Untitled is not a memorial, its gallery-filling scale may call to mind her imposing Women’s Table, which consists of a thirty-ton-granite fountain."},"a":"C"},{"s":"Rhetorical Synthesis","n":7,"p":"While researching a topic, a student has taken\nthe following notes:\n• Epistolary novels are novels written primarily\nas a series of fictional documents, typically\nletters.\n• Sometimes, the documents are journal entries,\nnewspaper clippings, and more.\n• Julie, or The New Heloise (1761) is an\nepistolary novel by French author Jean Jacques\nRousseau.\n• It consists primarily of letters sent between a\nman and a woman living in a small French town.\n• Absolutely Normal Chaos (1990) is an\nepistolary novel by American author Sharon\nCreech.\n• It consists primarily of journal entries written\nby a student during her summer vacation.","q":"The student wants to emphasize a difference between the two novels. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The French author Jean Jacques Rousseau and the American author Sharon Creech have written epistolary novels.","B":"While Julie, or The New Heloise and Absolutely Normal Chaos are both epistolary novels, the former is composed primarily of letters and the latter of journal entries.","C":"Some epistolary novels consist primarily of journal entries, but most, like Jean Jacques Rousseau’s Julie, or The New Heloise, consist primarily of letters.","D":"Jean Jacques Rousseau’s Julie, or The New Heloise, and Sharon Creech’s Absolutely Normal Chaos demonstrate the variety of documents that can be used in epistolary novels."},"a":"B"},{"s":"Rhetorical Synthesis","n":8,"p":"While researching a topic, a student has taken\nthe following notes:\n• The Mohs scale of mineral hardness is a ten\npoint scale that orders minerals by hardness\nbased on their ability to scratch other minerals.\n• Minerals with larger numbers are harder than\nminerals with smaller numbers and can leave\nvisible scratches on them.\n• Minerals with smaller numbers are softer than\nminerals with larger numbers and cannot leave\nvisible scratches on them.\n• The mineral calcite has a Mohs scale number\nof 3.\n• The mineral apatite has a Mohs scale number\nof 5.\n• The mineral topaz has a Mohs scale number of\n8.","q":"The student wants to explain how hard apatite is in relation to other minerals. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"In the Mohs scale of mineral hardness, topaz (8) is ranked higher than calcite (3)","B":"Calcite, topaz, and apatite can be ordered by their ability to leave visible scratches on other minerals.","C":"Topaz has a Mohs scale number of 8, which means that it can scratch nor only calcite but also apatite.","D":"Apatite has a Mohs scale number of 5, which means that it is harder than calcite (3) but softer than topaz (8)."},"a":"D"},{"s":"Rhetorical Synthesis","n":9,"p":"While researching a topic, a student has taken\nthe following notes:\n• Kale is a vegetable that contains ascorbic acid,\nan essential nutrient for human.\n• Blueberries are fruits that contain ascorbic\nacid.\n• There is 120 milligrams (mg) of ascorbic acid\nper every 100 grams (g) of kale.\n• There is 10 mg of ascorbic acid per every 100\ng of blueberries.\n• Humans cannot make ascorbic acid in their\nbodies, so they must get it from foods, including\nfruits and vegetables.\n• Ascorbic acid is also known as vitamin C.","q":"The student wants to make and support a claim that kale is a better source of vitamin C than blueberries are. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Kale contains ascorbic acid (which humans cannot make in their bodies) and blueberries do too.","B":"Blueberries contain 0.1 mg of vitamin C per g, but kale is a better source of vitamin C: in fact, kale contains 1.2 mg per g.","C":"Kale is a better source of vitamin C, also known as ascorbic acid, than blueberries are.","D":"Humans must get vitamin C from foods like Kale and blueberries because they cannot make it in their bodies"},"a":"B"},{"s":"Rhetorical Synthesis","n":10,"p":"While researching a topic, a student has taken\nthe following notes:\n• A currency is a money system.\n• Sometimes, countries adopt a new currency to\nreplace an older one.\n• Mozambique adopted the escudo as its official\ncurrency in 1914.\n• The metical replaced the escudo in 1980.\n• The metical remains Mozambique’s official\ncurrency.","q":"The student wants to specify how long Mozambique officially used the escudo. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Countries sometimes adopt new currency systems, as Mozambique did when it replaced the escudo with the metical.","B":"Though Mozambique currently uses the metical, the country’s former official currency was introduced in 1914.","C":"The escudo was Mozambique’s official currency from 1914 to 1980.","D":"The metical has been Mozambique’s official currency since 1980, when it replaced the escudo."},"a":"C"},{"s":"Rhetorical Synthesis","n":11,"p":"While researching a topic, a student has taken\nthe following notes:\n• The Future of Nostalgia is a scholarly book by\nliterary theorist Svetlana Boym.\n• The book provides a multifaced exploration of\nthe concept of nostalgia.\n• Chapter 14 discusses themes of nostalgia in\nJoseph Brodsky’s writing.\n• Chapter 17 discusses various skeptics’ takes on\nthe concept of nostalgia.\n• In chapter 17, Boym writes, \"The poethics of\nnostalgia combines estrangement and human\nsolidarity, affect and reflection.\"","q":"The student wants to provide a quotation from chapter 17. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"After discussing themes of nostalgia in Joseph Brodsky’s writing, Svetlana Boym goes on to discuss various skeptics’ takes on the concept of nostalgia.","B":"Svetlana Boym’s The Future of Nostalgia is a multifaceted exploration of nostalgia.","C":"In an exploration of various skeptics’ takes on the concept of nostalgia, Svetlana Boym writes, \"The poethics of nostalgia combines estrangement and human solidarity, affect and reflection.\"","D":"Svetlana Boym discusses themes of nostalgia in Joseph Brodsky’s writing in chapter of her book."},"a":"C"},{"s":"Rhetorical Synthesis","n":12,"p":"While researching a topic, a student has taken\nthe following notes:\n• The Archipelago-Madrean Mountains are\nlocated in northwestern Mexico.\n• They cover an area of 1,038 square miles (mi²)\n• The Big Hatchet Mountains are located in the\nsouthwestern United States.\n• They cover an area of 65 mi²\n• These mountain ranges are two of the dozens\nof \"sky islands\" in the southwestern US and\nnorthwestern Mexico.\n• A sky island is an isolated mountain range\nwhose environment differs dramatically from\nthat of the surrounding lowlands.","q":"The student wants to emphasis the similarity between the two mountain ranges. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"There are dozens of different mountain ranges in located in the southwestern US and northwestern Mexico.","B":"The Archipelago-Madrean Mountains and the Big Hatchet Mountains are both inland mountain ranges whose surroundings are different from those of the surrounding mountains.","C":"The Archipelago-Madrean Mountains cover an area of 1,038 mi², while the Big Hatchet Mountains cover an area of 65 mi².","D":"Even though they are both sky islands, the Archipelago-Madrean Mountains and the Big Hatchet Mountains are located in different countries."},"a":"B"},{"s":"Rhetorical Synthesis","n":13,"p":"While researching a topic, a student has taken\nthe following notes:\n• Ynés Mexía was a Mexican American botanist.\n• Between 1917 and 1938, she collected over\n150,000 botanical samples throughout the\nAmericas.\n• She collected a sample of Trixis\nantimenorrhoea in Minas Gerais, Brazil, on\nJune 26, 1930.\n• She collected a sample of Stephanomeria\nthurberi in Chihuahua, Mexico, on May 27,\n1929.\n• These specimens are members of the\nAsteraceae family.\n• They can now be viewed online at the C.V.\nStarr Virtual Herbarium.","q":"Which choice most effectively uses information from the given sentences to emphasize when she collected both of the samples?","o":{"A":"Thousands of botanical samples collected by Ynés Mexía can now be found in one place: online at the C.V. Starr Virtual Herbarium.","B":"While both specimens collected by Ynés Mexía are members of the same family, Trixis antimenorrhoea was found in Minas Gerais and Stephanomeria thurberi was found in Chihuahua.","C":"June in 1930, Ynés Mexía added a new specimen to her growing collection of botanical samples: Trixis antimenorrhoea of the Asteraceae family.","D":"Ynés Mexía collected a sample of Trixis antimenorrhoea in June of 1930, after collecting Stephanomeria thurberi in May of 1929."},"a":"D"},{"s":"Rhetorical Synthesis","n":14,"p":"While researching a topic, a student has taken\nthe following notes:\n• Calida Garcia Rawles is an African American\npainter.\n• She is known for her large-scale, hyperrealistic\npaintings depicting African American figures in\nwater.\n• The painting Lightness of Being (24 × 30 in)\ndepicts a young man with his arms outstretched\nfloating on the right side of the canvas.\n• Lost in the Shuffle (36 × 24 in) depicts two\nyoung men with their arms outstretched floating\nin the bottom left and upper right corners of the\ncanvas.\n• She paints the water with vivid blue colors,\nincluding sky blue and indigo.\n• The mood in the painting is calm.","q":"Which choice most effectively uses information from the given sentences to emphasize the location of the figures in Lost in the Shuffle?","o":{"A":"At by inches, Rawles’s Lost in the Shuffle is even larger than the sizable 24-by 30-inch painting Lightness of Being.","B":"Rawles captures the water in paintings such as Lightness of Being and Lost in the Shuffle in vivid hues of sky blue and indigo.","C":"In Rawles’s painting Lost in the Shuffle, two young men are depicted in the bottom left and upper right corners of the canvas.","D":"While the number of figures may differ, constant among Rawles’s hyperrealistic works is the calm mood that painting evokes."},"a":"C"},{"s":"Rhetorical Synthesis","n":15,"p":"While researching a topic, a student has taken\nthe following notes:\n• Grimanesa Amoros is a Peruvian American\nartist.\n• She is well known for her large-scale LED light\nsculptures.\n• Argentum debuted in 2018 at the Bronx\nMuseum of the Arts in New York City, New\nYork.\n• It is made of iridescent multicolored LED\ndomes.\n• It occupies 253 cubic feet of space.","q":"Which choice most effectively uses information from the given sentences to emphasize when and where Argentum debuted?","o":{"A":"As is common of Grimanesa Amoros’s sculptures, the iridescent multicolored LED domes of Argentum cut an imposing cubic foot figure when the piece debuted","B":"Artist Grimanesa Amoros often works with light in her sculptures, which tend to be large in scale.","C":"In 2018, Grimanesa Amoros debuted Argentum in New York City, New York.","D":"Grimanesa Amoros is a Peruvian American artist who often works with LED light in her large-scale sculptures, such as Argentum [2018]."},"a":"C"},{"s":"Rhetorical Synthesis","n":16,"p":"While researching a topic, a student has taken\nthe following notes:\n• The United States has designated more than\n500 areas National Wildlife Refuges (NWRs).\n• Some NWRs were established specifically to\nprotect endangered species.\n• The James River NWR is a 4,147-acre area in\nVirginia, on the Atlantic coast.\n• It was established to protect the endangered\nbald eagle.\n• The Hopper Mountain NWR is a 2,471-acre\narea in California, on the Pacific coast.\n• It was established to protect the endangered\nCalifornia condor.","q":"The student wants to contrast the two NWRs. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"While the James River NWR is in Virginia, on the Atlantic coast, the Hopper Mountain NWR is in California, on the Pacific coast.","B":"The US has designated more than 500 areas NWRs, including the James River NWR in Virginia.","C":"Both the James River NWR and the Hopper Mountain NWR were established to protect endangered species.","D":"Some NWRs were established specifically to protect endangered species such as the California condor."},"a":"A"},{"s":"Rhetorical Synthesis","n":17,"p":"While researching a topic, a student has taken\nthe following notes:\n• The Botswana Federation of Trade Unions\n(BFTU) is a national union federation for the\nAfrican nation of Botswana.\n• It helps improve conditions for workers in that\nnation.\n• ITUC-Africa is a regional union federation\nthat represents national union federations across\nAfrica.\n• It represents the BFTU.","q":"Which choice most effectively uses information from the given sentences to explain the relationship between ITUC-Africa and the BFTU?","o":{"A":"ITUC-Africa is a regional union federation.","B":"The BFTU is one of the national union federations represented by ITUC-Africa.","C":"National union federations, such as the BFTU, work to improve conditions for workers in their member nations.","D":"The BFTU is a national union federation."},"a":"B"},{"s":"Rhetorical Synthesis","n":18,"p":"While researching a topic, a student has taken\nthe following notes:\n• Silent films can be valuable historical\ndocuments of their time.\n• Ninety percent of silent films made before 1930\nare now lost.\n• A film is considered lost when no remaining\ncopies are known to exist.\n• Director Oscar Micheaux’s 1922 silent film\nThe Dungeon is lost.\n• Director Jay Marchant’s 1925 silent film The\nFighting Ranger is lost.\n• Archives such as the Pacific Film Archive in\nBerkeley, California, help preserve some of the\nremaining films from the 1920s.","q":"Which choice most effectively uses information from the given sentences to emphasize a similarity between the two movies?","o":{"A":"The Dungeon (1922) was directed by Oscar Micheaux, and The Fighting Ranger (1925) was made by Jay Marchant.","B":"Archives such as the Pacific Film Archive in Berkeley, California, play an integral part in preserving some of the surviving silent films from the 1920s.","C":"Jay Marchant’s film The Fighting Ranger is now considered lost, meaning no copies are known to exist.","D":"The Dungeon (1922) and The Fighting Ranger (1925) would be valuable historical documents of the era, but sadly both silent films are lost."},"a":"D"},{"s":"Rhetorical Synthesis","n":19,"p":"While researching a topic, a student has taken\nthe following notes:\n• Antonio Stradivari (1644-1737) made about\n1,000 violins in his lifetime.\n• Musicians prize his Stradivarius violins for\ntheir famed sound quality.\n• Many of the 500 or so that exist today are\nnamed for a previous owner.\n• The Leonora Jackson Stradivarius is named\nfor Leonora Jackson, an American violinist.","q":"Which choice most effectively uses information from the given sentences to emphasize why Stradivarius violins are prized by musicians?","o":{"A":"Many Stradivarius violins, like the Leonora Jackson, get their name from a former owner.","B":"Among musicians, violins made by Antonio Stradivari are renowned for their sound quality.","C":"Antonio Stradivari, a famous violin maker, lived from year to 1737.","D":"Leonora Jackson was an American violinist who once owned a Stradivarius violin."},"a":"B"},{"s":"Rhetorical Synthesis","n":20,"p":"While researching a topic, a student has taken\nthe following notes:\n• Gianpaolo Bellini is an Italian particle\nphysicist.\n• Particle physicists study subatomic particles.\n• Neutrinos are some of the least understood\nsubatomic particles.\n• Neutrinos were first discovered in the mid-\ntwentieth century.\n• Bellini is known for his research on solar and\ngeoneutrinos.","q":"Which choice most effectively uses information from the given sentences to specify Bellini’s role in neutrino research?","o":{"A":"Particle physicist Gianpaolo Bellini has worked to advance the scientific understanding of neutrinos through his research on solar and geoneutrinos.","B":"Neutrinos are a type of subatomic particle that particle physicists are still trying to understand.","C":"First discovered in the mid-twentieth century, neutrinos are a type of subatomic particle.","D":"Gianpaolo Bellini is recognized for his particle physics research."},"a":"A"},{"s":"Rhetorical Synthesis","n":21,"p":"While researching a topic, a student has taken\nthe following notes:\n• Hina Hanta is an online archive curated by the\nChoctaw Nation of Oklahoma.\n• It features images of cultural artifacts relevant\nto the history of the Choctaw people.\n• It features a spoon (ivpish ishtimpa in\nChoctaw) made of buffalo horn.\n• The spoon was made in 1800.\n• Hina Hanta features a purse (shukcha in\nChoctaw) made of beaded leather.\n• The purse was made in 1949.","q":"The student wants to emphasize a similarity between the two artifacts. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The buffalo horn spoon (ivpish ishtimpa in Choctaw) is featured in the Hina Hanta archive.","B":"Featured in the Hina Hanta archive, the buffalo horn spoon and the beaded leather purse are both cultural artifacts relevant to the history of the Choctaw people.","C":"Not all artifacts in the Hina Hanta archive are from the 1800s; indeed, the beaded leather purse is from 1949.","D":"There are more recent artifacts in the Hina Hanta archive than the buffalo horn spoon from 1800."},"a":"B"},{"s":"Rhetorical Synthesis","n":22,"p":"While researching a topic, a student has taken\nthe following notes:\n• At London and New York Fashion Weeks,\nfashion designers debut new clothing collections.\n• Color consultants create trend reports on the\npopular colors at a given Fashion Week.\n• A report on 2018 London Fashion Week noted\nthe popularity of an imaginative purple shade\nthat was cool in tone and bright in intensity.\n• A report on 2019 New York Fashion Week\nnoted the popularity of a deep red shade that was\nwarm in tone and rich in intensity.","q":"Which choice most effectively uses information from the given sentences to explain the role of color consultants at Fashion Week?","o":{"A":"A shade of imaginative purple was an on-trend addition to one color consultant’s report on London Fashion Week.","B":"A color consultant report on New York Fashion Week highlighted the popularity of a deep red shade.","C":"At Fashion Weeks in 2018 and 2019, shades favored by
