 common, the green-throated mango is larger than the horned sungem.","C":"While each exhibits unique traits in common, the green-throated mango and the horned sungem both have black bills.","D":"The horned sungem is a medium-sized hummingbird identifiable by its distinctive multicolored, tufted crown and its short, black, straight bill."},"a":"C"},{"s":"Rhetorical Synthesis","n":159,"p":"While researching a topic, a student has taken\nthe following notes:\n• If a moon orbiting a planet comes close\nenough to that planet, tidal forces can cause the\nmoon to break apart.\n• In a 2022 study, researchers proposed that\nSaturn was once orbited by a large moon they\nnamed Chrysalis.\n• Their simulations indicated that Chrysalis\nwould likely have come very close to Saturn\naround 160 million years ago.\n• At that distance, Chrysalis would have been\nbroken apart by tidal forces.\n• The researchers hypothesized that the resulting\ndebris formed Saturn’s rings.","q":"The student wants to recount the sequence of events proposed by the researchers. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"According to researchers’ simulations, debris from Saturn’s rings would likely have caused Chrysalis – a large moon orbiting Saturn – to break apart around million years ago.","B":"In a study, researchers proposed that Saturn was once orbited by a large moon that broke apart.","C":"Around 160 million years ago, a large moon (Chrysalis) may have come close enough to Saturn that tidal forces broke the moon apart: its debris then formed the planet’s rings.","D":"If a moon orbiting a planet (like Saturn) comes close enough to that planet, tidal forces can cause the moon to break apart."},"a":"C"},{"s":"Rhetorical Synthesis","n":160,"p":"While researching a topic, a student has taken\nthe following notes:\n• A multiyear study called GREEN SURGE\nexamined forty-four different types of UNAs\n(urban natural areas) in cities throughout\nEurope.\n• A primary aim of the study was to determine\nthe benefits of UNAs in these cities.\n• Large urban parks are among the types of\nUNAs included in the study.\n• Large urban parks are defined as green city\nareas reserved for recreational use.\n• They can benefit urban environments by\ncontributing to biodiversity.","q":"The student wants to emphasize an objective of the GREEN SURGE study. Which choice most effectively uses relevant information from to accomplish this goal?","o":{"A":"For multiple years, the GREEN SURGE study was conducted in cities throughout Europe.","B":"To achieve its main objective, the GREEN SURGE study examined forty-four different types of UNAs, including large urban parks.","C":"Determining the benefits of UNAs in European cities was a primary aim of the GREEN SURGE study.","D":"Large urban parks, which were included in the GREEN SURGE study, can benefit urban environments by contributing to biodiversity."},"a":"C"},{"s":"Rhetorical Synthesis","n":161,"p":"While researching a topic, a student has taken\nthe following notes:\n• Maya Lin is an American artist known for her\nmemorials and works of installation art.\n• She completed the Women’s Table in 1993.\n• It is a memorial sculpture consisting of a\nthirty-two-ton granite fountain, and it is\ndesigned to commemorate female students at\nYale University.\n• She completed Silver Upper White River in\n2015.\n• It is an installation composed of recycled silver\nthat fills an entire gallery wall.","q":"The student wants to describe Silver Upper White River to a new audience. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Completed in 2015, Maya Lin’s Silver Upper White River is a large-scale installation artwork composed of recycled silver that fills an entire gallery wall.","B":"Artist Maya Lin is well known for her installation art, such as Silver Upper White River (2015), and for her memorials.","C":"Maya Lin’s Women’s Table is a granite memorial sculpture that commemorates female students at Yale University, while Silver Upper White River is an installation artwork.","D":"Though Maya Lin’s Silver Upper White River (2015) is not a memorial, its gallery-filling scale may call to mind the imposing Women’s Table, which consists of a thirty-two-ton granite fountain."},"a":"A"},{"s":"Rhetorical Synthesis","n":162,"p":"While researching a topic, a student has taken\nthe following notes:\n• Georeferencing is the process of assigning\ngeographic coordinates to an image.\n• This process enables mapping software to place\nthe image in its real-world location.\n• A 2017 project by Tania López Marrero and\ncolleagues georeferenced a set of aerial\nphotographs of Puerto Rico’s coastline taken in\n1930.\n• These photographs are the earliest known\naerial photographs of Puerto Rico.\n• López Marrero’s project provided data that can\nhelp researchers analyze changes in Puerto\nRico’s coastline.","q":"The student wants to define the term \"georeferencing.\" Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Tania Lopez Marrero and colleagues used georeferencing used in their analysis of the earliest known aerial photographs of Puerto Rico.","B":"Georeferencing is the process of assigning geographic coordinates to an image so that mapping software can place it in its real-world location.","C":"A project by Tania López Marrero and colleagues assigned geographic coordinates to photographs of Puerto Rico’s coastline and also used georeferencing.","D":"Georeferenced aerial photographs from López Marrero’s project can help researchers analyze changes in Puerto Rico’s coastline."},"a":"B"},{"s":"Rhetorical Synthesis","n":163,"p":"While researching a topic, a student has taken\nthe following notes:\n• Grimanesa Amoros is a Peruvian American\nartist well known for her LED light sculptures.\n• Her sculpture Uros House is made of smooth\nmulticolored LED domes.\n• It occupies 250 cubic feet of space.\n• Her sculpture Ocupante is made of entangled\nblue and white LED tubes.\n• It occupies 80,000 cubic feet of space.","q":"The student wants to emphasize a similarity between Uros House and Ocupante. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"At 80,000 cubic feet in size, Grimanesa Amoros’s Ocupante cuts a larger figure than the cubic foot Uros House.","B":"Uros House is an LED light sculpture made by Grimanesa Amoros, as is Ocupante.","C":"The smooth LED domes of Grimanesa Amoros’s Uros House stand in contrast to the tangled LED tubes of Ocupante.","D":"Grimanesa Amoros is the artist behind Uros House–a sculpture made of smooth multicolored LED domes."},"a":"B"},{"s":"Rhetorical Synthesis","n":164,"p":"While researching a topic, a student has taken\nthe following notes:\n• Dinosaur fossil specimens can be found at\nscience museums all over the world.\n• A dinosaur fossil specimen nicknamed Stan is\nhoused at the Black Hills Institute in Hill City,\nSouth Dakota.\n• Stan, a Tyrannosaurus, lived in the Late\nCretaceous period.\n• A dinosaur fossil specimen nicknamed\nHorridus is housed at the Melbourne Museum in\nMelbourne, Australia.\n• Horridus, a Triceratops, lived in the Late\nCretaceous period.","q":"The student wants to emphasize a similarity between the two dinosaur fossil specimens. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Both the Tyrannosaurus fossil specimen Stan and the Triceratops fossil specimen Horridus lived in the Late Cretaceous period.","B":"While the Tyrannosaurus fossil specimen Stan is in Hill City, South Dakota, the Triceratops fossil specimen Horridus is in Melbourne, Australia.","C":"Dinosaur fossil specimens can be found at science museums all muse the world, including in Hill City, South Dakota, and Melbourne, Australia.","D":"The Black Hills Institute is home to Stan, a Tyrannosaurus fossil specimen from the Late Cretaceous period."},"a":"A"},{"s":"Rhetorical Synthesis","n":165,"p":"While researching a topic, a student has taken\nthe following notes:\n• Soap forms as the result of a chemical reaction\nbetween fats and either sodium or potassium\nhydroxide.\n• One end of a soap molecule is hydrophobic\n(water repelling), and one end is hydrophilic\n(water attracting).\n• The hydrophobic ends of soap molecules adhere\nto hydrophobic surface contaminants, such as\ndirt and oils.\n• The soap molecules form circular structures\n(micelles) around contaminants.\n• The hydrophilic ends of the molecules encase\nthe micelles in water, lifting the micelles and\ncontaminants off surfaces.","q":"The student wants to explain how soap removes a surface contaminant. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Surface contaminants like dirt and oils are hydrophobic, not hydrophilic—meaning they repel water rather than attract it.","B":"Micelles are circular structures created when soap molecules attach themselves to dirt or oils.","C":"To remove dirt from a surface, soap molecules form a circular structure, or micelle, around the contaminant; next, the molecules encase the micelle in water, lifting it—and the dirt—off the surface.","D":"Dirt, an example of a hydrophobic surface contaminant, can be removed from a surface by soap, which forms as the result of a chemical reaction between fats and either sodium or potassium hydroxide."},"a":"C"},{"s":"Rhetorical Synthesis","n":166,"p":"While researching a topic, a student has taken\nthe following notes:\n• The United States has designated more than\n500 areas National Wildlife Refuges (NWRs).\n• Some NWRs were established specifically to\nprotect endangered species.\n• The Bear Valley NWR is a 4,200-acre area in\nOregon.\n• It was established to protect the endangered\nbald eagle.\n• The Ellicott Slough NWR is a 139-acre area in\nCalifornia.","q":"The student wants to emphasize a similarity between the two NWRs. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The US has designated more than 500 areas NWRS, including the Bear Valley NWR in Oregon.","B":"While the Bear Valley NWR extends across a 4,200-acre area, the Ellicott Slough NWR encompasses only 139 acres.","C":"Some NWRS, such as California’s Ellicott Slough, were established specifically to protect endangered species.","D":"Both the Bear Valley NWR and the Ellicott Slough NWR were established to protect endangered species."},"a":"D"},{"s":"Rhetorical Synthesis","n":167,"p":"While researching a topic, a student has taken\nthe following notes:\n• In botany, strawberries (Fragaria ananassa)\nare classified as fruits.\n• In botany, green beans (Phaseolus vulgaris) are\nclassified as fruits.\n• Green beans are commonly considered\nvegetables because they taste savory.\n• Strawberries are commonly considered fruits\nbecause they taste sweet.","q":"The student wants to emphasize a similarity between strawberries and green beans. Which cholce most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Unlike strawberries, green beans taste savory.","B":"In botany, strawberries (Fragaria ananassa) and green beans (Phaseolus vulgaris) are both classifled as fruits.","C":"While strawberrles are commonly considered fruits, green beans are commonly considered vegetables.","D":"Strawberries, which are botanically classified as fruits, taste sweet and thus are commonly considered fruits."},"a":"B"},{"s":"Rhetorical Synthesis","n":168,"p":"While researching a topic, a student has taken\nthe following notes:\n• Historian Isabel Wilkerson’s book The Warmth\nof Other Suns is about the Great Migration.\n• The Great Migration was a period in\ntwentieth-century US history when over six\nmillion African Americans moved from the rural\nSouth to citles such as New New York.\n• To document this period, Wilkerson narrates\nthe personal journeys of Ida Mae Gladney and\nRobert Pershing Foster, among others.\n• The book won the Hurston/Wright Legacy\nAward in 2011.\n• It also won the Heartland Prize in 2011.","q":"Which choice most effectively uses information from the given sentences to emphasize how Wilkerson documents the Great Migration?","o":{"A":"The personal journey of Ida Mae Gladney is featured in the award-winning book The Warmth of Other Suns.","B":"New York, New York, Is one of the cities whose African American populations grew during the Great Migration.","C":"In 2011, Isabel Wilkerson’s book The Warmth of Other Suns won not only the Hurston/Wright Legacy Award but also the Heartland Prize.","D":"Isabel Wilkerson chronicles the complex history of the Great Migration in such riveting, personal detail by narrating the journeys of individuals, such as Ida Mae Gladney and Robert Pershing Foster."},"a":"D"},{"s":"Rhetorical Synthesis","n":169,"p":"While researching a topic, a student has taken\nthe following notes:\n• Field is a 1968 black-and-white linocut print\nby Black American artist Samella Lewis.\n• It features a laborer raising his fist in a symbol\nof liberation.\n• Relief printing is a technique in which an\nimage is first carved onto a printing block made\nof wood, rubber, or other materials.\n• The block is then painted and stamped onto a\nprint surface.\n• Lino cutting is a type of relief printing that\nuses linoleum tile as the printing block.","q":"The student wants to describe the process of relief printing. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Lewis used relief printing to create the 1968 linocut Field.","B":"In relief printing, an image is carved onto a printing block, which is then painted and pressed ontoaprint surface.","C":"Lewis used a relief printing technique called lino cutting, carving an image onto linoleum tile.","D":"Relief printing is a technique that can use wood, rubber, and other materials as the printing block, not just linoleum tile."},"a":"B"},{"s":"Rhetorical Synthesis","n":170,"p":"While researching a topic, a student has taken\nthe following notes:\n• Modularity of mind is the notion that the mind\nis at least partly composed of innate neural\nstructures (modules) that perform fast, necessary\ntasks.\n• 1983: cognitive scientist Jerry A. Fodor\nhypothesized that low-level cognitive systems\n(e.g., perception, language) are modular.\n• In Fodorian modularity, high-level systems\n(e.g.,reasoning) are not modular.\n• 2003: cognitive scientist Peter Carruthers\nproposed the massive modularity hypothesis\n(MMH).\n• MMH expands modularity to include all\ncognitive systems.","q":"The student wants to compare Fodor’s hypothesis with Carruthers’s. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"In 2003, Carruthers proposed the massive modularity hypothesis, disagreeing with Fodor’s earlier hypothesis that the mind is composed of innate neural structures.","B":"In considering some but not all cognitive systems modular, Fodorian modularity is not as expansive in its definition of modularity as MMH is.","C":"The hypotheses of Fodor and Carruthers differ in whether they consider low-level cognitive systems, such as perceptionend language, modular.","D":"Following Fodor’s 1983 hypothesis, Carruthers proposed that modularity of mind Includes all cognitive systems."},"a":"A"},{"s":"Rhetorical Synthesis","n":171,"p":"While researching a topic, a student has taken\nthe following notes:\n• Carbon can exist in several distinct structural\nforms called allotropes.\n• Graphite is a carbon allotrope.\n• Graphite is composed of stacked graphene\nsheets.\n• Each graphene sheet is composed of carbon\natoms arranged in a flat honeycomb pattern.\n• Carbon nanotubes are carbon allotropes.\n• They are composed of one or more graphene\nsheets wrapped into acylindrical shape.","q":"The student wants to emphasize a difference between carbon nanotubes and graphite. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Composed of sheets wrapped into a cylindrical shape, carbon nanotubes contrast with graphite, a carbon allotrope composed of graphene sheets.","B":"Graphite and carbon nanotubes are allotropes composed of stacked or wrapped graphene sheets, but carbon can exist in several distinct structural forms.","C":"Unlike carbon nanotubes, which are composed of sheets of carbon atoms arranged in a flat honeycomb pattern, graphite is a cylindrical carbon allotrope.","D":"The graphene sheets in graphite are stacked, whereas in carbon nanotubes, they form a cylinder."},"a":"C"},{"s":"Rhetorical Synthesis","n":172,"p":"While researching a topic, a student has taken\nthe following notes:\n• Today, more than twenty different national\ncurrencies are referred to as \"dollars.\"\n• The English word \"dollar\" comes from the\nGerman word \"thaler.\"\n• Kiribati’s currency is known as the Kiribati\ndollar","q":"The student wants to provide an example of a country that uses the word \"dollar\" in the name of its currency. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Kiribati uses the Kiribati dollar as its national currency.","B":"Kiribati does not refer to its currency by the German word \"thaler.\"","C":"The German word \"thaler\" is the origin of the English word \"dollar.\"","D":"Today, many countries use the word \"dollar\" in naming their currencies."},"a":"A"},{"s":"Rhetorical Synthesis","n":173,"p":"While researching a topic, a student has taken\nthe following notes:\n• In a 2003 study, Alexander and Schrag tested\nthe effect of plant litter on seedling emergence in\na grassland setting.\n• The test site was a mesic grassland in a dry\nmidlatitude climate in the United States.\n• The researchers found that in these\nenvironmental conditions the presence of plant\nlitter had a positive effect on seedling emergence.\n• Seedling emergence is when a seedling sprouts\nabove ground and begins photosynthesis.","q":"Which choice most effectively uses information from the given sentences to present the study’s findings to an audience already familiar with the concept of seedling emergence?","o":{"A":"The findings of Alexander and Schrag’s study were published in 2003.","B":"In a 2003 study by Alexander and Schrag. plant litter was found to have a positive effect on seedling emergence, which is when a seedling sprouts and begins photosynthesis.","C":"The effect of plant litter, which includes dead leaves and other plant matter, on seedling emergence has been the subject of scientific study.","D":"Alexander and Schrag found that in a mesic grassland and a dry midlatitude climate the presence of plant litter had a positive effect on seedling emergence."},"a":"D"},{"s":"Rhetorical Synthesis","n":174,"p":"While researching a topic, a student has taken\nthe following notes:\n• Generally, an object will heat up when twisted.\n• The twisting of an object is known as torsion.\n• A 2019 study led by Zunfeng Liu and Ray\nBaughman tested the torsional heating of various\nfibers.\n• When a sample of four-ply nickel-titanium\n(NiTi) wire was twisted, its average surface\ntemperature increased by 30.4°C.\n• When a sample of ethylene propylene diene\nmonomer (EPDM) rubber fiber was twisted, Its\naverage surface temperature increased by 12°C.","q":"The student wants to emphasize a similarity between EPDM rubber and four-ply NiTi wire fibers. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"In 2019, two research teams observed the effects of torsional heating on various fibers, including EPDM rubber and four-ply NiTi wire.","B":"Both EPDM rubber and four-ply NITI wire fibers heat up when twisted, according to a 2019 study.g sprouts and begins photosynthesis.","C":"Researchers determined that when the filbers were twisted, the average surface temperature of four-ply NiTi wire increased more than that of EPDM rubber.","D":"Twisting an object will generally cause its temperature to increase, a process known as torsional heating."},"a":"B"},{"s":"Rhetorical Synthesis","n":175,"p":"While researching a topic, a student has taken\nthe following notes:\n• GA supercontinent is a single landmass made\nup of most or all of Eartht’s continents.\n• Over time, continents merge together to form\nsupercontinents,which then break apart.\n• This procest is believed to take hundreds of\nmillions of years and is known as the\nsupercontinent cycle.\n• Ur was a supercontinentthat formed about 3.1\nbillion years ago.\n• Pangaea was a supercontinent that formed\nabout 300 million years ago.","q":"The student wants to emphasize the order in which the supercontinents were formed. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Ur formed about 3.1 billlon years ago but eventually broke apart.","B":"Ur and Pangaea were both supercontinents, single landmasses made up of most or all of Earth’s continents.","C":"The supercontinent Pangaea formed long after the supercontinent Ur.","D":"Forming and breaking apart over hundreds of millions of years, supercontinents are made up of most or all of Earth’s continents."},"a":"C"},{"s":"Rhetorical Synthesis","n":176,"p":"While researching a topic, a student has taken\nthe following notes:\n• Most of the plant and bird species in Oahu,\nHawaii, are non-native.\n• In a 2019 study, researchers wanted to know\nwhat role non-native birds play in dispersing\nplant seeds in Oahu.\n• Researchers catalogued plant seeds found in\nfecal samples from non-native birds.\n• Psydrax odorata, a flowering shrub, was one of\nfifteen native species catalogued.\n• Cestrum nocturnum, a nightshade, was one of\ntwenty-nine non-native species catalogued.\n• Researchers concluded that non-native birds\nplay a vital role in dispersing the seeds of native\nand non-native plants.","q":"The student wants to emphasize the order in which the supercontinents were formed. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Most plant species found in Oahu, Hawall, like Cestrum nocturnum, are nonnative.","B":"Though Psydrax odorata and Cestrum nocturnum can both be found in Oahu, Hawaii, only the former plant is native.","C":"A 2019 study catalogued plant seeds found in bird fecal samples in Oahu, Hawaii, to determine what role non-native birds play in seed dispersal.","D":"Seeds from Psydrax odorata and Cestrum nocturnum plants were found in the fecal samples of non-native Hawaiian birds, according to a 2019 study."},"a":"B"},{"s":"Rhetorical Synthesis","n":177,"p":"While researching a topic, a student has taken\nthe following notes:\n• Tianguistengo is a municipality in the state of\nHidalgo, Mexico.\n• Tianguistengo is a municipality in the state of\nHidalgo, Mexico. Municipalities are\ngovernmental regions responsible for providing\nmany public services to their residents.\n• One service they provide is traffic control.\n• Tianguistengo covers an area of roughly 256\nkm².\n• Hidalgo is divided into 84 municipalities.","q":"The student wants to emphasize the size of Tianguistengo. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Tianguistengo is one of 84 governmental regions, known as municipalitles, acroSs Hidalgo.","B":"Providing traffic control is just one example of the public services that municipalities provide.","C":"Tianguistengo a governmental region in the state of Hidalgo, Mexico provides many public services to its residents.","D":"The municipality of Tianguistengo in Hidalgo, Mexico, covers an area of roughly 256 km²."},"a":"D"},{"s":"Rhetorical Synthesis","n":178,"p":"While researching a topic, a student has taken\nthe following notes:\n• The South Sudan Workers Trade Union\nFederation (SSWTUF) is a national union\nfederation for the African nation of South\nSudan.\n• It helps improve conditions for workers in that\nnation.\n• ITUC-Africa is a regional union federation\nthat represents national union federations across\nAfrica.\n• It represents the SSWTUF.","q":"Which choice most effectively uses information from the given sentences to explain the purpose of national union federations?","o":{"A":"The SSWTUF is one ofthe national union federations represented by ITUC-Africa.","B":"Regional union federations like ITUC-Africa represent the national union federations in a specific area.","C":"National union federations, such as the SSWTUF, work to improve conditions for workers in their member nations.","D":"The SSWTUF is a national union federation in Africa."},"a":"C"},{"s":"Rhetorical Synthesis","n":179,"p":"While researching a topic, a student has taken\nthe following notes:\n• A soundscape refers to the sounds heard in a\nspecific place.\n• The Japanese Ministry of the Environment\nmade a list of 100 soundscapes ofJapan.\n• Each soundscape on the list was selected for its\ncultural significance to Japan.\n• The sound of black-tailed gulls at Hachinohe\nPort in Aomori Prefecture is on the list.\n• Aomori Prefecture is on northern Honshu\nIsland, Japan.","q":"The student wants to specify where a soundscape of cultural significance to Japan can be heard. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The sound of black-tailed gulls was included on a list of 100 soundscapes.","B":"The soundscape was selected by the Japanese Ministry of the Environment for its cultural significance to Japan.","C":"The soundscape included the sounds heard in a specific place.","D":"The sound of black-tailed gulls at Hachinohe Port can be heard in Aomori Prefecture on northern Honshu Island, Japan."},"a":"D"},{"s":"Rhetorical Synthesis","n":180,"p":"While researching a topic, a student has taken\nthe following notes:\n• Dinosaur fossil specimens can be found at\nscience museums all over the world.\n• Many dinosaur fossil specimens are given\nnicknames.\n• The Denver Museum of Nature and Science in\nDenver, Colorado, houses a dinosaur fossil\nspecimen nicknamed Pops.\n• Pops lived in the Late Cretaceous period,\nwhich ended more than 65 million years ago.\n• It is a member of the genus Triceratops.","q":"The student wants to provide an example of a dinosaur fossil specimen’s nickname. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Nicknames are given to many dinosaur fossil specimens, including one housed at a museum in Denver, Colorado.","B":"A Triceratops fossil specimen from the Late Cretaceous period, which ended more than 65 million years ago, is housed at the Denver Museum of Nature and Science.","C":"Dinosaur fossil specimens can be found at museums all over the world, and many of these specimens are given nicknames.","D":"Pops is the nickname of a Triceratops fossil specimen housed at the Denver Museum of Nature and Science in Denver, Colorado."},"a":"D"},{"s":"Rhetorical Synthesis","n":181,"p":"While researching a topic, a student has taken\nthe following notes:\n• The ratio of the total mass of an element to\nthe combined mass of all elements in a given\nenvironment is called the mass fraction.\n• The mass fraction of chromium (Cr) on Earth\nis 4,700 parts per million (ppm).\n• This indicates that the relative abundance of\nchromium on Earth is 0.47%.\n• The ratio of the total number of atoms of an\nelement to the total number of all atoms in a\ngiven environment is called the mole fraction.\n• The mole fraction of chromium on Earth is\n2,300,000 parts per billion (ppb).\n• This indicates that the relative abundance of\nchromium on Earth is 0.23%.","q":"The student wants to provide an example of a dinosaur fossil specimen’s nickname. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"On Earth, the mass fraction of chromium is 4,700 ppm, or 0.47%, and the mole fraction is 2,300,000 ppb, or 0.23%.","B":"While mass fraction is a measure of relative mass and mole fraction is a measure of relative atom count, both indicate the relative abundance of elements on Earth.","C":"Both mass and mole fraction express the relative abundance of chromium on Earth as a ratio of the total mass of chromium to the combined mass of all atoms.","D":"The mass fraction of chromium indicates its relative mass; in addition, the element’s mole fraction indicates the relative number of chromium atoms."},"a":"B"},{"s":"Rhetorical Synthesis","n":182,"p":"While researching a topic, a student has taken\nthe following notes:\n• Cinematographers work with cameras and\nlighting.\n• They help translate film directors’ ideas into\nvisual images.\n• Frida (2002) was directed by Julie Taymor.\n• Rodrigo Prieto was the film’s cinematographer.","q":"Which choice most effectively uses information from the given sentences to provide an example of a film Prieto worked on?","o":{"A":"Cinematographer Rodrigo Prieto worked with director Julie Taymor.","B":"The 2002 film Frida is one example of Rodrigo Prieto’s work as a cinematographer.","C":"In filmmaking, directors work with others to translate their ideas into the visual images that we encounter on the screen.","D":"As cinematographer, Rodrigo Prieto works with cameras and lighting to translate the film director’s ideas into visual images."},"a":"B"},{"s":"Rhetorical Synthesis","n":183,"p":"While researching a topic, a student has taken\nthe following notes:\n• Merle Oberon (1911-1979) was an actress born\nin Mumbai (then known as Bombay), India.\n• She was of Indian, Maori, and Irish heritage.\n• She was the first Indian-born actress to be\nnominated for an Academy Award.\n• Early in her career, she played many nameless,\nuncredited roles, such as her role in Alf’s Button\n(1930).\n• Later, she played many named, credited roles,\nsuch as Marjorie Ismay in Forever and a Day\n(1943).","q":"The student wants to make and support a generalization about Merle Oberon’s early career. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Alf’s Button (1930) was released early in Merle Oberon’s career, whereas Forever and a Day (1943) came out later.","B":"Merle Oberon wasn’t even listed in the credits of some of her early films, such as Alf’s Button (1930), where she played a nameless, uncredited role.","C":"Alf’s Button and Forever and a Day are both films that include Merle Oberon, the first Indian-born actress to be nominated for an Academy Award.","D":"In Alf’s Button (1930), actress Merle Oberon played a nameless, uncredited role."},"a":"B"},{"s":"Rhetorical Synthesis","n":184,"p":"While researching a topic, a student has taken\nthe following notes:\n• India Arie is an African American singer and\nsongwriter.\n• The media outlet BBC Music has described her\nmusic as a \"blend of hip hop, soul and folk [that\nis] as subtle as it [is] inspired.\"\n• Her acclaimed albums feature many talented\nmusicians.\n• Judeth Insel played viola on her first studio\nalbum, Acoustic Soul (2001).\n• David Davidson played violin on her second\nstudio album, Voyage to India (2002).","q":"The student wants to emphasize a similarity between Judeth Insel and David Davidson. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Judeth Insel played on India Arie’s first studio album, Acoustic Soul, which was released one year before her album Voyage to India.","B":"Acoustic Soul and Voyage to India, released in 2001 and 2002, respectively, are albums by singer and songwriter India Arie.","C":"Although both musicians have played on India Arie albums, Judeth Insel played viola, whereas David Davidson played violin.","D":"Judeth Insel and David Davidson both lent their musical talents to albums by India Arie in the earry 2000s."},"a":"D"},{"s":"Rhetorical Synthesis","n":185,"p":"While researching a topic, a student has taken\nthe following notes:\n• Historian Isabel Wilkerson’s book The Warmth\nof Other Suns is about the Great Migration.\n• The Great Migration was a period in\ntwentieth-century US history when over six\nmillion African Americans moved from the rural\nSouth to cities such as Detroit, Michigan.\n• To document this period, Wilkerson narrates\nthe personal journeys of George Swanson\nStarling and Robert Pershing Foster, among\nothers.\n• The book won the Mark Lynton History Prize\nin 2011.\n• It also won the National Book Critics Circle\nAward in 2011.","q":"Which choice most effectively uses information from the given sentences to emphasize how Wilkerson documents the Great Migration?","o":{"A":"Detroit, Michigan, is one of the cities whose African American populations grew during the Great Migration.","B":"Isabel Wilkerson chronicles the complex history of the Great Migration in such riveting, personal detail by narrating the journeys of individuals, such as George Swanson Starling and Robert Pershing Foster.","C":"In 2011, Isabel Wilkerson’s book Te Warmth of Other Suns won not only the Mark Lynton History Prize but also the National Book Critics Circle Award.","D":"The personal journey of George Swanson Starling is featured in the award winning book The Warmth of Other Suns."},"a":"B"},{"s":"Rhetorical Synthesis","n":186,"p":"While researching a topic, a student has taken\nthe following notes:\n• Usually, a country’s capital is also its largest\ncity by population.\n• The capital of the Philippines is Manila.\n• Its largest city by population is Quezon City.\n• The capital of Liechtenstein is Vaduz.\n• Its largest city by population is Schaan.","q":"The student wants to emphasize a similarity between the two countries. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"In both the Philippines and Liechtenstein, the capital is not the country’s most populous city.","B":"While the most populous city in the Philippines is Quezon City, the most populous city in Liechtenstein is Schaan.","C":"The most populous city in the Philippines is Quezon City, but the country’s capital is Manila.","D":"The capital of the Philippines is Manila; the capital of Liechtenstein is Vaduz."},"a":"A"},{"s":"Rhetorical Synthesis","n":187,"p":"While researching a topic, a student has taken\nthe following notes:\n• Bread is a 1968 black-and-white linocut print\nby Black American artist Elizabeth Catlett.\n• It features a young girl eating a slice of bread.\n• Relief printing is a technique in which an\nimage is first carved onto a printing block made\nof wood, rubber, or other materials.\n• The block is then painted and stamped on to a\nprint surface.\n• Lino cutting is a type of relief printing that\nuses linoleum tile as the printing block.","q":"The student wants to emphasize a similarity between the two countries. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Relief printing is a technique that can use wood, rubber, and other materials as the printing block, not just linoleum tile.","B":"Catlett used a relief printing technique called lino cutting, carving an image onto linoleum tile.","C":"Catlett used relief printing to create the 1968 linocut Bread.","D":"In relief printing, an image is carved on to a printing block, which is then painted and pressed Vonto a print surface."},"a":"D"},{"s":"Rhetorical Synthesis","n":188,"p":"While researching a topic, a student has taken\nthe following notes:\n• Digital Light Synthesis (DI.S) is a form of\nadditive manufactiring that utilizes light to\nrapidly cure liquid resin into high-quality, 3D\nobjects.\n• Step 1: Ultraviolet (UV) light images are\nprojected up into a pool of liquid resin. where the\nobject’s first layer takes shape.\n• Step 2: The partially cured resin object is\nraised, leaving a thin space (a \"dead zone)\nbeneath it for oxygen and liquid resin to flow\nthrough.\n• Step 3: The UV light passes through the dead\nzoneand partially cures additional layers of the\nobject -maintaining the flow of resin-and\npartially cures additional layers of the object.\n• Step 4: When the resin object is complete, it is\nbaked in an oven to complete the curing.","q":"The student wants to describe how DL.S cures 3D objects. Which choice most effectively uses relevant Information from the notes to accomplish this goal?","o":{"A":"DLS cures 3D objects by passing through a \"dead zone,\" adding layers to the object, then curing the object in an oven.","B":"In DLS, UV light is projected into layers of liquid resin until the resin solidifies and passes through a \"dead zone,\" wherein the curing is completed.","C":"In DLS. UV light Images are projected into a liquid resin pool to cure a 3D object layer by layer: once solidified,the object is baked in an oven.","D":"DLS is a form of additive manufacturing that creates a \"dead zone\" in which UV light solidifies layer by layer before being baked in an oven, creating a highquality, 3D object."},"a":"D"},{"s":"Rhetorical Synthesis","n":189,"p":"While researching a topic, a student has taken\nthe following notes:\n• Most of the plant and bird species in Oahu,\nHawali, are non-native.\n• It ranks No. 14 among the longest rivers in\nthe world.\n• It is 4,200 kilometers long.\n• The Indus River is the ninth longest river in\nAsia\n• It ranks No. 19 among the longest rivers in\nthe world.\n• It is 3,610 kilometers long.","q":"The student wants to emphasize a difference between the two plants. Which cholce most effectively uses relevant Information from the notes to accomplish this goal?","o":{"A":"Most plant species found in Oahu, Hawaii, like Psidium cattleyanun, are non native.","B":"Though Pipturus albidus and Psidium cattleyanum can both be found in Oahu, Hawaii, only the former plant is native.","C":"A 2019 study catalogued plant seeds found in bird fecal samples in Oahu. Hawall. to determine what role non-native birds play in seed dispersal.","D":"Seeds from Pipturus albidus and Psidlum cattleyanum plants were found in the fecal samples of non-native Hawallan birds, according to a 2019 study."},"a":"B"},{"s":"Rhetorical Synthesis","n":190,"p":"While researching a topic, a student has taken\nthe following notes:\n• Generally, an object will heat up when twisted.\n• The twisting of an object is known as torsion.\n• A 2019 study led by Zunfeng Liu and Ray\nBaughman tested the torsional heating of various\nfibers.\n• When a sample of ethylene propylene diene\nmonomer (EPDM) rubber fiber was twisted, its\naverage surface temperature increased by 12°C.\n• When a sample of natural rubber fiber was\ntwisted, its average surface temperature\nincreased by 15.3°C.","q":"The student wants to emphasize a similarity between EPDM rubber and natural rubber fibers. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"In 2019, two research teams observed the effects of torsional heating on various fibers, including EPDM rubber and natural rubber.","B":"Twisting an object will generally cause its temperature to increase, a process known as torsional heating.","C":"Researchers determined that when the fibers were twisted, the average surface temperature of natural rubber increased more than that of EPDM rubber.","D":"Both EPDM rubber and natural rubber fibers heat up when twisted, according to a 2019 study."},"a":"D"},{"s":"Rhetorical Synthesis","n":191,"p":"While researching a topic, a student has taken\nthe following notes:\n• India Arie is an African American singer and\nsongwriter.\n• The media outlet NPR has described her music\nas having an \"acoustic guitar-driven groove and\nlyrics celebrating self-confidence.\"\n• Her acclaimed albums feature many talented\nmusicians.\n• Ricky Quiñones played guitar on her second\nstudio album, Voyage to India (2002).\n• John Catchings played cello on her first studio\nalbum, AcousticSoul (2001).","q":"The student wants to emphasize a difference between Ricky Quiñones and John Catchings. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Ricky Quiñones and John Catchings have both lent their musical talents to albums by India Arie.","B":"Both musicians have played on India Arie albums, but Ricky Quiñones played guitar, whereas John Catchings played cello.","C":"Ricky Quiñones played on India Arie’s second studio album, Voyage to India, which was released one year after her album Acoustic Soul.","D":"Acoustic Soul and Voyage to India, released in 2001 and 2002, respectively, are albums by singer and songwriter India Arie."},"a":"B"},{"s":"Rhetorical Synthesis","n":192,"p":"While researching a topic, a student has taken\nthe following notes:\n• An isthmus is a strip of land that connects two\nlarger pieces of land across an expanse of water.\n• It is also known as a land bridge.\n• The Isthmus of Suez is located in North\nAfrica.\n• It connects the Mediterranean Sea to the Red\nSea.\n• The Auckland Isthmus is located in New\nZealand.\n• It connects the North Island to Auckland.","q":"The student wants to emphasize a similarity between the Isthmus of Suez and the Auckland Isthmus. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"An isthmus, or land bridge, is a strip of land that connects two larger pieces of land across an expanse of water.","B":"The Auckland Isthmus connects the North Island to Auckland.","C":"The Isthmus of Suez and the Auckland Isthmus both connect two larger pieces of land across an expanse of water.","D":"The Isthmus of Suez is a land bridge, located in North Africa."},"a":"C"},{"s":"Rhetorical Synthesis","n":193,"p":"While researching a topic, a student has taken\nthe following notes:\n• Body positions are an important part of dance.\n• In Cecchetti method ballet, there is a position\ncalled third position.\n• It is one of several positions for the dancer’s\narms.","q":"The student wants to provide an example of a position in Cecchetti method ballet. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"In dance, some positions are for the dancer’s arms.","B":"Cecchetti method ballet includes several dance positions for the dancer’s arms.","C":"Third position is an example ofa position in Cecchetti method ballet.","D":"Body positions are an important part of dance, including Cecchetti method ballet."},"a":"C"},{"s":"Rhetorical Synthesis","n":194,"p":"While researching a topic, a student has taken\nthe following notes:\n• Receptors in the human tongue can detect\nsweetness, saltiness, sourness, bitterness, and\numami.\n• Umami is a rich, savory flavor.\n• Umami is triggered by the compounds in a\nvariety of foods, including ham and mushrooms.\n• Participants in a research study tasted samples\nof ma-konbu (a type of brown seaweed) collected\nfrom Hokkaido, Japan.\n• On average, they rated its umami intensity as\nhigh.","q":"The student wants to emphasize the umami intensity of ma-konbu. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Umami is a rich, savory flavor triggered by compounds in foods such as ham and mushrooms.","B":"Samples of ma-konbu, a brown seaweed, have been collected in Hokkaido, Japan.","C":"Umami is triggered by compounds in ma-konbu, ham, and mushrooms.","D":"Participants in a research study found the umami intensity of ma-konbu, a brown seaweed, to be high."},"a":"D"},{"s":"Rhetorical Synthesis","n":195,"p":"While researching a topic, a student has taken\nthe following notes:\n• A U-shaped curve in a river channel is called a\nmeander.\n• A meander forms when water erodes sediment\nfrom one side of the riverbank and redeposits\nthat sediment on the opposite side.\n• Meanders will gradually change shape and\nmigrate downstream over time.\n• A river with high sinuosity has many\nmeanders, and a river with low sinuosity has\nfew.\n• The Willapa River in the United States has\nhigh sinuosity.","q":"The student wants to identify what causes meanders. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The erosion and redepositing of sediment from one side of a riverbank to the other forms meanders, or curves, over time.","B":"High sinuosity is caused by the formation of many meanders, or curves, in a riverbank over time.","C":"Over time, many meanders have formed in the Willapa River, a river in the United States with high sinuosity.","D":"The meanders in the Willapa River will change shape and shift downstream over time."},"a":"A"},{"s":"Rhetorical Synthesis","n":196,"p":"While researching a topic, a student has taken\nthe following notes:\n• Modern Pueblo tribal nations were preceded by\nthe Ancestral Puebloan civilization, which\noccupied parts of the southwestern US until\napproximately 1600 CE.\n• Keet Seel in northeastern Arizona is a former\nAncestral Puebloan settlement inhabited from\napproximately 1250-1300 CE.\n• It was constructed in a natural cliff alcove and\nhad multistory adobe and stone buildings.\n• These buildings had cube-shaped, contiguous\nrooms that surrounded kivas.\n• Kivas are round rooms typically used for\nceremonial purposes and as gathering spaces.","q":"The student wants to provide a detailed overview of the structures at Keet Seel. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Located in northeastern Arizona, Keet Seel was designed with kivas, round rooms that were typically used for ceremonial purposes and as gathering spaces.","B":"Keet Seel, whose structures were built by Ancestral Puebloans in northeastern Arizona, was inhabited from approximately 1250-1300 CE.","C":"Constructed in a natural cliff alcove, Keet Seel’s multistory adobe and stone buildings featured round rooms called kivas surrounded by cube-shaped, contiguous rooms.","D":"The Ancestral Puebloans used adobe and stone in the construction of Keet Seel in northeastern Arizona."},"a":"C"},{"s":"Rhetorical Synthesis","n":197,"p":"While researching a topic, a student has taken\nthe following notes:\n• Claude McKay (1890-1948) was a Jamaican\nAmerican poet.\n• McKay also worked as a novelist and\njournalist.\n• \"Labor’s Day\" is a poem by McKay.\n• It was published in the September 1919 issue\nof The Messenger.\n• The Messenger was an influential Black\nliterary magazine.","q":"The student wants to provide an example of a poem by McKay. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"McKay was a Jamaican American poet, novelist, and journalist.","B":"One example of a poem by McKay is \"Labor’s Day\" (1919).","C":"McKay published poetry in a literary magazine called The Messenger.","D":"The Messenger was an influential Black literary magazine that published poetry."},"a":"B"},{"s":"Rhetorical Synthesis","n":198,"p":"While researching a topic, a student has taken\nthe following notes:\n• Brussels sprouts are vegetables that contain\nascorbic acid, an essential nutrient for humans.\n• Cranberries are fruits that contain ascorbic\nacid.\n• There is 80 milligrams (mg) of ascorbic acid\nper every 100 grams (g) of brussels sprouts.\n• There is 13 mg of ascorbic acid per every 100\ng of cranberries.\n• Humans cannot make ascorbic acid in their\nbodies, so they must get it from foods, including\nfruits and vegetables.\n• Ascorbic acid is also known as vitamin C.","q":"The student wants to refute a claim that cranberries are a better source of vitamin C than brussels sprouts are. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Brussels sprouts contain ascorbic acid (also known as vitamin C), and cranberries do too.","B":"Brussels sprouts contain vitamin C (also known as ascorbic acid); in fact, there is 80 mg of vitamin C in every 100 g of brussels sprouts.","C":"With 80 mg of vitamin C per every 100 g, brussels sprouts are actually a better source of vitamin C than cranberries, which contain only 13 mg per every 100 g.","D":"Humans cannot make ascorbic acid in their bodies, but they can get it from brussels sprouts and cranberries."},"a":"C"},{"s":"Rhetorical Synthesis","n":199,"p":"While researching a topic, a student has taken\nthe following notes:\n• Kale is a vegetable that contains ascorbic acid,\nan essential nutrient for humans.\n• Apricots are fruits that contain ascorbic acid.\n• There is 120 milligrams (mg) of ascorbic acid\nper every 100 grams (g) of kale.\n• There is 10 mg of ascorbic acid per every 100\ng of apricot.\n• Humans cannot make ascorbic acid in their\nbodies, so they must get it from foods, including\nfruits and vegetables.\n• Ascorbic acid is also known as vitamin C.","q":"The student wants to refute a claim that apricots are a better source of vitamin C than kale is. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Kale contains vitamin C (also known as ascorbic acid); in fact, there is 120 mg of vitamin C in every 100 g of kale.","B":"Kale contains ascorbic acid (also known as vitamin C), and apricots do too.","C":"Humans cannot make ascorbic acid in their bodies, but they can get it from kale and apricots.","D":"With 120 mg of vitamin C per every 100 g, kale is actually a better source of vitamin C than apricots, which contain only 10 mg per every 100 g."},"a":"D"},{"s":"Rhetorical Synthesis","n":200,"p":"While researching a topic, a student has taken\nthe following notes:\n• Snow hydrologist Julie Koeberle helps maintain\nautomated snow measurement stations.\n• They are called SNOTEL sites.\n• There are around 90 stations throughout\nWyoming.\n• One is at Bear Trap Meadow.\n• The data collected can help researchers make\ndownstream water supply predictions.","q":"Whích choice most effectively uses information from the given sentences to provide an example of a SNOTEL site?","o":{"A":"The data collected by SNOTEL sites can help researchers predict downstream water supplies.","B":"The SNOTEL site at Bear Trap Meadow is one of around 90 automated snow measurement stations in Wyoming.","C":"Snow hydrologist Julie Koeberle helps maintain automated snow monitoring stations known as SNOTEL sites.","D":"Located throughout Wyoming, SNOTEL sites monitor snow conditions."},"a":"B"},{"s":"Rhetorical Synthesis","n":201,"p":"While researching a topic, a student has taken\nthe following notes:\n• The nautical mile (6,076 feet) is the measure\nof distance used in seafaring navigation.\n• A nautical mile directly correlates to one\nminute (1/60th of a degree) of latitude.\n• The curvature of Earth affects the accurate\nmeasurement of long distances when using flat\nmaps.\n• Measuring distances with latitude and\nlongitude coordinates takes into account Earth’s\ncurvature.\n• Mariners use nautical charts marked with\nlatitude and longitude to quickly calculate\ndistances and positions.","q":"The student wants to explain why nautical miles are used to measure distances in seafaring navigation. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Nautical miles are a measure of distance equal to one minute of latitude, which is a feature nautical charts use to calculate distances and positions.","B":"Nautical charts use latitude and longitude to measure long distances; these charts are more accurate than flat maps for measuring distances in seafaring navigation because they account for Earth’s curvature.","C":"Since they directly correlate to the coordinates on nautical charts, which take into account Earth’s curvature, nautical miles are an efficient way to calculate distances at sea.","D":"Using nautical miles for navigation at sea takes Earth’s curvature into account, whereas measuring distances with latitude and longitude coordinates does not."},"a":"C"},{"s":"Rhetorical Synthesis","n":202,"p":"While researching a topic, a student has taken\nthe following notes:\n• India Arie is an African American singer and\nsongwriter.\n• The media outlet BBC Music has described her\nmusic as a \"blend of hip hop, soul and folk [that\nis] as subtle as it [is] inspired.\"\n• Her acclaimed albums feature many talented\nmusicians.\n• Judeth Insel played viola on her first studio\nalbum, Acoustic Soul (2001).\n• Ricky Quiñones played guitar on her second\nstudio album, Voyage to India (2002).","q":"The student wants to emphasize a difference between Judeth Insel and Ricky Quiñones. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Judeth Insel played on India Arie’s first studio album, Acoustic Soul, which was released one year before her album Voyage to India.","B":"Both musicians have played on India Arie albums, but Judeth Insel played viola, whereas Ricky Quiñones played guitar.","C":"Acoustic Soul and Voyage to India, released in 2001 and 2002, respectively, are albums by singer and songwriter India Arie.","D":"Judeth Insel and Ricky Quiñones have both lent their musical talents to albums by India Arie."},"a":"B"},{"s":"Rhetorical Synthesis","n":203,"p":"While researching a topic, a student has taken\nthe following notes:\n• A supercontinent is a single landmass made up\nof most or all of Earth’s continents.\n• Over time, continents merge together to form\nsupercontinents, which then break apart.\n• This process is believed to take hundreds of\nmillions of years and is known as the\nsupercontinent cycle.\n• Vaalbara was a supercontinent that formed\nabout 3.6 billion years ago.\n• Euramerica was a supercontinent that formed\nabout 300 million years ago.","q":"The student wants to emphasize the order in which the supercontinents were formed. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Vaalbara and Euramerica were both supercontinents, single landmasses made up of most or all of Earth’s continents.","B":"The supercontinent Euramerica formed long after the supercontinent Vaalbara.","C":"Forming and breaking apart over hundreds of millions of years, supercontinents are made up of most or all of Earth’s continents.","D":"Vaalbara formed about 3.6 billion years ago but eventually broke apart."},"a":"B"},{"s":"Rhetorical Synthesis","n":204,"p":"While researching a topic, a student has taken\nthe following notes:\n• Grimanesa Amoros is a Peruvian American\nartist well known for her LED light sculptures.\n• Uros Island (2011) is from her Uros series of\nworks.\n• It is made of smooth multicolored LED domes.\n• Golden Connection (2013) is from her\nHuanchaco series of works.\n• It is made of entangled blue and white LED\ntubes.","q":"The student wants to emphasize a difference between Uros Island and Golden Connection. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Grimanesa Amoros often employs LED lights in her work, but the smooth LED domes of Uros Island stand in contrast to the tangled LED tubes of Golden Connection.","B":"Uros Island and Golden Connection are two LED light sculptures by well-known artist Grimanesa Amoros.","C":"In 2011, Grimanesa Amoros debuted Uros Island, a part of her Uros series.","D":"Many of Grimanesa Amoros’s sculptures, like Uros Island and Golden Connection, incorporate LED lights in the form of domes or tubes."},"a":"A"},{"s":"Rhetorical Synthesis","n":205,"p":"While researching a topic, a student has taken\nthe following notes:\n• Refrigerants are chemical compounds used in\ncooling technologies, such as air conditioners.\n• Air conditioners can use refrigerants to absorb\nheat and release cold air\n• The refrigerant dichloromethane is a\nhydrochlorocarbon (HCC).\n• HCCs are composed of the elements hydrogen,\nchlorine, and carbon.\n• The refrigerant tetradecafluorohexane is a\nperfluorocarbon (PFC).\n• TPFCs are composed of fluorine and carbon.","q":"The student wants to contrast dichloromethane and tetradecafluorohexane. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Dichloromethane, a hydrochlorocarbon, is composed of hydrogen, chlorine, and carbon; tetradecafluorohexane, a perfluorocarbon, is composed of fluorine and carbon.","B":"Dichloromethane and tetradecafluorohexane are chemical compounds used in cooling technologies; the compounds are known as refrigerants.","C":"The hydrochlorocarbon dichloromethane and the perfluorocarbon tetradecafluorohexane are both refrigerants that can be used in cooling technologies like air conditioners.","D":"Tetradecafluorohexane, a refrigerant, can be used in cooling technologies to absorb heat and release cold air."},"a":"A"},{"s":"Rhetorical Synthesis","n":206,"p":"While researching a topic, a student has taken\nthe following notes:\n• The A.M. Turing Award is a prestigious\naward given by the Association for Computing\nMachinery (ACM).\n• The ACM gives the award for \"major\ncontributions of lasting importance to\ncomputing.\"\n• is named after groundbreaking British\nmathematician Alan Turing.\n• Raj Reddy won the award in 1994 for\npioneering the development of large-scale\nartificial intelligence systems.","q":"The student wants to explain whom the award is named for. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"In 1994, Raj Reddy won the A.M. Turing Award for pioneering the development of large-scale artificial intelligence systems.","B":"The A.M. Turing Award is given for \"major contributions of lasting importance to computing.\"","C":"The A.M. Turing Award is named for groundbreaking British mathematician Alan Turing.","D":"It was in 1994 that Raj Reddy won the A.M. Turing Award."},"a":"C"}];

let questions = [], order = [], currentIdx = 0, mode = 'rnd';
let correct = 0, wrong = 0, answered = {};

function filter(sec) { questions = sec === 'all' ? RAW : RAW.filter(q => q.s === sec); }

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function buildOrder() {
  order = questions.map((_,i) => i);
  if (mode === 'rnd') shuffle(order);
  currentIdx = 0; correct = 0; wrong = 0; answered = {};
}

function init(sec) {
  filter(sec); buildOrder(); render(); updateUI();
}

function go(dir) {
  currentIdx = Math.max(0, Math.min(order.length-1, currentIdx + dir));
  render(); window.scrollTo({top:0,behavior:'smooth'});
}

function setMode(m) {
  mode = m;
  document.getElementById('btn-seq').className = m === 'seq' ? 'btn active' : 'btn';
  document.getElementById('btn-rnd').className = m === 'rnd' ? 'btn active' : 'btn';
  buildOrder(); render(); updateUI();
}

function resetSession() { buildOrder(); render(); updateUI(); }

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatPassage(p) {
  // Replace _____ with a styled blank span, escape HTML first (carefully)
  // We do it character by character to avoid double escaping
  const parts = p.split('_____');
  const blank = '<span class="blank">___</span>';
  return parts.map(esc).join(blank);
}

function render() {
  const container = document.getElementById('card-container');
  const navRow = document.getElementById('nav-row');

  if (!questions.length) {
    container.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--muted)"><h2 style="color:var(--text);margin-bottom:8px">No questions</h2><p>Pick a section above</p></div>`;
    navRow.style.display = 'none';
    return;
  }

  navRow.style.display = 'flex';
  const qi = order[currentIdx];
  const q = questions[qi];
  const ans = answered[currentIdx];
  const isRS = q.s === 'Rhetorical Synthesis';

  // Passage
  let passHtml = '';
  if (q.p && q.p.trim()) {
    if (isRS) {
      passHtml = `<div class="card-passage"><div class="notes-label">📝 Student Notes</div><div class="notes-body">${esc(q.p)}</div></div>`;
    } else {
      passHtml = `<div class="card-passage">${formatPassage(q.p)}</div>`;
    }
  }

  // Options
  const letters = ['A','B','C','D'];
  let optsHtml = '';
  for (const L of letters) {
    const txt = q.o[L];
    if (!txt) continue;
    let cls = '';
    const dis = ans ? 'disabled' : '';
    if (ans) {
      if (L === q.a) cls = ans.chosen === L ? 'correct' : 'reveal';
      else if (L === ans.chosen) cls = 'wrong';
    }
    optsHtml += `<button class="option ${cls}" ${dis} onclick="pick('${L}')">
      <span class="opt-letter">${L}</span>
      <span class="opt-text">${esc(txt)}</span>
    </button>`;
  }

  // Feedback
  let fbHtml = '';
  if (ans) {
    if (ans.chosen === q.a) {
      fbHtml = `<div class="feedback ok show">✓ Correct!</div>`;
    } else {
      fbHtml = `<div class="feedback bad show">✗ Wrong — correct answer is <strong>${q.a}</strong></div>`;
    }
  }

  container.innerHTML = `<div class="card">
    <div class="card-header">
      <span class="q-badge">Q${q.n}</span>
      <span class="s-badge">${esc(q.s)}</span>
    </div>
    ${passHtml}
    <div class="card-prompt">${esc(q.q)}</div>
    <div class="options">${optsHtml}</div>
    ${fbHtml}
  </div>`;

  updateUI();
}

function pick(L) {
  if (answered[currentIdx]) return;
  const qi = order[currentIdx];
  const q = questions[qi];
  const ok = L === q.a;
  answered[currentIdx] = {chosen: L, correct: ok};
  if (ok) correct++; else wrong++;
  render();
}

function updateUI() {
  const total = questions.length;
  const done = Object.keys(answered).length;
  const pct = total ? done/total*100 : 0;
  document.getElementById('pf').style.width = pct + '%';
  document.getElementById('hprog').textContent = `${done} / ${total}`;
  document.getElementById('hsc').textContent = `✓ ${correct}`;
  document.getElementById('hsw').textContent = `✗ ${wrong}`;
  document.getElementById('stat-t').textContent = `${total} questions`;
  document.getElementById('stat-c').textContent = `${correct} correct`;
  document.getElementById('stat-w').textContent = `${wrong} wrong`;
  const np = document.getElementById('nav-pos');
  if (np) np.textContent = `${currentIdx+1} / ${total}`;
}

// Section tabs
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    init(t.dataset.s);
  });
});

init('all');
</script>
</body>
</html>
