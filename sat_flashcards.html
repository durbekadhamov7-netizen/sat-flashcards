<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAT Writing Flashcards – SAToplam</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3348;
    --text: #e8eaf0;
    --muted: #8890a4;
    --accent: #6c63ff;
    --accent-dim: rgba(108,99,255,0.15);
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.15);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.15);
    --gold: #f59e0b;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  .header-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .progress-pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    background: var(--surface2);
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  .score-pill {
    display: flex;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }

  .score-correct { color: var(--green); }
  .score-wrong { color: var(--red); }

  /* SECTION PICKER */
  .section-picker {
    padding: 20px 24px 0;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }

  .section-btn {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s ease;
  }

  .section-btn:hover { border-color: var(--accent); color: var(--text); }
  .section-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .section-btn .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    opacity: 0.75;
    margin-left: 4px;
  }

  /* MAIN */
  main {
    flex: 1;
    padding: 20px 24px 40px;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }

  .btn {
    padding: 8px 18px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s ease;
    font-family: inherit;
  }

  .btn:hover { background: var(--surface2); border-color: var(--accent); }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { opacity: 0.88; background: var(--accent); }

  .q-counter-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-left: auto;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .card-header {
    padding: 14px 20px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .q-num-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    background: var(--accent-dim);
    color: var(--accent);
    padding: 3px 8px;
    border-radius: 4px;
  }

  .q-section-badge {
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .card-passage {
    padding: 20px 20px 0;
    font-size: 14px;
    line-height: 1.7;
    color: #c9cdd8;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
  }

  .card-passage .notes-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .card-question {
    padding: 18px 20px;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.5;
    color: var(--text);
    border-bottom: 1px solid var(--border);
  }

  /* OPTIONS */
  .options {
    padding: 16px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 16px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    text-align: left;
    font-family: inherit;
    width: 100%;
  }

  .option:hover:not(:disabled) {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .option:disabled { cursor: default; }

  .option .letter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    min-width: 20px;
    padding-top: 1px;
    transition: color 0.15s ease;
  }

  .option .option-text {
    font-size: 14px;
    line-height: 1.55;
    color: var(--text);
    flex: 1;
  }

  /* Answer states */
  .option.correct {
    border-color: var(--green) !important;
    background: var(--green-dim) !important;
    box-shadow: 0 0 0 1px var(--green), 0 0 12px rgba(34,197,94,0.2);
    animation: glowGreen 0.35s ease;
  }

  .option.correct .letter { color: var(--green) !important; }

  .option.wrong {
    border-color: var(--red) !important;
    background: var(--red-dim) !important;
    box-shadow: 0 0 0 1px var(--red), 0 0 12px rgba(239,68,68,0.2);
    animation: glowRed 0.35s ease;
  }

  .option.wrong .letter { color: var(--red) !important; }

  .option.reveal-correct {
    border-color: var(--green) !important;
    background: var(--green-dim) !important;
  }

  .option.reveal-correct .letter { color: var(--green) !important; }

  @keyframes glowGreen {
    0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
    50% { box-shadow: 0 0 0 4px rgba(34,197,94,0.3), 0 0 20px rgba(34,197,94,0.3); }
    100% { box-shadow: 0 0 0 1px var(--green), 0 0 12px rgba(34,197,94,0.2); }
  }

  @keyframes glowRed {
    0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); }
    50% { box-shadow: 0 0 0 4px rgba(239,68,68,0.3), 0 0 20px rgba(239,68,68,0.3); }
    100% { box-shadow: 0 0 0 1px var(--red), 0 0 12px rgba(239,68,68,0.2); }
  }

  /* FEEDBACK BAR */
  .feedback-bar {
    display: none;
    margin: 0 20px 16px;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    align-items: center;
    gap: 10px;
  }

  .feedback-bar.show { display: flex; }
  .feedback-bar.correct-fb { background: var(--green-dim); border: 1px solid var(--green); color: var(--green); }
  .feedback-bar.wrong-fb { background: var(--red-dim); border: 1px solid var(--red); color: var(--red); }

  /* NAVIGATION */
  .nav-row {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    align-items: center;
  }

  .nav-row .spacer { flex: 1; }

  /* PROGRESS BAR */
  .progress-bar-wrap {
    margin-bottom: 16px;
  }
  .progress-bar-track {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state h2 { font-size: 18px; margin-bottom: 8px; color: var(--text); }

  /* MODE TOGGLE */
  .mode-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  .mode-label { font-size: 12px; color: var(--muted); font-weight: 500; }

  /* Stats panel */
  .stats-row {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .stat-chip {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    border: 1px solid var(--border);
    background: var(--surface);
  }
  .stat-chip.green { border-color: var(--green); color: var(--green); background: var(--green-dim); }
  .stat-chip.red { border-color: var(--red); color: var(--red); background: var(--red-dim); }
  .stat-chip.blue { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
</style>
</head>

<header>
  <span class="logo">@satashkent</span>
  <span class="header-title">SAT Writing Flashcards</span>
  <div class="header-right">
    <span class="score-pill">

      <span class="score-wrong" id="hdr-wrong">✗ 0</span>
    </span>
    <span class="progress-pill" id="hdr-progress">0 / 0</span>
  </div>
</header>

<div class="section-picker" id="section-picker">

</div>

<main>

    <button class="btn" id="btn-reset" onclick="resetSession()" style="margin-left:auto">↺ Reset</button>
  </div>

  <div class="stats-row">
    <span class="stat-chip blue" id="stat-total">0 questions</span>
    <span class="stat-chip green" id="stat-correct">0 correct</span>
    <span class="stat-chip red" id="stat-wrong">0 wrong</span>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar-track"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div id="card-container"></div>

  <div class="nav-row" id="nav-row" style="display:none">
    <button class="btn" onclick="prevQuestion()">← Prev</button>
    <span class="spacer"></span>
    <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)" id="nav-pos"></span>
    <span class="spacer"></span>
    <button class="btn btn-primary" onclick="nextQuestion()">Next →</button>
  </div>
</main>

ver land, Amrumbank West’s turbines turn faster and produce more energy than do most land farms’ turbines.","q":"Which choice completes the text with the most logical transition?","o":{"A":"As a result,","B":"On the other hand,","C":"Simultaneously,","D":"Indeed,"},"a":"B"},{"s":"Transitions","n":17,"p":"When using hairy coneflower for dyeing cloth, textile artists first soak it in water to release its color. Next, they add the cloth to the dye bath and simmer it for hours, perhaps even days. ____________ they remove the cloth from the dye bath, revealing that the cloth has turned a vibrant blue color.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Actually,","B":"For example,","C":"Therefore,","D":"Finally,"},"a":"A"},{"s":"Transitions","n":18,"p":"Though Middle English was widely spoken in fourteenth-century England, the English language was rarely employed in literature until poet Geoffrey Chaucer pioneered its literary use. ____________ his manuscripts contain the first documented uses of over 2,000 English words–like the word \"conspiracy\" in his 1386 poem \"The Monk’s Tale\"–which led a contemporary to dub him \"the first finder of our fair language.\"","q":"Which choice completes the text with the most logical transition?","o":{"A":"Finally,","B":"However,","C":"Therefore,","D":"Actually,"},"a":"A"},{"s":"Transitions","n":19,"p":"Space scientist Julie van Campen is excited about the potential of the new James Webb Space Telescope (JWST). Unlike its predecessor, the Hubble Telescope, the JWST is primarily an infrared telescope. Most light from distant galaxies is infrared; ____________ the JWST can provide van Campen and her team much more information about these galaxies than the Hubble could.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Besides,","B":"However,","C":"On the contrary,","D":"In fact,"},"a":"D"},{"s":"Transitions","n":20,"p":"As part of a study, participants were asked to list animals they thought of as \"charismatic,\" which was defined as \"attractive, fascinating, or appealing.\" Researchers compiled the responses into a single list and found that the panda and the crocodile both landed in the top twenty. ____________ no animal outranked the tiger.","q":"Which choice completes the text with the most logical transition?","o":{"A":"besides,","B":"however,","C":"on the contrary,","D":"in fact,"},"a":"D"},{"s":"Transitions","n":21,"p":"KBFT is a Native-run radio station broadcasting from the Bois Forte Band of Chippewa’s lands in Minnesota. In 2004, Loris Taylor wanted to make sure that stations like KBFT continued to thrive. ____________ she founded Native Public Media, a support system for Native radio stations that now includes around sixty stations.","q":"Which choice completes the text with the most logical transition?","o":{"A":"For instance,","B":"In contrast,","C":"Hence,","D":"Alternatively,"},"a":"B"},{"s":"Transitions","n":22,"p":"Many English adjectives share a linguistic origin with their associated nouns, like the adjective \"monetary\" and the noun \"money,\" both of which come from the Latin \"monetarius.\" ____________ some adjectives do not share an origin with their associated nouns. For example, the adjective \"arboreal\" ultimately comes from the Latin \"arbor,\" while its associated noun, \"tree,\" comes from the Old English \"treow.\"","q":"Which choice completes the text with the most logical transition?","o":{"A":"In reality,","B":"Hence,","C":"By contrast,","D":"In other words,"},"a":"B"},{"s":"Transitions","n":23,"p":"The dramatic archways of Barcelona’s Casa Bonaventura Ferrer, a private home designed by Pere Falques 1 Urpi, are emblematic of the nineteenth-century Modernista movement, which favored naturalistic curves over rigid right angles in its championing of organic forms. ____________ the private home’s decorative features, such as its floral stained glass windows, also take cues from nature.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Nevertheless,","B":"For this reason,","C":"Specifically,","D":"Subsequently,"},"a":"A"},{"s":"Transitions","n":24,"p":"In 1949, Frank Zamboni developed an ice rink resurfacing machine. As Zamboni’s machine moved along the rink’s surface, it first scraped off the top layer of ice. ____________ it sprayed water into the deep grooves left behind by customers’ skates. Lastly, it smoothed over the newly formed ice.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Likewise,","B":"By contrast,","C":"In other words,","D":"Nevertheless,"},"a":"A"},{"s":"Transitions","n":25,"p":"Scientists studying asteroid deflection have focused on secondary objects such as S/2020 (2013 PY6), a moonlet orbiting the near-Earth asteroid 2013 PY6. In 2022, NASA intentionally crashed a probe into just such an object, successfully altering its orbit. Scientists have yet to demonstrate, ____________ that 2013 PY6 and other primary objects would be similarly affected.","q":"Which choice completes the text with the most logical transition?","o":{"A":"For example,","B":"Next,","C":"Similarly,","D":"In contrast,"},"a":"B"},{"s":"Transitions","n":26,"p":"Biographer Michael Gorra notes that the novelist Henry James \"lived in a world of second thoughts,\" frequently tinkering with his novels and stories after their initial publication. However, the differences between the 1881 first edition and the 1908 edition of his novel A Portrait of a Lady are extreme, even by James’s standards; ____________ some critics regard the two editions as two different novels altogether.","q":"Which choice completes the text with the most logical transition?","o":{"A":"for example,","B":"though,","C":"likewise,","D":"moreover,"},"a":"B"},{"s":"Transitions","n":27,"p":"Working together with the Navajo Nation Department of Water Resources, Dr. Lani Tsinnajinnie analyzed data about snowpack levels in the Chuska Mountains. She found that the snowpack (the amount of snow on the ground) was deepest in early March at lower elevations. At higher elevations, ____________ the snowpack was deepest in mid-March.","q":"Which choice completes the text with the most logical transition?","o":{"A":"by contrast,","B":"in fact,","C":"nevertheless,","D":"in other words,"},"a":"B"},{"s":"Transitions","n":28,"p":"Just as the state of Hawaii has a designated state flower, tree, and bird, it also has a state soil: Hilo soil. Hilo is a fitting choice for state soil, in large part because it can be found in abundance across the state. ____________ it plays an important role in Hawaii’s agricultural industry and is used to grow a variety of crops, like ginger and taro.","q":"Which choice completes the text with the most logical transition?","o":{"A":"in other words,","B":"for instance,","C":"on the other hand,","D":"in summary,"},"a":"C"},{"s":"Transitions","n":29,"p":"In eastern Mexico, Monument 61 and Monument 1 are the names given to two massive human head statues that were left behind by the ancient Olmec civilization. Both statues are made of stone and are extremely heavy. ________ they each weigh more than 5 tons!","q":"Which choice completes the text with the most logical transition?","o":{"A":"Alternatively,","B":"By contrast,","C":"At that time,","D":"Additionally,"},"a":"D"},{"s":"Transitions","n":30,"p":"In 2014, Nestor Gomez won his first-ever storytelling competition, relating a tale about his life as a Guatemalan immigrant living in Chicago. ________ in 2017, Gomez created the show 80 Minutes Around the World as a platform for others to share stories about their immigration experiences.","q":"Which choice completes the text with the most logical transition?","o":{"A":"In any case,","B":"Earlier,","C":"In fact,","D":"Instead,"},"a":"C"},{"s":"Transitions","n":31,"p":"In his essay “Of Friendship,\" French philosopher Michel de Montaigne explores a relatively light subject, but he addresses heavier fare in “Of the Uncertainty of Our Judgment.\" Regardless of subject matter, Montaigne works to question his own perspective throughout his essays. ________ his personal motto was “What do I know?”","q":"Which choice completes the text with the most logical transition?","o":{"A":"Instead,","B":"For example,","C":"Later,","D":"In other words,"},"a":"C"},{"s":"Transitions","n":32,"p":"Ecologists like Renae Brodie use trophic pyramids to illustrate the food chain within a given ecosystem. At a typical pyramid’s base are primary producers, like plants, followed by herbivores at the second trophic level, then omnivores and carnivores at the third. __________ at the fourth, highest trophic level are apex predators, like eagles, that feed on the animals below.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Fittingly,","B":"Conversely,","C":"Nowadays,","D":"Still,"},"a":"A"},{"s":"Transitions","n":33,"p":"In a 2022 analysis of 200 terms, researchers found a broad pattern of valence-dependent mutation in which negative adjectives saw a faster rate of cognate replacement–the rate at which a word will be replaced over time with a noncognate form–than other words. ______________ the adjective \"illegal\" would be expected to mutate faster than the noun \"crisis.\"","q":"Which choice completes the text with the most logical transition?","o":{"A":"Lastly,","B":"In fact,","C":"For example,","D":"Besides,"},"a":"A"},{"s":"Transitions","n":34,"p":"In the early 1970s, Albert Popa took up graffiti art, spraying his work onto what was at the time an unconventional surface: concrete. ______________ Albert’s son David has chosen an unusual canvas for his new art project, Fractured. In this remarkable work, the artist draws charcoal faces onto fragmented ice floes in Finland, creating the visual effect of a face slowly fracturing.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Thus,","B":"Moreover,","C":"Meanwhile,","D":"However,"},"a":"A"},{"s":"Transitions","n":35,"p":"The world’s first airplane, the 1903 Wright Flyer, was not very aerodynamic, as evidenced by its low lift-to-drag ratio of just 8.3:1. The Northrop F-5 jet, like most modern aircraft, is far more aerodynamic. __________ its lift-to-drag ratio is more than twice that of the Wright Flyer.","q":"Which choice completes the text with the most logical transition?","o":{"A":"However,","B":"Indeed,","C":"Second,","D":"Likewise,"},"a":"D"},{"s":"Transitions","n":36,"p":"With many elements, like osmium, scientists were able to isolate a relatively pure sample of the substance shortly after discovering its existence. __________ this wasn’t the case with all elements. The process of isolating magnesium, for example, took 53 years, to be precise.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Specifically,","B":"In conclusion,","C":"However,","D":"Nevertheless,"},"a":"A"},{"s":"Transitions","n":37,"p":"Modernista architects championed nature in their designs. ______ the dramatic archways and bird-themed mosaics of Casa Lleó i Morera, a Modernista private home designed by Lluis Domènech i Montaner, couldn’t exactly grow in a forest. Still, one sees natural influences in Domènech i Montaner’s penchant for curves (rather than right angles) and plant- and animal-inspired flourishes.","q":"Which choice completes the text with the most logical transition?","o":{"A":"In other words,","B":"For this reason,","C":"Granted,","D":"Likewise,"},"a":"C"},{"s":"Transitions","n":38,"p":"Before the first railroads were built in Australia, engineers warned against using multiple track widths across the continent. ______ regional officials couldn’t agree on a single-width system. Thus, railways in Victoria, like the Victorian Goldfields Railway, were made using wide tracks, while those in New South Wales were built with narrow tracks.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Of course,","B":"Thus,","C":"Furthermore,","D":"Similarly,"},"a":"A"},{"s":"Transitions","n":39,"p":"Legislators in Ethiopia are elected via a first-past-the-post electoral system. In this winner-take-all voting system, the seat is awarded to the candidate who receives not a majority but a plurality (i.e., greatest number) of votes. ______ if several popular candidates are vying for the same seat, it is possible for a candidate to win an election despite receiving less than 50% of the votes.","q":"Which choice completes the text with the most logical transition?","o":{"A":"In other words,","B":"Similarly,","C":"For this reason,","D":"Nevertheless,"},"a":"D"},{"s":"Transitions","n":40,"p":"After appropriate permissions are granted, a typical archaeological dig begins with a surveyor making a detailed grid of the excavation site. Then, the site is carefully dug, and any artifacts found are recorded and mapped onto the site grid. ____________ the artifacts are removed, cataloged, and analyzed in a laboratory.","q":"Which choice completes the text with the most logical transition?","o":{"A":"However,","B":"Moreover,","C":"Accordingly,","D":"Similarly,"},"a":"C"},{"s":"Transitions","n":41,"p":"To guarantee the validity of experimental results, scientists rely on precise, unchanging standards of measurement. ____________ metrologists (scientists who study measurement) developed the SI, or International System of Units. The SI’s units of measurement are based on unchanging values in nature, such as the mass of an electron or the speed of light.","q":"Which choice completes the text with the most logical transition?","o":{"A":"For instance,","B":"On the contrary,","C":"Earlier,","D":"Finally,"},"a":"D"},{"s":"Transitions","n":42,"p":"Soil polluted with chromium (a heavy metal) is harmful to many plants and animals, but the plant species Ludwigia prostrata, or creeping water primrose, not only thrives in such conditions but also helps remediate them. As a metal hyperaccumulator, Ludwigia prostrata absorbs a large amount of chromium and stores it safely in its roots and shoots; ____________ chromium concentrations in the soil decrease.","q":"Which choice completes the text with the most logical transition?","o":{"A":"In contrast,","B":"Regardless,","C":"In addition,","D":"For this reason,"},"a":"D"},{"s":"Transitions","n":43,"p":"With many elements, like cadmium, scientists were able to isolate a relatively pure sample of the substance shortly after discovering its existence–but this wasn’t the case with all elements. ________ the isolation process took years. The element niobium, for instance, was discovered in 1801 but not isolated until 1864.","q":"Which choice completes the text with the most logical transition?","o":{"A":"in addition,","B":"nevertheless,","C":"in turn,","D":"specifically,"},"a":"C"},{"s":"Transitions","n":44,"p":"A band might choose a name that is as unique and original as possible. ________ they might name themselves after a recognizable song by a favorite band. This is what the Japanese experimental rock band Boris did when they named themselves after the song \"Boris\" by the Melvins.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Moreover,","B":"Thus,","C":"However,","D":"Sometimes,"},"a":"D"},{"s":"Transitions","n":45,"p":"If you could travel in a spaceship to Elara, one of Jupiter’s many moons, you’d find a moon with a prograde orbit. This means that Elara orbits Jupiter in the same direction that Jupiter rotates on its axis. ____________ at Pasiphae, another Jovian moon, you’d find an example of a retrograde orbit, with the moon revolving around Jupiter in the opposite direction.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Thus,","B":"Alternatively,","C":"In other words,","D":"For instance,"},"a":"D"},{"s":"Transitions","n":46,"p":"Monument 61 is the name given to a 13-ton stone statue of a human head that was created during the ancient Olmec civilization. It was discovered in Veracruz, Mexico, at the San Lorenzo archaeological site. __________ at the La Venta site in the state of Tabasco, another colossal head statue called Monument 4 was discovered.","q":"Which choice completes the text so that it conforms to the conventions of Standard English?","o":{"A":"For example,","B":"Specifically,","C":"In other words,","D":"Elsewhere,"},"a":"D"},{"s":"Transitions","n":47,"p":"In the South Asian country of Sri Lanka, the percentage of the population living in cities increased from 18.3% to 18.7% between 2015 and 2020; this upward trend in urbanization was seen throughout that part of the continent. __________ from 2015 to 2020, the overall percentage of the South Asian population living in cities rose from 34.5% to 36.6%.","q":"Which choice completes the text with the most logical transition?","o":{"A":"As a result,","B":"Specifically,","C":"For example,","D":"Elsewhere,"},"a":"D"},{"s":"Transitions","n":48,"p":"Ugandan American professor Peter Nazareth believed that Elvis Presley’s music is best understood not as a homogeneous collection but as an anthology (because Elvis showcased the contributions of a wide range of gospel, blues, and rock artists). __________ Nazareth entitled his college course on Elvis and his music, which focused on Elvis’s many musical influences, \"Elvis as Anthology.\"","q":"Which choice completes the text with the most logical transition?","o":{"A":"Nevertheless,","B":"Indeed,","C":"In reality,","D":"Later,"},"a":"B"},{"s":"Transitions","n":49,"p":"Humans inherit specific physical traits (like having type O or type AB blood) from their parents.__________cats inherit specific physical traits (like having short or long fur) from their parents.","q":"Which choice completes the text with the most logical transition?","o":{"A":"In sum,","B":"To that end,","C":"In addition,","D":"That is,"},"a":"B"},{"s":"Transitions","n":50,"p":"Author Ursula K. Le Guin’s Rocann ","B":"Thus,","C":"Sometimes,","D":"Moreover,"},"a":"C"},{"s":"Transitions","n":54,"p":"Scientists long debated the origins of chondrules, tiny glass beads that formed in meteors billions of years ago. For decades, different theories were proposed, from lightning strikes to powerful rock collisions, but none had sufficient evidentiary support. ________scientists found strong evidence that chondrules were formed by shock waves in nearby nebulae.","q":"Which choice completes the text with the most logical transition?","o":{"A":"What’s more,","B":"In other words,","C":"Conversely,","D":"For instance,"},"a":"A"},{"s":"Transitions","n":55,"p":"Voting members of the 2006 Latin Grammys were impressed by Los Tigres del Norte’s album Historias Que Contar and its contribution to the norteño genre, a form of regional Mexican music featuring accordion and bajo sexto guitar that first developed in northern Mexico in the late nineteenth century. ______________ they awarded the group the Best Norteño Album award.","q":"Which choice completes the text with the most logical transition?","o":{"A":"For example,","B":"Finally,","C":"Similarly,","D":"Therefore,"},"a":"B"},{"s":"Transitions","n":56,"p":"As anthropologist Cristina Grasseni explains, with the rise in demand for artisanal cheeses claiming to be typical of specific Italian regions, such as Pecorino Siciliano cheese from Sicily, came the need to guarantee the veracity of such claims to consumers. ______________ the European Union established DOP status, a label certifying that the cheese was made according to the region’s local traditions.","q":"Which choice completes the text with the most logical transition?","o":{"A":"In contrast,","B":"Accordingly,","C":"Meanwhile,","D":"Nevertheless,"},"a":"B"},{"s":"Transitions","n":57,"p":"Just as the state of Texas has a designated state flower, tree, and bird, it also has a state soil: Houston Black soil. Houston Black is a fitting choice for state soil, in large part because it can t time. despite its idyllic quality, the poem bears the imprint of the dramatic changes affecting English life.","q":"Which choice completes the text with the most logical transition?","o":{"A":"nevertheless,","B":"likewise,","C":"hence,","D":"conversely,"},"a":"B"},{"s":"Transitions","n":174,"p":"Generally, sleek vehicles are more aerodynamic than bulkier ones. For example, the streamlined nose of the T-38 Talon jet helps it glide through wind with relative ease. a boxy semitruck encounters more wind resistance, making it less aerodynamic.","q":"Which choice completes the text with the most logical transition?","o":{"A":"For example,","B":"As such,","C":"Nevertheless,","D":"Moreover,"},"a":"C"},{"s":"Transitions","n":175,"p":"To notice subtle variations in the progression of the still life painting genre in Europe, first consider Willem van Aelst’s \"Still Life with Dead Game\" from 1661; compare it to Jan van Huysum’s \"Still Life with Flowers\" from 1723.","q":"Which choice completes the text with the most logical transition?","o":{"A":"As a result,","B":"Specifically,","C":"In conclusion,","D":"On the other hand,"},"a":"D"},{"s":"Transitions","n":176,"p":"Soil polluted with iron (a heavy metal) is harmful to many plants and animals, but the plant species Limnocharis flava, or yellow velvetleaf, not only thrives in such conditions but also helps remediate them. As a metal hyperaccumulator, Limnocharis flava absorbs a large amount of iron and stores it safely in its roots and shoots: iron concentrations in the soll decrease.","q":"Which choice completes the text with the most logical transition?","o":{"A":"therefore,","B":"still,","C":"instead,","D":"next,"},"a":"D"},{"s":"Transitions","n":177,"p":"In a 2024 study, researchers investigating the biodiversity of trees in Amsterdam counted and classified the city’s trees. They found notable variation in the percentage of native trees in different areas of the city. more than half of the trees in administrative unit GE05 (54%) were native species, but only 12% of the trees in administrative unit GE04 were native species.","q":"Which choice completes the text with the most logical transition?","o":{"A":"specifically,","B":"nevertheless,","C":"in addition,","D":"accordingly,"},"a":"D"},{"s":"Transitions","n":178,"p":"Every US state has an associated state soil, which is typically selected by a group of experts, then passed through the state legislature to receive its official designation. For example, Oklahoma’s Port Silt Loam soil was formally designated in 1987, and Maine’s Chesuncook soil in 1999. years pass between a soil’s selection and official designation, as the legislative process can be notoriously slow.","q":"Which choice completes the text with the most logical transition?","o":{"A":"As was previously stated,","B":"Exemplifying this variation,","C":"Contrary to this finding,","D":"Resulting from this conclusion,"},"a":"B"},{"s":"Transitions","n":179,"p":"A 1990 study of schooling fish observed the fish mimicking the behavior of school-mates rapidly swimming away from a predator. This is an example of an information cascade that benefits the collective. the animal world is at times susceptible to the spread of misinformation, often with unfavorable results: a 2010 study of semipalmated sandpipers concluded that fleeing in response to flock-mates’ false alarms caused the birds to abandon safe nesting grounds unnecessarily.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Therefore,","B":"Often,","C":"Similarly,","D":"Indeed,"},"a":"B"},{"s":"Transitions","n":180,"p":"If you were to view the Namarunu volcano in Kenya from above, you might notice that its low profile and gently sloping sides make it look a bit like a shield lying flat on the ground. it makes sense that Lydia Jennings and other volcanologists classify Namarunu as a shield volcano.","q":"Which choice completes the text with the most logical transition?","o":{"A":"In other words,","B":"Conversely,","C":"Indeed,","D":"Consequently,"},"a":"C"},{"s":"Transitions","n":181,"p":"The moon Dia orbits Jupiter in the same direction that the planet rotates. Dia’s orbit is described as prograde. Erinome, another of Jupiter’s moons, orbits in the opposite direction, so its orbit is described with the opposite term: retrograde.","q":"Which choice completes the text with the most logical transition?","o":{"A":"For instance,","B":"Therefore,","C":"However,","D":"By contrast,"},"a":"B"},{"s":"Transitions","n":182,"p":"Scientists studying asteroid deflection have focused on secondary objects such as S/2015 (190208), a moonlet orbiting the near-Earth asteroid 2006 AQ. In 2022 NASA intentionally crashedaprobe into just such an object, successfully altering its orbit. Scientists have yet to demonstrate, that 2006 AQ and other primary objects would be similarly affected.","q":"Which choice completes the text with the most logical transition?","o":{"A":"However,","B":"Thus,","C":"Likewise,","D":"Next,"},"a":"B"},{"s":"Transitions","n":183,"p":"Many paintings of the trompe l’oeil genre attain their illusory verisimilitude by depicting quotidian things, such as a fly or an empty bird cage, as if they are placed directly on top of the painted canvas. Nicola van Houbraken’s 1700 trompe l’oeil Portrait of François Rivière, startles the viewer with the extraordinary sight of a man appearing to poke his head out from within the picture frame.","q":"Which choice completes the text with the most logical transition?","o":{"A":"for example,","B":"admittedly,","C":"moreover,","D":"likewise,"},"a":"B"},{"s":"Transitions","n":184,"p":"In 1929, scientists first isolated a sample of the steroid hormone progesterone, which they knew existed in animals – and they assumed only in animals. researchers would find progesterone in corn plants (Zea mays), but this discovery wouldn’t come until decades later.","q":"Which choice completes the text with the most logical transition?","o":{"A":"fittingly,","B":"by contrast,","C":"for instance,","D":"specifically,"},"a":"B"},{"s":"Transitions","n":185,"p":"Decentralized space, in which no points in the performance space are privileged over others, was one of the central principles of Merce Cunningham’s choreographic philosophy. The approach marked a radical departure from the dance philosophies of Cunningham’s mid-twentieth-century contemporaries. resulting in his dance pieces, like Interscape Mirage, being received not merely as experimental spectacles but as groundbreaking artworks.","q":"Which choice completes the text with the most logical transition?","o":{"A":"In other words,","B":"For example,","C":"Eventually,","D":"Earlier,"},"a":"C"},{"s":"Transitions","n":186,"p":"Many past Olympic Games featured demonstration sports-nonmedal events-to showcase sports related to the host country. These events included korfball, a handball sport popular in the Netherlands, and kyudõ, a Japanese form of archery. they were chosen as demonstration sports at the Olympic Games in Amsterdam, the Netherlands, and Tokyo, Japan, respectively.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Moreover, Cunningham incorporated his principles with great skill and artistry.","B":"Specifically, Cunningham was an accomplished dancer as well as choreographer,","C":"Accordingly, Cunningham founded his namesake dance company in 1953,","D":"In contrast, Cunningham gained a reputation as an unpredictable iconoclast,"},"a":"A"},{"s":"Transitions","n":187,"p":"Since 1941, the South Side Community Art Center in Chicago, Illinois, has cultivated a multigenerational community of Black creatives-from writer Gwendolyn Brooks, to musician Nat King Cole, to visual artists like Allen Stringfellow and Frank Hayden. it has garnered a reputation as a hub of Black art and culture in Chicago.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Additionally,","B":"By contrast,","C":"Fittingly,","D":"Nevertheless,"},"a":"C"},{"s":"Transitions","n":188,"p":"For several centuries after the birth of opera in sixteenth-century Florence, Italian remained the default language in which most opera scores were written. opera singers today, such as the soprano Pretty Yende, encounter a wide range of Italian terms-from furioso (furiously) to affrettando (at a hurried tempo)-when following many eighteenth-century opera scores.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Accordingly,","B":"On the other hand,","C":"Nevertheless,","D":"Periodically,"},"a":"A"},{"s":"Transitions","n":189,"p":"At Storm King Art Center, an outdoor sculpture park in New York, Herbert Ferber’s Konkapot Ilis exposed to rain, snow, heat, and humidity. it remains in good condition due to its material: Ferber’s sculpture is made of corrosion-resistant steel.","q":"Which choice completes the text with the most logical transition?","o":{"A":"However,","B":"Thus,","C":"Lastly,","D":"Granted,"},"a":"B"},{"s":"Transitions","n":190,"p":"Known as an \"empire on which the sun never sets,\" the Spanish Empire once controlled portions of five continents. Its legacy can still be seen, and heard, in the Spanish-speaking nation of Cuba, which gained its independence from Spain in the nineteenth century. a former colony’s tie to the Spanish Empire is so tenuous that Spanish is seldom spoken there; an example is Sardinia, which ceased to be part of the empire in 1720.","q":"Which choice completes the text with the most logical transition?","o":{"A":"As a result,","B":"That said,","C":"In addition,","D":"On the contrary,"},"a":"B"},{"s":"Transitions","n":191,"p":"While studying joro¯ spiders, a large species originally from East Asia, University of Georgia researchers wondered if the spiders’ rapid spread throughout the southeastern US was a result of aggressive behavior. they discovered that jorõ spiders are gentle giants who react to even minor disturbances by \"freezing\" in place for an hour or more.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Sometimes,","B":"On the other hand,","C":"At the same time,","D":"In addition,"},"a":"B"},{"s":"Transitions","n":192,"p":"Some bands choose a name that’s as unique as possible to distinguish themselves from other bands. The experimental rock band Boris, took a different approach. They chose to name themselves after a song by a well-known band, the Melvins.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Instead,","B":"Therefore,","C":"For example,","D":"In other words,"},"a":"A"},{"s":"Transitions","n":193,"p":"Portuguese researcher Isabel C.F.R. Ferreira reports that the cinnamic acid in termite mushrooms benefits the mushroom by combating harmful molecules called free radicals. Ferreira suggests that the acid can promote cellular health in humans, who also experience free radical damage.","q":"Which choice completes the text with the most logical transition?","o":{"A":"therefore,","B":"secondly,","C":"by contrast,","D":"for example,"},"a":"C"},{"s":"Transitions","n":194,"p":"The Eloi are not real: they are fictional creatures that feature in H.G. Wells’s acclaimed science fiction novella The Time Machine. the Eloi were prime candidates for inclusion in Jorge Luis Borges and Margarita Guerrero’s The Book of Imaginary Beings, a compendium of fantastical entities from legend and literature.","q":"Which choice completes the text with the most logical transition?","o":{"A":"For example,","B":"Moreover,","C":"Conversely,","D":"Rather,"},"a":"B"},{"s":"Transitions","n":195,"p":"In contrast to first-past-the-post electoral processes, the proportional representation system by which Bolivia’s Chamber of Senators is elected begins with citizens casting their votes not for specific candidates but for political parties. once the votes have been tabulated, each party is awarded a number of seats proportional to the number of votes it received.","q":"Which choice completes the text with the most logical transition?","o":{"A":"In reality,","B":"Granted,","C":"For example,","D":"As such,"},"a":"D"},{"s":"Transitions","n":196,"p":"Voxel modeling and kitbashing approaches to three-dimensional digital modeling for video games yield graphics that accurately represent the relative sizes and proportions of real-world objects, but since these graphics are rendered from perfect geometric shapes, they tend to lack organic realism. these 3D elements may display unnaturally precise angles and curves as compared to their real-world counterparts.","q":"Which choice completes the text with the most logical transition?","o":{"A":"In other words,","B":"Conversely,","C":"Then,","D":"However,"},"a":"C"},{"s":"Transitions","n":197,"p":"Srivijaya, a Buddhist sea power based in Sumatra in Indonesia that reached the height of its influence around 800 CE, is classified as a thalassocracy. Thalassocracies are generally considered distinct from tellurocracies, or land-based powers. the British Empire (1600s-1900s CE) notably extended its hegemony across both land and sea.","q":"Which choice completes the text with the most logical transition?","o":{"A":"However,","B":"In addition,","C":"In conclusion,","D":"As such,"},"a":"D"},{"s":"Transitions","n":198,"p":"In February 1864, James Johnson joined the US Army. He went on to serve in the 18th New York Cavalry during the US Civil War and, earned a place in US history as one of the war’s few Chinese-born American soldiers","q":"Which choice completes the text with the most logical transition?","o":{"A":"Underscoring this difference,","B":"Exemplifying this distinction,","C":"Supporting this claim,","D":"Blurring this line,"},"a":"D"},{"s":"Transitions","n":199,"p":"The lack of accessible written sources is a common challenge faced by biographers of pre-nineteenth-century subjects. when writing his biography of Alexander Hamilton (1755-1804), historian Ron Chernow had at his disposal Harold Syrett’s 26-volume, 19,000-document Papers of Alexander Hamilton.","q":"Which choice completes the text with the most logical transition?","o":{"A":"usually,","B":"for instance,","C":"in any case,","D":"in doing so,"},"a":"D"},{"s":"Transitions","n":200,"p":"At a time when many women writers used male pseudonyms to gain greater freedom of self-expression by evading gender conventions, Katherine Bradley and Edith Cooper adapted the practice by publishing poetry, prose, and drama for four decades under the shared name Michael Field. the duo was able to express the joint creative vision that sustained their long personal and professional partnership.","q":"Which choice completes the text with the most logical transition?","o":{"A":"To take one well-known example,","B":"In accordance with this premise,","C":"It thus came as no surprise that,","D":"On the other end of the spectrum,"},"a":"D"},{"s":"Transitions","n":201,"p":"In a 2005 study by Mellado et al., the researchers’ aim was to analyze the diet composition of cattle in Coahuila, Mexico. they aimed to analyze the ratio of three different plant subtypes within these animals’ diet: graminoids, forbs, and browse.","q":"Which choice completes the text with the most logical transition?","o":{"A":"In this way,","B":"For instance,","C":"Later,","D":"On the other hand,"},"a":"A"},{"s":"Transitions","n":202,"p":"John Quincy Adams employed the pseudonym \"Marcellus\"-a reference to a leader of an ancient Roman army-in political essays he wrote in 1793, a choice that accomplished far more than simply concealing his authorship. it wasn’t an arbitrary pen name but rather a complex rhetorical strategy through which Adams aligned his political views with the venerated republican ideals of the ancient world, thereby bolstering the authority of his writing.","q":"Which choice completes the text with the most logical transition?","o":{"A":"Instead,","B":"All the same,","C":"Therefore,","D":"Specifically,"},"a":"D"},{"s":"Transitions","n":203,"p":"Answers: T Number Answer 1 C 3 D 5 A 7 A 9 A 11 C 13 A 15 A 17 A 19 D 21 B 23 A 25 B 27 B 29 D 31 C 33 A 35 D 37 C 39 D 41 D","q":"Which choice completes the text with the most logical transition?","o":{"A":"Conversely,","B":"In addition,","C":"However,","D":"Indeed,"},"a":"D"},{"s":"Rhetorical Synthesis","n":1,"p":"While researching a topic, a student has taken the following notes: • Blackberries are fruits that contain ascorbic acid, an essential nutrient for humans. • Every 100 grams (g) of blackberries contains 21 milligrams (mg) of ascorbic acid. • Many animals can make ascorbic acid in their bodies, but humans cannot. • Humans must get ascorbic acid from foods, including fruits and vegetables. • Ascorbic acid is also known as vitamin C.","q":"Which choice most effectively uses information from the given sentences to set up a discussion of Walker’s career for an audience already familiar with the MBC Project?","o":{"A":"While George Theophilus Walker is considered a great composer, there are many more such composers included in MBC’s Historic Composers Directory.","B":"Born in 1922, George Theophilus Walker passed away in 2018 according to the MBC project.","C":"Among the many talented figures included in the MBC project is classical music composer George Theophilus Walker.","D":"The MBC project’s Historic Composers Directory highlights Black classical composers of the past, such as George Theophilus Walker (1922-2018), in order to inspire music students to become the classical composers of the future."},"a":"C"},{"s":"Rhetorical Synthesis","n":2,"p":"While researching a topic, a student has taken the following notes: • Sister cities are pairs of cities that form social or legal partnerships to promote each other’s cultures. • Previously known as \"town twinning,\" the concept of sister cities evolved in Europe after WORLD WAR II as a way to repair bonds between cities. • Many cities in New York State maintain such partnerships with cities around the world. • Rhinebeck, New York, and Larreynaga, Nicaragua, became sister cities in 1989.","q":"The student wants to specify how much vitamin C is in blackberries. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Many animals can make ascorbic acid, which is also known as vitamin C, in their bodies, but humans cannot.","B":"There is 21 mg of vitamin C in every 100 g of blackberries.","C":"Since humans cannot make vitamin C in their bodies, they must get this essential nutrient from foods like blackberries.","D":"Blackberries contain vitamin C, which humans must get from food."},"a":"B"},{"s":"Rhetorical Synthesis","n":3,"p":"While researching a topic, a student has taken the following notes: • In a 2011 study, Loydi tested the effect of plant litter on seeding emergence in a grassland setting. • Plant litter includes dead leaves and other plant material. • The test site was a mesic grassland in Argentina. • It was in a subtropic climate with year-round rain. • The researcher found that in these environmental conditions, the presence of plant litter had a neutral effect on seeding emergence.","q":"The student wants to emphasize the duration of Rhinebeck and Larreynaga’s sister city relationship. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Since the end of WORLD WAR II, sister cities such as Rhinebeck, New York, and Larreynaga, Nicaragua, have continued to form social partnerships to promote each other’s cultures.","B":"As sister cities, Rhinebeck, New York, and Larreynago, Nicaragua, have engaged in cultural exchange and partnerships since 1989.","C":"Larreyna, which became a sister city–or \"twin town\"-to Rhinebeck, New York, is located in Nicaragua.","D":"Despite their distance from each other, the sister cities of Rhinebeck, New York, and Larreyna Nicaragua have enjoyed the same partnerships as many other sister cities."},"a":"B"},{"s":"Rhetorical Synthesis","n":4,"p":"While researching a topic, a student has taken the following notes: • Trans Siberrean Orchestra (OTS) is a band from US that was created in 1996. • The band’s sound combines the genres of hard rock and classical music, with an epic assembly of nearly fifty musicians that includes over a dozen singers. • Musicians are regularly invited to perform with OTS on tour. • Keyboardist Paul Morris toured with OTS in 2000. • Electric violinist Alison toured with OTS in 2008.","q":"Which choice most effectively uses information from the given sentences to specify the test site’s climate?","o":{"A":"Loydi’s study was conducted in a subtropical, climate with year-round rain.","B":"A test was conducted in Argentina to study the effect of plant litter on seedling emergence in a given climate.","C":"Loydi tested the effect of dead leaves and other plant material on seedling emergence in Argentina.","D":"In a study, Loydi found that the presence of plant litter had a neutral effect on seedling emergence."},"a":"A"},{"s":"Rhetorical Synthesis","n":5,"p":"While researching a topic, a student has taken the following notes: • Maya Lin is an American artist known for her memorials and works of installation art. • She completed the Women’s Table in 1993. • It is a memorial sculpture consisting of thirty-two-ton granite fountain, and it is designed to commemorate female students at Yale University. • She completed Untitled in 1997. • It is an installation artwork composed of wood that fills an entire gallery room.","q":"Which choice most effectively uses information from the given sentences to emphasize the role Paul Morris played when performing with OTS?","o":{"A":"In 2000, Paul Morris performed with OTS as a touring keyboardist.","B":"From keyboardist Paul Morris to electric violinist Alison, musicians all over the world have taken the opportunity to perform with OTS.","C":"Musicians Paul Morris and Alison both toured with OTS.","D":"It was in 2000 that keyboardist Paul Morris performed with OTS."},"a":"A"},{"s":"Rhetorical Synthesis","n":6,"p":"While researching a topic, a student has taken the following notes: • Epistolary novels are novels written primarily as a series of fictional documents, typically letters. • Sometimes, the documents are journal entries, newspaper clippings, and more. • Julie, or The New Heloise (1761) is an epistolary novel by French author Jean Jacques Rousseau. • It consists primarily of letters sent between a man and a woman living in a small French town. • Absolutely Normal Chaos (1990) is an epistolary novel by American author Sharon Creech. • It consists primarily of journal entries written by a student ","q":"Which choice most effectively uses information from the given sentences to emphasize the difference between the two works?","o":{"A":"Maya is well known for her memorials and installation art, such as the Women’s table and Untitled.","B":"Completed in 1997, respectively, the Women’s Table and Untitled are both large scale works.","C":"Maya’s Women’s Table is a memorial sculpture, while Untitled is an installation artwork.","D":"Though Maya’s Untitled is not a memorial, its gallery-filling scale may call to mind her imposing Women’s Table, which consists of a thirty-ton-granite fountain."},"a":"C"},{"s":"Rhetorical Synthesis","n":7,"p":"While researching a topic, a student has taken the following notes: • The Mohs scale of mineral hardness is a ten point scale that orders minerals by hardness based on their ability to scratch other minerals. • Minerals with larger numbers are harder than minerals with smaller numbers and can leave visible scratches on them. • Minerals with smaller numbers are softer than minerals with larger numbers and cannot leave visible scratches on them. • The mineral calcite has a Mohs scale number of 3. • The mineral apatite has a Mohs scale number of 5. • The mineral topaz has a Mohs scale number of 8","q":"The student wants to emphasize a difference between the two novels. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The French author Jean Jacques Rousseau and the American author Sharon Creech have written epistolary novels.","B":"While Julie, or The New Heloise and Absolutely Normal Chaos are both epistolary novels, the former is composed primarily of letters and the latter of journal entries.","C":"Some epistolary novels consist primarily of journal entries, but most, like Jean Jacques Rousseau’s Julie, or The New Heloise, consist primarily of letters.","D":"Jean Jacques Rousseau’s Julie, or The New Heloise, and Sharon Creech’s Absolutely Normal Chaos demonstrate the variety of documents that can be used in epistolary novels."},"a":"B"},{"s":"Rhetorical Synthesis","n":8,"p":"While researching a topic, a student has taken the following notes: • Kale is a vegetable that contains ascorbic acid, an essential nutrient for human. • Blueberries are fruits that contain ascorbic acid. • There is 120 milligrams (mg) of ascorbic acid per every 100 grams (g) of kale. • There is 10 mg of ascorbic acid per every 100 g of blueberries. • Humans cannot make ascorbic acid in their bodies, so they must get it from foods, including fruits and vegetables. • Ascorbic acid is also known as vitamin C.","q":"The student wants to explain how hard apatite is in relation to other minerals. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"In the Mohs scale of mineral hardness, topaz (8) is ranked higher than calcite (3)","B":"Calcite, topaz, and apatite can be ordered by their ability to leave visible scratches on other minerals.","C":"Topaz has a Mohs scale number of 8, which means that it can scratch nor only calcite but also apatite.","D":"Apatite has a Mohs scale number of 5, which means that it is harder than calcite (3) but softer than topaz (8)."},"a":"D"},{"s":"Rhetorical Synthesis","n":9,"p":"While researching a topic, a student has taken the following notes: • A currency is a money system. • Sometimes, countries adopt a new currency to replace an older one. • Mozambique adopted the escudo as its official currency in 1914. • The metical replaced the escudo in 1980. • The metical remains Mozambique’s official currency.","q":"The student wants to make and support a claim that kale is a better source of vitamin C than blueberries are. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Kale contains ascorbic acid (which humans cannot make in their bodies) and blueberries do too.","B":"Blueberries contain 0.1 mg of vitamin C per g, but kale is a better source of vitamin C: in fact, kale contains 1.2 mg per g.","C":"Kale is a better source of vitamin C, also known as ascorbic acid, than blueberries are.","D":"Humans must get vitamin C from foods like Kale and blueberries because they cannot make it in their bodies"},"a":"B"},{"s":"Rhetorical Synthesis","n":10,"p":"While researching a topic, a student has taken the following notes: • The Future of Nostalgia is a scholarly book by literary theorist Svetlana Boym. • The book provides a multifaced exploration of the concept of nostalgia. • Chapter 14 discusses themes of nostalgia in Joseph Brodsky’s writing. • Chapter 17 discusses various skeptics’ takes on the concept of nostalgia. • In chapter 17, Boym writes, \"The poethics of nostalgia combines estrangement and human solidarity, affect and reflection.\"","q":"The student wants to specify how long Mozambique officially used the escudo. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Countries sometimes adopt new currency systems, as Mozambique did when it replaced the escudo with the metical.","B":"Though Mozambique currently uses the metical, the country’s former official currency was introduced in 1914.","C":"The escudo was Mozambique’s official currency from 1914 to 1980.","D":"The metical has been Mozambique’s official currency since 1980, when it replaced the escudo."},"a":"C"},{"s":"Rhetorical Synthesis","n":11,"p":"While researching a topic, a student has taken the following notes: • The Archipelago-Madrean Mountains are located in northwestern Mexico. • They cover an area of 1,038 square miles (mi²) • The Big Hatchet Mountains are located in the southwestern United States. • They cover an area of 65 mi² • These mountain ranges are two of the dozens of \"sky islands\" in the southwestern US and northwestern Mexico. • A sky island is an isolated mountain range whose environment differs dramatically from that of the surrounding lowlands.","q":"The student wants to provide a quotation from chapter 17. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"After discussing themes of nostalgia in Joseph Brodsky’s writing, Svetlana Boym goes on to discuss various skeptics’ takes on the concept of nostalgia.","B":"Svetlana Boym’s The Future of Nostalgia is a multifaceted exploration of nostalgia.","C":"In an exploration of various skeptics’ takes on the concept of nostalgia, Svetlana Boym writes, \"The poethics of nostalgia combines estrangement and human solidarity, affect and reflection.\"","D":"Svetlana Boym discusses themes of nostalgia in Joseph Brodsky’s writing in chapter of her book."},"a":"C"},{"s":"Rhetorical Synthesis","n":12,"p":"While researching a topic, a student has taken the following notes: • Ynés Mexía was a Mexican American botanist. • Between 1917 and 1938, she collected over 150,000 botanical samples throughout the Americas. • She collected a sample of Trixis antimenorrhoea in Minas Gerais, Brazil, on June 26, 1930. • She collected a sample of Stephanomeria thurberi in Chihuahua, Mexico, on May 27, 1929. • These specimens are members of the Asteraceae family. • They can now be viewed online at the C.V. Starr Virtual Herbarium.","q":"The student wants to emphasis the similarity between the two mountain ranges. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"There are dozens of different mountain ranges in located in the southwestern US and northwestern Mexico.","B":"The Archipelago-Madrean Mountains and the Big Hatchet Mountains are both inland mountain ranges whose surroundings are different from those of the surrounding mountains.","C":"The Archipelago-Madrean Mountains cover an area of 1,038 mi², while the Big Hatchet Mountains cover an area of 65 mi².","D":"Even though they are both sky islands, the Archipelago-Madrean Mountains and the Big Hatchet Mountains are located in different countries."},"a":"B"},{"s":"Rhetorical Synthesis","n":13,"p":"While researching a topic, a student has taken the following notes: • Calida Garcia Rawles is an African American painter. • She is known for her large-scale, hyperrealistic paintings depicting African American figures in water. • The painting Lightness of Being (24 × 30 in) depicts a young man with his arms outstretched floating on the right side of the canvas. • Lost in the Shuffle (36 × 24 in) depicts two young men with their arms outstretched floating in the bottom left and upper right corners of the canvas. • She paints the water with vivid blue colors, including sky blue and indigo. • Th","q":"Which choice most effectively uses information from the given sentences to emphasize when she collected both of the samples?","o":{"A":"Thousands of botanical samples collected by Ynés Mexía can now be found in one place: online at the C.V. Starr Virtual Herbarium.","B":"While both specimens collected by Ynés Mexía are members of the same family, Trixis antimenorrhoea was found in Minas Gerais and Stephanomeria thurberi was found in Chihuahua.","C":"June in 1930, Ynés Mexía added a new specimen to her growing collection of botanical samples: Trixis antimenorrhoea of the Asteraceae family.","D":"Ynés Mexía collected a sample of Trixis antimenorrhoea in June of 1930, after collecting Stephanomeria thurberi in May of 1929."},"a":"D"},{"s":"Rhetorical Synthesis","n":14,"p":"While researching a topic, a student has taken the following notes: • Grimanesa Amoros is a Peruvian American artist. • She is well known for her large-scale LED light sculptures. • Argentum debuted in 2018 at the Bronx Museum of the Arts in New York City, New York. • It is made of iridescent multicolored LED domes. • It occupies 253 cubic feet of space.","q":"Which choice most effectively uses information from the given sentences to emphasize the location of the figures in Lost in the Shuffle?","o":{"A":"At by inches, Rawles’s Lost in the Shuffle is even larger than the sizable 24-by 30-inch painting Lightness of Being.","B":"Rawles captures the water in paintings such as Lightness of Being and Lost in the Shuffle in vivid hues of sky blue and indigo.","C":"In Rawles’s painting Lost in the Shuffle, two young men are depicted in the bottom left and upper right corners of the canvas.","D":"While the number of figures may differ, constant among Rawles’s hyperrealistic works is the calm mood that painting evokes."},"a":"C"},{"s":"Rhetorical Synthesis","n":15,"p":"While researching a topic, a student has taken the following notes: • The United States has designated more than 500 areas National Wildlife Refuges (NWRs). • Some NWRs were established specifically to protect endangered species. • The James River NWR is a 4,147-acre area in Virginia, on the Atlantic coast. • It was established to protect the endangered bald eagle. • The Hopper Mountain NWR is a 2,471-acre area in California, on the Pacific coast. • It was established to protect the endangered California condor.","q":"Which choice most effectively uses information from the given sentences to emphasize when and where Argentum debuted?","o":{"A":"As is common of Grimanesa Amoros’s sculptures, the iridescent multicolored LED domes of Argentum cut an imposing cubic foot figure when the piece debuted","B":"Artist Grimanesa Amoros often works with light in her sculptures, which tend to be large in scale.","C":"In 2018, Grimanesa Amoros debuted Argentum in New York City, New York.","D":"Grimanesa Amoros is a Peruvian American artist who often works with LED light in her large-scale sculptures, such as Argentum [2018]."},"a":"C"},{"s":"Rhetorical Synthesis","n":16,"p":"While researching a topic, a student has taken the following notes: • The Botswana Federation of Trade Unions (BFTU) is a national union federation for the African nation of Botswana. • It helps improve conditions for workers in that nation. • ITUC-Africa is a regional union federation that represents national union federations across Africa. • It represents the BFTU.","q":"The student wants to contrast the two NWRs. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"While the James River NWR is in Virginia, on the Atlantic coast, the Hopper Mountain NWR is in California, on the Pacific coast.","B":"The US has designated more than 500 areas NWRs, including the James River NWR in Virginia.","C":"Both the James River NWR and the Hopper Mountain NWR were established to protect endangered species.","D":"Some NWRs were established specifically to protect endangered species such as the California condor."},"a":"A"},{"s":"Rhetorical Synthesis","n":17,"p":"While researching a topic, a student has taken the following notes: • Silent films can be valuable historical documents of their time. • Ninety percent of silent films made before 1930 are now lost. • A film is considered lost when no remaining copies are known to exist. • Director Oscar Micheaux’s 1922 silent film The Dungeon is lost. • Director Jay Marchant’s 1925 silent film The Fighting Ranger is lost. • Archives such as the Pacific Film Archive in Berkeley, California, help preserve some of the remaining films from the 1920s.","q":"Which choice most effectively uses information from the given sentences to explain the relationship between ITUC-Africa and the BFTU?","o":{"A":"ITUC-Africa is a regional union federation.","B":"The BFTU is one of the national union federations represented by ITUC-Africa.","C":"National union federations, such as the BFTU, work to improve conditions for workers in their member nations.","D":"The BFTU is a national union federation."},"a":"B"},{"s":"Rhetorical Synthesis","n":18,"p":"While researching a topic, a student has taken the following notes: • Antonio Stradivari (1644-1737) made about 1,000 violins in his lifetime. • Musicians prize his Stradivarius violins for their famed sound quality. • Many of the 500 or so that exist today are named for a previous owner. • The Leonora Jackson Stradivarius is named for Leonora Jackson, an American violinist.","q":"Which choice most effectively uses information from the given sentences to emphasize a similarity between the two movies?","o":{"A":"The Dungeon (1922) was directed by Oscar Micheaux, and The Fighting Ranger (1925) was made by Jay Marchant.","B":"Archives such as the Pacific Film Archive in Berkeley, California, play an integral part in preserving some of the surviving silent films from the 1920s.","C":"Jay Marchant’s film The Fighting Ranger is now considered lost, meaning no copies are known to exist.","D":"The Dungeon (1922) and The Fighting Ranger (1925) would be valuable historical documents of the era, but sadly both silent films are lost."},"a":"D"},{"s":"Rhetorical Synthesis","n":19,"p":"While researching a topic, a student has taken the following notes: • Gianpaolo Bellini is an Italian particle physicist. • Particle physicists study subatomic particles. • Neutrinos are some of the least understood subatomic particles. • Neutrinos were first discovered in the mid- twentieth century. • Bellini is known for his research on solar and geoneutrinos.","q":"Which choice most effectively uses information from the given sentences to emphasize why Stradivarius violins are prized by musicians?","o":{"A":"Many Stradivarius violins, like the Leonora Jackson, get their name from a former owner.","B":"Among musicians, violins made by Antonio Stradivari are renowned for their sound quality.","C":"Antonio Stradivari, a famous violin maker, lived from year to 1737.","D":"Leonora Jackson was an American violinist who once owned a Stradivarius violin."},"a":"B"},{"s":"Rhetorical Synthesis","n":20,"p":"While researching a topic, a student has taken the following notes: • Hina Hanta is an online archive curated by the Choctaw Nation of Oklahoma. • It features images of cultural artifacts relevant to the history of the Choctaw people. • It features a spoon (ivpish ishtimpa in Choctaw) made of buffalo horn. • The spoon was made in 1800. • Hina Hanta features a purse (shukcha in Choctaw) made of beaded leather. • The purse was made in 1949.","q":"Which choice most effectively uses information from the given sentences to specify Bellini’s role in neutrino research?","o":{"A":"Particle physicist Gianpaolo Bellini has worked to advance the scientific understanding of neutrinos through his research on solar and geoneutrinos.","B":"Neutrinos are a type of subatomic particle that particle physicists are still trying to understand.","C":"First discovered in the mid-twentieth century, neutrinos are a type of subatomic particle.","D":"Gianpaolo Bellini is recognized for his particle physics research."},"a":"A"},{"s":"Rhetorical Synthesis","n":21,"p":"While researching a topic, a student has taken the following notes: • At London and New York Fashion Weeks, fashion designers debut new clothing collections. • Color consultants create trend reports on the popular colors at a given Fashion Week. • A report on 2018 London Fashion Week noted the popularity of an imaginative purple shade that was cool in tone and bright in intensity. • A report on 2019 New York Fashion Week noted the popularity of a deep red shade that was warm in tone and rich in intensity.","q":"The student wants to emphasize a similarity between the two artifacts. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The buffalo horn spoon (ivpish ishtimpa in Choctaw) is featured in the Hina Hanta archive.","B":"Featured in the Hina Hanta archive, the buffalo horn spoon and the beaded leather purse are both cultural artifacts relevant to the history of the Choctaw people.","C":"Not all artifacts in the Hina Hanta archive are from the 1800s; indeed, the beaded leather purse is from 1949.","D":"There are more recent artifacts in the Hina Hanta archive than the buffalo horn spoon from 1800."},"a":"B"},{"s":"Rhetorical Synthesis","n":22,"p":"While researching a topic, a student has taken the following notes: • Generally, an object will heat up when twisted. • The twisting of an object is known as torsion. • A 2019 study led by researchers Zunfeng Liu and Ray Baughman tested the torsional heating of various fibers. • When ethylene propylene diene monomer (EPDM) rubber fiber was twisted, its average surface temperature increased by 12°C. • When four-ply nickel-titanium (NiTi) wire was twisted, its average surface temperature increased by 30.4°C.","q":"Which choice most effectively uses information from the given sentences to explain the role of color consultants at Fashion Week?","o":{"A":"A shade of imaginative purple was an on-trend addition to one color consultant’s report on London Fashion Week.","B":"A color consultant report on New York Fashion Week highlighted the popularity of a deep red shade.","C":"At Fashion Weeks in 2018 and 2019, shades favored by designers included an imaginative purple and a deep red.","D":"Each Fashion Week, color consultants compile reports on the shades that have proved popular with fashion designers."},"a":"D"},{"s":"Rhetorical Synthesis","n":23,"p":"While researching a topic, a student has taken the following notes: • A currency is a money system. • In 1999, Luxembourg adopted the euro as its official currency. • Most other countries in Europe have adopted the euro. • In 1991, Peru adopted the sol as its official currency. • Peru is the only country to have adopted the sol.","q":"Which choice most effectively uses information from the given sentences to explain the concept of torsional heating?","o":{"A":"An object’s average surface temperature will generally change due to torsion.","B":"Torsional heating is the process by which an object increases in temperature when it is twisted.","C":"Researchers determined that when both fibers were twisted, the surface temperature of four-ply NiTi wire increased more than that of EPDM rubber.","D":"In 2019, researchers studied the effect of torsional heating on various fibers, like EPDM rubber and four-ply NiTi wire."},"a":"B"},{"s":"Rhetorical Synthesis","n":24,"p":"While researching a topic, a student has taken the following notes: • Yellowstone is a national park in the northwest United States. • In 1995, gray wolves were reintroduced into the park. • Since then, the number of gray wolves in the park has stabilized at roughly 100. • This number is believed to be the park’s carrying capacity. • Carrying capacity describes the maximum number of a species that a specific environment’s resources can sustain over time.","q":"The student wants to emphasize the difference between the euro and the sol. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Like most countries in Europe, Luxembourg has adopted the euro as its official currency.","B":"Luxembourg and Peru do not share an official currency.","C":"A currency is a money system, like the euro in Luxembourg and the sol in Peru.","D":"The euro has been adopted by most European countries, whereas the sol has only been adopted by Peru."},"a":"D"},{"s":"Rhetorical Synthesis","n":25,"p":"In a 2002 study, Delach and Kimmerer tested the effect of plant litter on seedling emergence in a grassland setting: • Plant litter includes dead leaves and other plant material. • The test site was a flooded grassland in the United States. • It was in a temperate midlatitude climate. • The researchers found that in these environmental conditions, the presence of plant litter had a negative effect on seedling emergence.","q":"The student wants to specify the number of gray wolves in Yellowstone. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Gray wolves were reintroduced into Yellowstone, a national park in the northwest United States, in 1995.","B":"As of 1995, there were gray wolves living in Yellowstone, a national park in the northwest United States.","C":"The carrying capacity of an environment, such as Yellowstone, describes the maximum number of species that the environment can sustain over time.","D":"Yellowstone is a national park that has roughly 100 gray wolves living in it"},"a":"D"},{"s":"Rhetorical Synthesis","n":26,"p":"While researching a topic, a student has taken the following notes: • The Haystack Mountain School of Crafts (1961) is a building complex designed by American architect Edward Larrabee Barnes. • It is located in Deer Isle, Maine. • It features a cluster of cedar-shingled buildings. • It is considered an impressive example of critical regionalist architecture.","q":"Which choice most effectively uses information from the given sentences to specify the characteristics of the test site?","o":{"A":"The test was conducted in the United States, in a flooded grassland with a temperate midlatitude climate.","B":"A study on the effects of plant litter on seedling emergence was conducted by Delach and Kimmerer in 2002.","C":"In a study, Delach and Kimmerer found that the presence of plant litter had a negative effect on seedling emergence.","D":"The researchers studied seedlings’ ability to sprout above ground and begin photosynthesis, given the presence of plant litter and certain environmental conditions."},"a":"A"},{"s":"Rhetorical Synthesis","n":27,"p":"While researching a topic, a student has taken the following notes: • A supercontinent is a single landmass made up of most or all of Earth’s continents. • Over time, continents merge together to form supercontinents, which then break apart. • This process is believed to take hundreds of millions of years and is known as the supercontinent cycle. • Euramerica and Kenorland were supercontinents. • Euramerica formed about 300 million years ago. • Kenorland formed about 2.6 billion years ago.","q":"Which choice most effectively uses information from the given sentences to emphasize the location of the Haystack Mountain School of Crafts?","o":{"A":"Those wishing to see the Haystack Mountain School of Crafts in person will have to travel to Deer Isle, Maine.","B":"A stunning example of critical regionalist architecture, Edward Larrabee Barnes’s Haystack Mountain School of Crafts features a cluster of cedar-shingled buildings.","C":"The architect responsible for designing the Haystack Mountain School of Crafts in Deer Isle, Maine, was Edward Larrabee Barnes.","D":"Edward Larrabee Barnes is known for designing a building complex that features a cluster of cedar-shingled buildings."},"a":"A"},{"s":"Rhetorical Synthesis","n":28,"p":"While researching a topic, a student has taken the following notes: • Maya Lin is an American artist known for her memorials and large-scale installation artworks. • She became famous in 1982 when she completed the Vietnam Veterans Memorial, which consists of two 246-foot granite walls. • She completed Water Line in 2006. • It is an installation composed of aluminum tubing that fills an entire gallery room. • She completed Seven Earth Mountain in 2015. • It is an installation composed of soil that fills an entire gallery room.","q":"The student wants to specify when Euramerica formed. Which choice most effectively uses re
