noring. • ’Hu¯ lu¯’ is a Mandarin Chinese onomatopoeia that represents the sound of snoring.","q":"The student wants to indicate where the short story takes place. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"\"Raymond’s Run\" takes place in Harlem.","B":"\"Raymond’s Run\" was written by Toni Cade Bambara.","C":"\"Raymond’s Run\" was published in Gorilla My Love.","D":"\"Raymond’s Run\" is told from a first person perspective."},"a":"A"},{"s":"Rhetorical Synthesis","n":98,"p":"While researching a topic, a student has taken the following notes: • Jean-Michel Basquiat was an American artist who produced more than two thousand drawings and paintings. • His work Untitled (Two Heads on Gold) was completed in 1982 and sold at auction in 2003. • Untitled (Two Heads on Gold) is composed of acrylic and oil stick on canvas and measures 10,000 square inches in area. • His work Jazz was completed in 1986 and sold at auction in 2020. • Jazz is composed of acrylic, oil, graphite, crayon, and paper collage on wood and measures 1,807 square inches in area.","q":"The student wants to contrast two words that represent the same sound. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Though they both represent the sound of snoring, the onomatopoeias ’korrrr’ (Batak) and ’hu¯ lu¯’ (Mandarin Chinese) are written and pronounced very differently.","B":"Onomatopoeias, words that imitate the sounds they represent, are often written and pronounced very differently from language to language.","C":"The Batak word ’korrrr’ and the Mandarin Chinese word ’hu¯ lu¯’ are onomatopoeias that represent the sound of snoring.","D":"The Batak word ’korrrr,’ which represents the sound of snoring, is an onomatopoeia."},"a":"A"},{"s":"Rhetorical Synthesis","n":99,"p":"While researching a topic, a student has taken the following notes: • The Future of Nostalgia is a scholarly book by literary theorist Svetlana Boym. • The book provides a multifaceted exploration of the concept of nostalgia. • Chapter 9 describes nostalgia in the city of St. Petersburg in Russia. • Chapter 17 discusses various skeptics’ takes on the concept of nostalgia. • In chapter 17, Boym writes, \"The poetics of nostalgia combines estrangement and human solidarity, affect and reflection.\"","q":"Which choice most effectively uses information from the given sentences to emphasize how these two works are similar?","o":{"A":"Artist Jean-Michel Basquiat completed Untitled (Two Heads on Gold) in 1982, and Jazz followed in 1986.","B":"Between artist Jean-Michel Basquiat’s works Untitled (Two Heads on Gold) and Jazz, the former is the larger of the two.","C":"Composed by artist Jean-Michel Basquiat in 1982 and 1986, respectively, both Untitled (Two Heads on Gold) and Jazz use acrylic paint as a medium.","D":"Artist Jean-Michel Basquiat’s work Untitled (Two Heads on Gold) is composed of acrylic and oil stick, while Jazz is composed of acrylic, oil, graphite, crayon, and paper collage."},"a":"C"},{"s":"Rhetorical Synthesis","n":100,"p":"While researching a topic, a student has taken the following notes: • Atitalaquia is a municipality in the state of Hidalgo, Mexico. • Municipalities are governmental regions responsible for providing many public services to their residents. • One service they provide is street lighting. • Atitalaquia covers an area of roughly 63 km². • Hidalgo is divided into 84 municipalities.","q":"The student wants to provide a quotation from chapter 17. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"In a discussion of various skeptics’ takes on the concept of nostalgia, Svetlana Boym writes, \"The poetics of nostalgia combines estrangement and human solidarity, affect and reflection.\"","B":"Svetlana Boym’s The Future of Nostalgia provides a multifaceted exploration of nostalgia.","C":"Svetlana Boym describes nostalgia in the city of St. Petersburg in Russia in chapter 9 of her book.","D":"After describing nostalgia in the city of St. Petersburg in Russia, Svetlana Boym goes on to discuss various skeptics’ takes on the concept of nostalgia."},"a":"A"},{"s":"Rhetorical Synthesis","n":101,"p":"While researching a topic, a student has taken the following notes: • At London and New York Fashion Weeks, fashion designers debut new clothing collections. • Color consultants create trend reports on the popular colors at a given Fashion Week. • A report on 2018 London Fashion Week noted the popularity of a light green-yellow shade that was cool in tone and soft in intensity. • A report on 2019 New York Fashion Week noted the popularity of a deep brown shade that was warm in tone and rich in intensity.","q":"The student wants to emphasize the size of Atitalaquia. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Providing street lighting is just one example of the public services that municipalities provide.","B":"Atitalaquia is one of governmental regions, known as municipalities, across Hidalgo.","C":"Atitalaquia—a governmental region in the state of Hidalgo, Mexico—provides many public services to its residents.","D":"The municipality of Atitalaquia in Hidalgo, Mexico, covers an area of roughly 63 km²"},"a":"D"},{"s":"Rhetorical Synthesis","n":102,"p":"While researching a topic, a student has taken the following notes: • Chromosomes are cellular structures that contain genes. • Genes carry critical instructions for determining an organism’s physical traits. • Members of the same species typically have the same number of chromosomes. • The bat-eared fox (Otocyon megalotis) and the Bengal fox (Vulpes bengalensis) are species of foxes. • The bat-eared fox has seventy-two chromosomes. • The Bengal fox has sixty chromosomes.","q":"Which choice most effectively uses information from the given sentences to describe a color that was popular at 2019 New York Fashion Week?","o":{"A":"Shades of light green-yellow and deep brown have both been featured in Fashion Week reports prepared by color consultants.","B":"The shade favored by designers at New York Fashion Week was a departure from the cool, soft shade of light green-yellow that had proved popular at London Fashion Week.","C":"Each Fashion Week, color consultants compile reports on the colors that have been popular among designers.","D":"At New York Fashion Week, many designer collections featured a warm, rich shade of deep brown."},"a":"D"},{"s":"Rhetorical Synthesis","n":103,"p":"While researching a topic, a student has taken the following notes: • The Museu de les Ciències Príncipe Felipe is in Valencia, Spain. • It is home to a Foucault pendulum. • Vasile Alecsandri National College is in Galati, Romania. , • It is home to a Foucault pendulum. • A Foucault pendulum dangles from a fixed point that ensures the swing path of the pendulum doesn’t change. • To an observer, the swing path of a Foucault pendulum appears to change over time because Earth rotates beneath it.","q":"The student wants to specify how many chromosomes the bat-eared fox has. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The bat-eared fox (Otocyon megalotis) and the Bengal fox (Vulpes bengalensis) both have chromosomes, but the bat-eared fox has more than the Bengal fox does.","B":"The Bengal fox, a species of fox, has sixty structures called chromosomes.","C":"The bat-eared fox’s chromosomes contain genes, which are critical to determining an organism’s physical traits.","D":"The bat-eared fox (Otocyon megalotis) has seventy-two chromosomes."},"a":"D"},{"s":"Rhetorical Synthesis","n":104,"p":"While researching a topic, a student has taken the following notes: • Soo-Bong Kim is a South Korean particle physicist. • Particle physicists study subatomic particles. • Neutrinos are some of the least understood subatomic particles. • Kim is known for his research on neutrino oscillations.","q":"The student wants to emphasize a similarity between the two locations. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Because Earth rotates beneath it, the swing path of the Foucault pendulum at the Museu de les Ciències Príncipe Felipe appears to change over time.","B":"The Museu de les Ciències Príncipe Felipe, which is home to a Foucault pendulum, is in Spain, not Romania.","C":"The Museu de les Ciències Príncipe Felipe in Valencia, Spain, and Vasile Alecsandri National College in Galati, Romania, both , house Foucault pendulums.","D":"One Foucault pendulum is in Spain, and the other is in Romania."},"a":"C"},{"s":"Rhetorical Synthesis","n":105,"p":"While researching a topic, a student has taken the following notes: • Minor planets are astronomical objects that orbit the Sun but are neither planets nor comets. • Astronomer Jane Luu has discovered many minor planets in her career. • Alongside colleague David C. Jewitt, she discovered the minor planet (15836) 1995 DA2 on February 24, 1995. • Alongside colleagues David C. Jewitt, Chadwick Trujillo, and K. Berney, she discovered the minor planet (24952) 1997 QH4 on August 28, 1997.","q":"Which choice most effectively uses information from the given sentences to specify what type of neutrino research Kim is known for?","o":{"A":"Neutrinos are a type of subatomic particle that particle physicists are still trying to understand.","B":"Soo-Bong Kim, whose research involves particle physics, is from South Korea.","C":"In the ongoing pursuit to better understand these subatomic particles, particle physicist Soo-Bong Kim is known for his research on neutrino oscillations.","D":"One scientist who has worked to advance our understanding of neutrinos is the South Korean particle physicist Soo-Bong Kim."},"a":"C"},{"s":"Rhetorical Synthesis","n":106,"p":"While researching a topic, a student has taken the following notes: • Vexillology is the study of flags. • The flags of many countries include symbols like animals, plants, or landforms. • These symbols often represent an aspect of the region’s history, culture, or landscape. • The flag of San Marino includes a laurel branch. • The flag of Croatia includes leopards.","q":"Which choice most effectively uses information from the given sentences to emphasize the discovery of (15836) 1995 DA2 to an audience already familiar with Jane Luu?","o":{"A":"First there was the discovery of (15836) DA2 on February 24, 1995, and then on August 28, 1997, Jane Luu discovered yet another minor planet with the help of her colleagues David C. Jewitt, Chadwick Trujillo, and K. Berney.","B":"Astronomer Jane Luu helped discover not only the minor planet (15836) DA2 on February 24, 1995, but also (24952) QH4 on August 28, 1997.","C":"Jane Luu is an astronomer famous for her discovery of many minor planets in our solar system, including (15836) DA2.","D":"On February 24, 1995, Jane Luu and her colleague David C. Jewitt made the exciting discovery of the minor planet (15836) DA2."},"a":"D"},{"s":"Rhetorical Synthesis","n":107,"p":"While researching a topic, a student has taken the following notes: • There are more than 500 National Wildlife Refuges (NWRs) across the United States. • The Mason Neck NWR is a 2,276-acre area in Virginia, on the Atlantic coast. • It was established to protect the endangered bald eagle. • The Nestucca Bay NWR is a 457-acre area in Oregon, on the Pacific coast. • It was established to protect the endangered Aleutian Canada goose.","q":"Which choice most effectively uses information from the given sentences to make and support a generalization about symbols on flags?","o":{"A":"The flags of some countries include symbols of plants; San Marino’s, for example, includes a laurel branch.","B":"San Marino’s flag includes a laurel branch, a symbol that is important to that country’s national identity.","C":"Vexillology is the study of flags; accordingly, vexillologists are interested in flags from around the world.","D":"Many countries feature symbols on their flags, and the study of these designs is known as vexillology."},"a":"A"},{"s":"Rhetorical Synthesis","n":108,"p":"While researching a topic, a student has taken the following notes: • Tlaxcoapan is a municipality in the state of Hidalgo, Mexico. • Municipalities are governmental regions responsible for providing many public services to their residents. • One service they provide is street lighting. • Tlaxcoapan covers an area of roughly 42 km². • Hidalgo is divided into 84 municipalities.","q":"The student wants to provide an overview of the NWR program. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Both the Mason Neck NWR and the Nestucca Bay NWR were established to protect endangered species.","B":"Oregon’s Nestucca Bay NWR was established to protect the endangered Aleutian Canada goose.","C":"One of more than 500 NWRs in the US, the Mason Neck NWR encompasses 2,276 acres in Virginia.","D":"The US’s more than 500 NWRs protect endangered species from coast to coast."},"a":"D"},{"s":"Rhetorical Synthesis","n":109,"p":"While researching a topic, a student has taken the following notes: • Fafnir is the nickname of a dinosaur fossil specimen from the Late Cretaceous period. • The Late Cretaceous period ended more than 65 million years ago. • Fafnir is a member of the genus Triceratops. • Fafnir is on display at the Science Museum of Minnesota. • The Science Museum of Minnesota is in Saint Paul, Minnesota.","q":"The student wants to emphasize the size of Tlaxcoapan. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Providing street lighting is just one example of the public services that municipalities provide.","B":"The municipality of Tlaxcoapan in Hidalgo, Mexico, covers an area of roughly 42 km².","C":"Tlaxcoapan is one of governmental regions, known as municipalities, across Hidalgo.","D":"Tlaxcoapan—a governmental region in the state of Hidalgo, Mexico—provides many public services to its residents."},"a":"B"},{"s":"Rhetorical Synthesis","n":110,"p":"While researching a topic, a student has taken the following notes: • Thomas Edison is regarded as one of the most important inventors in US history. • Having received little formal schooling, Edison relied on specialist employees at his various laboratories and offices to complete the technical work for many of his inventions. • Reginald Fessenden was an electronic communications specialist who worked at the Edison Machine Works manufacturing company. • He is best known for pioneering radio technology that led to the first transmission of speech by radio. • Frank J. Sprague was a naval office","q":"The student wants to specify Fafnir’s location. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Saint Paul, Minnesota, is home to the Science Museum of Minnesota, which displays a dinosaur fossil specimen from the Late Cretaceous period.","B":"Fafnir is the nickname of a dinosaur fossil specimen belonging to the genus Triceratops.","C":"Fafnir is on display at the Science Museum of Minnesota in Saint Paul, Minnesota.","D":"Fafnir lived in the Late Cretaceous period, which ended more than million years ago."},"a":"C"},{"s":"Rhetorical Synthesis","n":111,"p":"While researching a topic, a student has taken the following notes: • Jean-Michel Basquiat was an American artist who produced more than two thousand drawings and paintings. • His work Mater was completed in 1982 and sold at auction in 2017. • Mater is composed of acrylic and oil stick on canvas and measures 6,048 square inches in area. • His work Flash in Naples was completed in 1983 and sold at auction in 2009. • Flash in Naples is composed of acrylic, oil stick, and oil on canvas and measures 3,992 square inches in area.","q":"Which choice most effectively uses information from the given sentences to introduce Reginald Fessenden and what he is known for?","o":{"A":"Reginald Fessenden, an electronic communications specialist, worked at the Edison Machine Works manufacturing company.","B":"Reginald Fessenden, an electronic communications specialist and former employee of Thomas Edison, is known for pioneering radio technology that led to the first transmission of speech by radio.","C":"Having received little formal education, Thomas Edison depended on specialized employees, including Reginald Fessenden and Frank J. Sprague, for many of his inventions.","D":"Thomas Edison’s historic success would not have been possible without naval officer Frank J. Sprague, who is known for being the father of electric traction."},"a":"B"},{"s":"Rhetorical Synthesis","n":112,"p":"While researching a topic, a student has taken the following notes: • The Paralympic Games are a series of international sporting events involving athletes with an impairment. • Swimming has been an event at the Paralympics since 1960. • Mike Kenny competed as a Paralympic swimmer from 1976 to 1988. • He won eighteen medals. • Of these, sixteen were gold medals, which indicate a first-place finish.","q":"Which choice most effectively uses information from the given sentences to emphasize how the two works are similar?","o":{"A":"Between artist Jean-Michel Basquiat’s works Mater and Flash in Naples, the former is the larger of the two.","B":"Composed by artist Jean-Michel Basquiat in and 1983, respectively, both Mater and Flash in Naples use acrylic paint as a medium.","C":"Artist Jean-Michel Basquiat completed Mater in 1982, and Flash in Naples followed in 1983.","D":"Artist Jean-Michel Basquiat’s work Mater is composed of acrylic and oil stick, while Flash in Naples is composed of acrylic, oil stick, and oil."},"a":"B"},{"s":"Rhetorical Synthesis","n":113,"p":"While researching a topic, a student has taken the following notes: • Sandvikens Gymnasieskola is in Sandviken, Sweden. • It is home to a Foucault pendulum. • The University of Oradea is in Oradea, Romania. • It is home to a Foucault pendulum. • A Foucault pendulum dangles from a fixed point that ensures the swing path of the pendulum doesn’t change. • To an observer, the swing path of a Foucault pendulum appears to change over time because Earth rotates beneath it.","q":"Which choice most effectively uses information from the given sentences to emphasize the number of medals won by Kenny?","o":{"A":"An accomplished Paralympian with multiple gold medal wins, Mike Kenny competed as a swimmer from to 1988.","B":"During his career as a Paralympic swimmer, Mike Kenny earned a total of eighteen medals, sixteen of which were gold.","C":"Swimming, a sport in which Mike Kenny took home sixteen gold medals, has been an event at the Paralympic Games since 1960.","D":"Mike Kenny competed at the Paralympic Games, a series of international sporting events."},"a":"B"},{"s":"Rhetorical Synthesis","n":114,"p":"While researching a topic, a student has taken the following notes: • The Clovis First hypothesis proposes that ancient humans known as Clovis were the first to populate North America. • The Clovis arrived around 13,000 years ago. • Stone tools found at the Saltville site in Virginia date to approximately 16,000 years ago. • These items support the idea that humans were present in North America before the Clovis population arrived. • More than a dozen North American sites containing pre-Clovis items have been identified.","q":"The student wants to emphasize a similarity between the two locations. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Sandvikens Gymnasieskola in Sandviken, Sweden, and the University of Oradea in Oradea, Romania, both house Foucault pendulums.","B":"Sandvikens Gymnasieskola, which is home to a Foucault pendulum, is in Sweden, not Romania.","C":"One Foucault pendulum is in Sweden, and the other is in Romania.","D":"Because Earth rotates beneath it, the swing path of the Foucault pendulum at Sandvikens Gymnasieskola appears to change over time."},"a":"A"},{"s":"Rhetorical Synthesis","n":115,"p":"While researching a topic, a student has taken the following notes: • Louis Ballard was a classical composer and citizen of the Quapaw Tribe. • His compositions synthesize Western classical music with elements of various Native musical traditions. • Ballard’s classical piece Kachina Dances features traditional Hopi songs. • Ballard’s classical piece Fantasy Aborigine No. 3 incorporates a Tewa seashell rattle, a traditional Native instrument.","q":"The student wants to explain the implications of the discovery at the Saltville site. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"It is the contention of the Clovis First hypothesis that the Clovis, an ancient human population, were the first to inhabit North America, arriving around 13 years ago.","B":"Located in Virginia, Saltville is one of more than a dozen North American sites where pre-Clovis items have been discovered.","C":"The approximately 16,000-year-old stone tools found at Saltville, a site in Virginia, should not be overlooked: they have important implications for the Clovis First hypothesis.","D":"Contrary to the Clovis First hypothesis, the approximately 16,000-year-old stone tools found at Saltville suggest that humans were in North America before the Clovis arrived."},"a":"D"},{"s":"Rhetorical Synthesis","n":116,"p":"While researching a topic, a student has taken the following notes: • Chromosomes are cellular structures that contain genes. • Genes carry critical instructions for determining an organism’s physical traits. • Members of the same species typically have the same number of chromosomes. • The American paddlefish (Polyodon spathula) and the crucian carp (Carassius carassius) are species of fish. • The American paddlefish has 120 chromosomes. • The crucian carp has one hundred chromosomes.","q":"The student wants to emphasize a difference between the two compositions. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Kachina Dances and Fantasy Aborigine No.3 are two compositions written by Ballard, a classical music composer.","B":"In his two compositions Kachina Dances and Fantasy Aborigine No. 3, Ballard blends elements of various Native musical traditions, such as Indigenous songs or instruments, with Western classical music.","C":"Ballard has different approaches to blending Western classical music with elements of various Native musical traditions, such as using Indigenous songs and instruments in his compositions.","D":"While both compositions integrate various Native musical traditions, Kachina Dances does so by featuring traditional Hopi songs and Fantasy Aborigine No.3 does so by incorporating a Tewa seashell rattle."},"a":"D"},{"s":"Rhetorical Synthesis","n":117,"p":"While researching a topic, a student has taken the following notes: • A river’s stream length is the length of a line that follows along the river path. • A river’s valley length is the length of a straight line drawn from the beginning of the river to the end. • The river’s curviness, or sinuosity, is the ratio of the river’s stream length to its valley length. • Low-sinuosity rivers have a stream length 1–1.5 times longer than their valley length, and high-sinuosity rivers have a stream length 1.5 or more times longer than their valley length. • The Embarras River in Canada has high sinuosit","q":"The student wants to specify how many chromosomes the American paddlefish has. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The American paddlefish’s chromosomes contain genes, which are critical to determining an organism’s physical traits.","B":"The American paddlefish (Polyodon spathula) and the crucian carp (Carassius carassius) both have chromosomes, but the American paddlefish has more than the crucian carp does.","C":"The American paddlefish (Polyodon spathula) has 120 chromosomes.","D":"The crucian carp, a species of fish, has one hundred structures called chromosomes."},"a":"C"},{"s":"Rhetorical Synthesis","n":118,"p":"While researching a topic, a student has taken the following notes: • Happiness Is Expensive is a 2012 sculpture by American artist Alejandro Díaz. • It consists of a white neon sign that spells out the title phrase. • Harvest Moon is a 2013 sculpture by British/Pakistani artist Shezad Dawood. • It consists of a yellow neon sign that forms an abstract moon shape. • Neon signs became popular with advertisers in the 1920s and began to decline in popularity in the 1960s. • Neon signs became popular with artists in the 1960s and continue to be popular today.","q":"The student wants to compare the curviness of the two rivers. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The high-sinuosity Luni River in India is curvier than the low-sinuosity Embarras River in Canada.","B":"The Embarras River’s ratio of stream length to valley length, also known as sinuosity, is greater than that of the Luni River.","C":"In both the Embarras and the Luni rivers, curviness is determined by comparing stream length to valley length.","D":"By comparing the stream lengths of the Embarras and Luni rivers to their valley lengths, one can calculate their curviness, or sinuosity."},"a":"B"},{"s":"Rhetorical Synthesis","n":119,"p":"While researching a topic, a student has taken the following notes: • Francis Halzen is a Belgian particle physicist. • Particle physicists study subatomic particles. • Neutrinos are some of the least understood subatomic particles. • Neutrinos were first discovered in the mid-twentieth century. • Halzen is known for his discovery of high-energy astrophysical neutrinos.","q":"The student wants to emphasize a difference between the two sculptures. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"While the sculptures share a common material, one spells out a phrase while the other is decidedly more abstract.","B":"American artist Alejandro Díaz’s and British/Pakistani artist Shezad Dawood’s sculptures have employed neon signs in different ways, demonstrating the versatility of the popular material.","C":"Díaz’s sculpture was made in 2012 and Dawood’s in 2013, both well after the advertising heyday of neon signs had passed.","D":"Molded into an evocative phrase in Happiness Is Expensive (2012), an abstract form in Harvest Moon (2013), and an advertising tool in decades past, neon lighting has a number of different applications."},"a":"A"},{"s":"Rhetorical Synthesis","n":120,"p":"While researching a topic, a student has taken the following notes: • In a 2010 study, researchers Katrin Heer, Larissa Albrecht, and Elisabeth K.V. Kalko wanted to explore the effects of ingestion by bats on the germination of Ficus obtusifolia seeds in Panama. • The team of researchers tested 120 Ficus obtusifolia seeds that had been ingested by Jamaican fruit bats. • Of these, 111 seeds (93%) germinated. • As a control, K. Heer et al. tested 120 Ficus obtusifolia seeds that had not been ingested by Jamaican fruit bats. • Of these, 116 seeds (97%) germinated.","q":"The student wants to provide an example of a particle physicist whose research focuses on neutrinos. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The research done on high-energy astrophysical neutrinos exemplifies the work particle physicists do to advance our understanding of subatomic particles.","B":"By studying high-energy astrophysical neutrinos—to name just one example—particle physicists can learn more about neutrinos.","C":"Particle physicist Francis Halzen is known for his discovery of high-energy astrophysical neutrinos.","D":"Neutrinos are a type of subatomic particle that particle physicists are still trying to understand."},"a":"C"},{"s":"Rhetorical Synthesis","n":121,"p":"While researching a topic, a student has taken the following notes: • Oak Tree House is an Ancestral Puebloan dwelling site located in southwestern Colorado. • It was built under a rock overhang and inhabited from approximately 1180–1210 CE. • The overhanging rock ledges offered protection from heavy rain and snow. • Yucca House is an Ancestral Puebloan dwelling site located in southwestern Colorado. • It was built on relatively flat terrain and inhabited from approximately 1080–1275 CE. • This level surface allowed for the construction of large terraced buildings.","q":"The student wants to describe the study’s research methodology. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"In the study, a lower percentage of Ficus obtusifolia seeds ingested by bats germinated than those that had not been ingested by bats.","B":"The team of researchers tested the germination of Ficus obtusifolia seeds that had been ingested by Jamaican fruit bats and Ficus obtusifolia seeds that had not been ingested.","C":"K. Heer et al. wanted to explore the effects of Jamaican fruit bats’ ingestion on Ficus obtusifolia seed germination.","D":"Research by K.Heer et al. revealed that 111-that is, 93%-of the Ficus Polita seeds that has been ingested by bats germinated."},"a":"B"},{"s":"Rhetorical Synthesis","n":122,"p":"While researching a topic, a student has taken the following notes: • Ixmiquilpan is a municipality in the state of Hidalgo, Mexico. • Municipalities are governmental regions responsible for providing many public services to their residents. • One service they provide is water treatment. • Ixmiquilpan’s population was 98,654 in 2020. • Hidalgo is divided into 84 municipalities.","q":"The student wants to explain an advantage of the Oak Tree House dwelling site. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The location of Oak Tree House, an Ancestral Puebloan dwelling site in southwestern Colorado, provided an advantage to its inhabitants.","B":"Located in southwestern Colorado, Oak Tree House is an Ancestral Puebloan dwelling site that was inhabited from approximately 1180–1210CE.","C":"The relatively flat terrain on which Oak Tree House was built allowed for the construction of large terraced buildings.","D":"Since it was built under a rock overhang, Oak Tree House was naturally protected from heavy rain and snow."},"a":"D"},{"s":"Rhetorical Synthesis","n":123,"p":"While researching a topic, a student has taken the following notes: • A supercontinent is a single landmass made up of most or all of Earth’s continents. • Over time, continents merge together to form supercontinents, which then break apart. • This process is believed to take hundreds of millions of years and is known as the supercontinent cycle. • Ur and Columbia were supercontinents. • Ur formed about 3.1 billion years ago. • Columbia formed about 1.8 billion years ago.","q":"The student wants to provide an example of a public service that Ixmiquilpan is responsible for. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Ixmiquilpan is one of municipalities in Hidalgo providing public services to their communities.","B":"Ixmiquilpan—a governmental region in the state of Hidalgo, Mexico—provides public services to its residents.","C":"As a municipality, Ixmiquilpan is responsible for providing water treatment to its residents.","D":"In 2020, the municipality of Ixmiquilpan had a population of 98,654."},"a":"C"},{"s":"Rhetorical Synthesis","n":124,"p":"While researching a topic, a student has taken the following notes: • Generally, an object will heat up when twisted. • The twisting of an object is known as torsion. • A 2019 study led by Zunfeng Liu and Ray Baughman tested the torsional heating of various fibers. • When a 0.7-millimeter-thick sample of single-ply nickel-titanium (NiTi) wire was twisted, its average surface temperature increased by 21.3°C. • When a 2.2-millimeter-thick sample of natural rubber fiber was twisted, its average surface temperature increased by 15.3°C.","q":"The student wants to specify when Ur formed. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Ur was a supercontinent, a single landmass made up of most or all of Earth’s continents.","B":"The supercontinent Ur formed about 3.1 billion years ago.","C":"Long ago, the Earth was home to supercontinents like Ur and Columbia.","D":"Over hundreds of millions of years, the supercontinent cycle results in supercontinents forming and breaking apart."},"a":"B"},{"s":"Rhetorical Synthesis","n":125,"p":"While researching a topic, a student has taken the following notes: • Grimanesa Amoros is a Peruvian American artist well known for her LED light sculptures. • Her sculpture Uros House is made of smooth multicolored LED domes. • It occupies 250 cubic feet of space. • Her sculpture Golden Waters is made of entangled blue and white LED tubes. • It occupies 118,080 cubic feet of space.","q":"The student wants to contrast the two samples. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The natural rubber sample used in the study was thicker than the single-ply NiTi wire sample.","B":"When the fibers were twisted as part of the study, the surface temperature of both samples increased.","C":"Twisting an object will generally cause its temperature to increase, a process known as torsional heating.","D":"In 2019, researchers studied the effect of torsional heating on various fibers, including samples of natural rubber and single-ply NiTi wire."},"a":"A"},{"s":"Rhetorical Synthesis","n":126,"p":"While researching a topic, a student has taken the following notes: • Element abundance is a relative measure of the occurrence of a chemical element in a given environment. • An element’s relative abundance can be expressed as a mass fraction, mole fraction, or volume fraction. • Mass fraction is the ratio of an element’s mass to the combined mass of all elements in a given environment. • The mass fraction of calcium (Ca) is 17,100 parts per million (ppm), or 1.71%, on Earth. • The mass fraction of potassium (K) is 160 ppm, or 0.016%, on Earth.","q":"The student wants to emphasize a similarity between Uros House and Golden Waters. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Uros House is an LED light sculpture made by Grimanesa Amoros, as is Golden Waters.","B":"The smooth LED domes of Grimanesa Amoros’s Uros House stand in contrast to the tangled LED tubes of Golden Waters.","C":"Grimanesa Amoros is the artist behind Uros House—a sculpture made of smooth multicolored LED domes.","D":"At 118,cubic feet in size, Grimanesa Amoros’s Golden Waters cuts a larger figure than the 250-cubic-foot Uros House."},"a":"A"},{"s":"Rhetorical Synthesis","n":127,"p":"While researching a topic, a student has taken the following notes: • A supercontinent is a single landmass made up of most or all of Earth’s continents. • Over time, continents merge together to form supercontinents, which then break apart. • This process is believed to take hundreds of millions of years and is known as the supercontinent cycle. • Ur was a supercontinent that formed about 3.1 billion years ago. • Euramerica was a supercontinent that formed about 300 million years ago.","q":"The student wants to specify an element’s relative abundance on Earth. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Mass fraction, mole fraction, and volume fraction can all be used to express an element’s relative abundance in a given environment.","B":"Expressed as a mass fraction, the relative abundance of potassium on Earth is ppm, or 0.016%.","C":"The relative abundance of the element potassium on Earth can be expressed in three different ways.","D":"On Earth, the mass fraction of potassium is greater than that of calcium."},"a":"B"},{"s":"Rhetorical Synthesis","n":128,"p":"While researching a topic, a student has taken the following notes: • Lighthouses send out crucial light signals to help ships and other watercraft navigate at night. • Before automation, lighthouses were run by lighthouse keepers. • Elizabeth Lusby was the lighthouse keeper at Turkey Point Light in Maryland. • She held this position from 1844 to 1862. • Thelma Austin was the lighthouse keeper at Point Fermin Light in California. • She held this position from 1925 to 1941.","q":"The student wants to emphasize a difference between the two supercontinents. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Euramerica formed about million years ago, but Ur formed much earlier—about 3.1 billion years ago.","B":"Forming and breaking apart over hundreds of millions of years, supercontinents are made up of most or all of Earth’s continents.","C":"Ur and Euramerica were both supercontinents, single landmasses made up of most or all of Earth’s continents.","D":"Ur formed about 3.1 billion years ago but eventually broke apart."},"a":"A"},{"s":"Rhetorical Synthesis","n":129,"p":"While researching a topic, a student has taken the following notes: • Most of the plant and bird species in Oahu, Hawaii, are non-native. • In a 2019 study, researchers wanted to know what role non-native birds play in dispersing plant seeds in Oahu. • Researchers catalogued plant seeds found in fecal samples from non-native birds. • Touchardia latifolia, a flowering shrub, was one of fifteen native species catalogued. • Hedychium gardnerianum, an herbaceous vine, was one of twenty-nine non-native species catalogued. • Researchers concluded that non-native birds play a vital role in dispersing","q":"The student wants to emphasize a difference between the two lighthouse keepers. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Elizabeth Lusby and Thelma Austin both played crucial roles in ensuring safe navigation for watercraft in past centuries.","B":"As the lighthouse keeper at Point Fermin Light, Thelma Austin helped watercraft navigate at night.","C":"Elizabeth Lusby worked as a lighthouse keeper in an earlier century than did Thelma Austin.","D":"From to 1862, the nighttime waters of Maryland were made more navigable thanks to Elizabeth Lusby."},"a":"C"},{"s":"Rhetorical Synthesis","n":130,"p":"While researching a topic, a student has taken the following notes: • The Simon Kenton Trail is a rail trail. • It is located in Ohio. • The Papermill Trail is a rail trail. • It is located in Maine. • Rail trails are former railroad corridors that have been converted into public paths.","q":"The student wants to contrast the two plants. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"In Oahu, Hawaii, seeds from Touchardia latifolia and Hedychium gardnerianum plants were found in the fecal samples of non-native birds.","B":"The plants Touchardia latifolia and Hedychium gardnerianum can be found in Oahu, Hawaii.","C":"Touchardia latifolia, a species of shrub, is native to Oahu, Hawaii, but Hedychium gardnerianum, a species of vine, is not.","D":"Most plant species found in Oahu, Hawaii, like Hedychium gardnerianum, are non-native."},"a":"C"},{"s":"Rhetorical Synthesis","n":131,"p":"While researching a topic, a student has taken the following notes: • The Wairakei geothermal power plant in New Zealand uses a flash steam system to generate electricity. • Flash steam technology requires geothermal reservoir temperatures above 180°C. • The use of flash steam systems worldwide is limited because many geothermal reservoirs aren’t hot enough. • The Traunreut geothermal power plant in Germany uses a binary cycle system. • Binary cycle technology can generate energy from lower-temperature (less than 180°C) geothermal reservoirs. • Binary cycle systems involve higher maintenance c","q":"The student wants to emphasize a similarity between the Simon Kenton Trail and the Papermill Trail. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"A public path created from a former railroad corridor can be found in Maine.","B":"Both the Simon Kenton Trail and the Papermill Trail are rail trails.","C":"The Simon Kenton Trail is in Ohio, whereas the Papermill Trail is in Maine.","D":"A former railroad corridor, the Simon Kenton Trail is located in Ohio."},"a":"B"},{"s":"Rhetorical Synthesis","n":132,"p":"While researching a topic, a student has taken the following notes: • A sailing trip that goes in a complete circle around the world is called a circumnavigation. • Most circumnavigations include stops on land. • Anne Liardet is a French sailor. • Liardet sailed the boat Roxy on a nonstop, 119-day circumnavigation. • Asia Pajkowska is a Polish sailor. • Pajkowska sailed the boat FanFan on a nonstop, 216-day circumnavigation.","q":"The student wants to compare the disadvantages of the geothermal systems used at the Wairakei and Traunreut plants. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Unlike the Traunreut plant, the Wairakei plant uses a flash steam system, which requires a less common resource: geothermal reservoirs with temperatures above 180°C.","B":"Compared with the system used at the Wairakei plant, the system used at the Traunreut plant has a notable disadvantage: its cost.","C":"The system used at the Traunreut plant overcomes the temperature limitations of the Wairakei plant’s system but is more costly to maintain.","D":"The system at the Wairakei plant requires temperatures above 180°C, while the system at the Traunreut plant can operate at lower temperatures."},"a":"C"},{"s":"Rhetorical Synthesis","n":133,"p":"While researching a topic, a student has taken the following notes: • Hyde Park is a 1931 color linocut print by Canadian artist Sybil Andrews. • It depicts a tranquil, everyday scene (a spring day in a city park). • Amanzi Amthatha (\"The cold water takes him\") is a 2001 black-and-white linocut print by South African artist Nomathemba Tana. • It features a scene with an explicitly political point of view (a Xhosa warrior fighting British colonial rule). • Relief painting is a technique in which an image is carved onto a printing block, covered in ink or paint, and stamped onto paper. • Lino cu","q":"The student wants to make a generalization about circumnavigations. Which choice most effectively uses the relevant information from the notes to accomplish this goal?","o":{"A":"Pajkowska sailed FanFan around the world, while Liardet siled Roxy.","B":"Pajkowska and Liardet have both embarked on sailing journeys around the world, also called circumnavigations.","C":"Most circumnavigations include stops on land, but some circumnavigations are nonstop.","D":"A circumnavigation is defined as a sailing trip that goes in a complete circle around the world."},"a":"C"},{"s":"Rhetorical Synthesis","n":134,"p":"While researching a topic, a student has taken the following notes: • A copyright prevents a book’s contents from being reproduced (published) without permission from the copyright holder. • When a book’s copyright expires, the book enters the public domain and can be legally reproduced by anyone. • The Prophet is a collection of prose poems by Kahlil Gibran. • It entered the public domain in 2019. • The Professor’s House is a novel by Willa Cather. • It entered the public domain in 2021.","q":"The student wants to contrast the subject matter of the two prints. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The print by Tana is a black-and-white linocut; by contrast, Andrews’s is a relief print.","B":"Tana’s print expresses an explicitly political point of view, while Andrews’s depicts a tranquil, everyday scene.","C":"Andrews made Hyde Park in 1931, while Tana made Amanzi Amthatha (\"The cold water takes him\") later, in 2001.","D":"The scenes depicted in both works were first carved onto a printing block, then stamped onto paper; however, one work is a linocut, while the other is a relief print."},"a":"B"},{"s":"Rhetorical Synthesis","n":135,"p":"While researching a topic, a student has taken the following notes: • The A.M Turing Award is a prestigious award given by the Association for Computing Machinery (ACM). • The ACM gives the award for \"major contributions of lasting importance to computing\". • Shafi Goldwasser won the award in 2012 for transformative work that laid the foundations for digital cryptography.","q":"The student wants to emphasize a similarity between The Prophet and the Professor’s House. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The Prophet, a collection of prose poems by Kahlil Gibran, entered public domain in 2019, unlike Willa Cather’s novel The Professor’s House, which would do so later.","B":"The Prophet, a collection of prose poems by Kahlil Gibran, and The Professor’s House, a novel by Willa Cather, recently entered the public domain.","C":"The Prophet is a collection of prose poems, whereas The Professor’s House is a novel","D":"The year was 2021, and the copyright to Willa Cather’s The Professor’s House had finally expired."},"a":"B"},{"s":"Rhetorical Synthesis","n":136,"p":"While researching a topic, a student has taken the following notes: • The false killer whale is a mammal species. • It was believed to be extinct until a living false killer whale was identified in Denmark in 1861. • The Banggai crow is a bird species. • It was believed to be extinct until a living Banggai crow was identified in Indonesia in 2007. • They are considered Lazarus species. • \"Lazarus species\" is term for living species of organisms that were once believed to be extinct.","q":"Which choice most effectively uses information from the given sentences to emphasize when Shafi Goldwasser won A.M. Turing Award?","o":{"A":"For transformative work that laid the foundations for digital cryptography, Shafi Goldwasser won the A.M. Turing Award.","B":"It was in 2012 that Shafi Goldwasser won the A.M. Turing award.","C":"Shafi Goldwasser is one winner of the A.M. Turing Award.","D":"The prestigious A.M. Turing Award is given for \"major contributions of lasting importance to computing.\""},"a":"B"},{"s":"Rhetorical Synthesis","n":137,"p":"While researching a topic, a student has taken the following notes: • Ibn Sina was a Persian philosopher and physician. • His book The Canon of Medicine recorded the most advanced medical knowledge of his time. • It was published in the years 1025 CE. • It was used as a medical textbook in Middle Eastern and European universities for centuries.","q":"The student wants to specify when the false killer whale was identified. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"A living false killer whale, once believed to be extinct, was identified in 1861.","B":"Previously believed to be extinct, a living false killer whale was identified in Denmark.","C":"Identified in Indonesia, a living Banggai crow was found in 2007.","D":"An example of a Lazarus species was found in 2007."},"a":"A"},{"s":"Rhetorical Synthesis","n":138,"p":"While researching a topic, a student has taken the following notes: • The engineer Robert Fulton designed the Clermont steamboat in 1807. • He designed it in New York City. • Clermont was the world’s first commercially successful steamboat. • The city of Fulton, Missouri, is named after Robert Fulton. • New York City’s Fulton Street is named after him.","q":"The student wants to identify the year that the Canon of Medicine was published. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Ibn Sina recorded the most advanced medical knowledge of his time in his book The Canon of Medicine.","B":"A Persian philosopher and physician wrote a medical textbook called The Cannon of Medicine.","C":"The Cannon of Medicine was a medical textbook used by Middle Eastern and European universities for centuries.","D":"Ibn Sina’s book The Canon of Medicine was published in the year 1025 CE."},"a":"D"},{"s":"Rhetorical Synthesis","n":139,"p":"While researching a topic, a student has taken the following notes: • The El Pinito Mountains are a mountain range located in northwestern Mexico. • The range is one of the dozens of \"sky islands\" in the southwestern US and northwestern Mexico. • A sky island is an isolated mountain range whose environment differs drastically from that of the surrounding lowlands. • The US Forest Service (USFS) said, \"The mountains are ’islands’ surrounded by deserts that are ’seas.’\" • The USFS said, \"Each sky Island is a unique ecosystem.\"","q":"The student wants to indicate how Fulton, Missouri, got its name. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Fulton Street is in New York City, where steamboat Clermont was designed in 1807.","B":"Fulton, Missouri, is named after Robert Fulton, designer of the first commercially successful steamboat.","C":"Designed in in New York City, Clermont was the first commercially successful steamboat.","D":"Fulton, Missouri, shares its name with Fulton Street in New York City."},"a":"B"},{"s":"Rhetorical Synthesis","n":140,"p":"While researching a topic, a student has taken the following notes: • Samuel Delaney is a US writer known for his science fiction. • Delaney’s science fiction novel Babel-17 was published in 1966. • The novel won a Nebula Award in 1967. • The Nebula Awards are given each year to the best works of science fiction published in the US.","q":"The student wants to proved an example of a sky island. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Sky islands are isolated mountain ranges whose environments differ drastically from that of the surrounding lowlands; as the USFS puts it, \"The mountains are ’islands’ surrounded by deserts that are ’seas.’\"","B":"The USFS considers each of the sky islands, whose environments differ drastically from that of the surrounding lowlands, to be a \"unique ecosystem.\"","C":"There are dozens of sky islands in the southwestern US and northwestern Mexico, such as the El Pinito Mountains.","D":"In the southwestern US and northwestern Mexico, there are dozens of sky islands: isolated mountain ranges whose environments differ drastically from that of the surrounding lowlands."},"a":"C"},{"s":"Rhetorical Synthesis","n":141,"p":"While researching a topic, a student has taken the following notes: • Uranus has twenty-seven moons, including Oberon and Miranda. • Oberon completes an orbit of Uranus in 13.46 Earth days on average. • Miranda completes an orbit of Uranus in 1.41 Earth days on average. • German mathematician and astronomer Johannes Kepler (1571-1630) described the orbits of planets as elliptical in shape rather than circular. • Kepler published three laws of planetary motion to describe the orbits of planets around the Sun. • Kepler’s laws also apply to the elliptical orbits of natural satellites (e.g.. moons","q":"The student wants to indicate the title of a novel that won a Nebula Award. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"One of Samuel Delaney’s novels was among the best works of science fiction published in the US.","B":"Samuel Delaney is an award-winning US writer known for his science fiction.","C":"Babel-17, by Samuel Delaney, won a Nebula Award in 1967.","D":"Samuel Delaney published a science fiction novel in 1966."},"a":"C"},{"s":"Rhetorical Synthesis","n":142,"p":"While researching a topic, a student has taken the following notes: • A U-shaped curve in a river channel is called a meander. • A meander forms when water erodes sediment from one side of the riverbank and redeposits that sediment on the opposite side. • Meanders will gradually change shape and migrate downstream over time. • A river with high sinuosity has many meanders, and a river with low sinuosity has few. • The Willapa River in the United States has high sinuosity.","q":"The student wants to contrast the orbits of the two moons. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Miranda completes its orbit of Uranus many times faster than Oberon does.","B":"Kepler’s three laws of planetary motion describe the orbits of planets and natural satellites, including those of Oberon and Miranda.","C":"Oberon’s orbit of Uranus is elliptical in shape and takes, on average, 13.46 Earth days, while Miranda’s orbit of Uranus is circular in shape and takes, on average, 1.41 Earth days.","D":"Uranus’s moons, specifically Oberon and Miranda, orbit their planet in the same way the planets orbit the Sun."},"a":"C"},{"s":"Rhetorical Synthesis","n":143,"p":"While researching a topic, a student has taken the following notes: • Freezers and other cooling technologies use chemical compounds called refrigerants to absorb heat and release cold air. • When a refrigerant absorbs heat, it undergoes vaporization, changing from a liquid to a gas. • When it cools, it undergoes condensation, changing from a gas to a liquid. • The refrigerant fluoromethane is a hydrofluorocarbon (HFC). • HFCs are composed of the elements hydrogen, fluorine, and carbon.","q":"The student wants to define the term \"high-sinuosity river.\" Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"A high-sinuosity river is one that has many meanders, or U-shaped curves.","B":"A high-sinuosity river has U-shaped curves called meanders that will gradually change shape and shift downstream.","C":"High sinuosity is caused by the erosion and redepositing of sediment in a riverbank over time.","D":"Over time, the many meanders in the high-sinuosity Willapa River will change shape and migrate downstream."},"a":"A"},{"s":"Rhetorical Synthesis","n":144,"p":"While researching a topic, a student has taken the following notes: • The Carnegie Prize is an international art competition administered by the Carnegie Museum of Art in Pittsburgh, Pennsylvania. • Painter John Lavery of Ireland won a Carnegie Prize gold medal in 1896. • Lavery’s winning artwork was a painting entitled Lady in Brown. • Sculptor Alexander Calder of the US won a Carnegie Prize gold medal in 1958. • Calder’s winning artwork was a sculpture entitled Mobile: Pittsburgh.","q":"The student wants to describe the role of refrigerants in freezers. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Freezers can absorb heat and release cold air through vaporization and condensation.","B":"The refrigerant fluoromethane, used in freezers, is made up of hydrogen, fluorine, and carbon.","C":"Used in freezers, refrigerants such as fluoromethane can change from a gas to a liquid and back.","D":"Freezers use refrigerants like fluoromethane to absorb heat and release cold air."},"a":"D"},{"s":"Rhetorical Synthesis","n":145,"p":"While researching a topic, a student has taken the following notes: • A copyright prevents a book’s contents from being reproduced (published) without permission from the copyright holder. • When a book’s copyright expires, the book enters the public domain and can be legally reproduced by anyone. • Harmonium is a poetry collection by Wallace Stevens. • It entered the public domain in 2019. • Barren Ground is a novel by Ellen Glasgow. • It entered the public domain in 2021.","q":"The student wants to emphasize a similarity between two artworks. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Both Lady in Brown and Mobile: Pittsburgh are Carnegie Prize gold medal- winning artworks.","B":"Lavery, a painter, won a Carnegie Prize gold medal in for Lady in Brown.","C":"The Carnegie Art Museum in Pittsburgh. Pennsylvania, has awarded Carnegie Prize gold medals to both painters and sculptors.","D":"In contrast to Lady in Brown, a painting Mobile: Pittsburgh is a sculpture."},"a":"A"},{"s":"Rhetorical Synthesis","n":146,"p":"While researching a topic, a student has taken the following notes: • Antelope House is an Ancestral Puebloan dwelling site located in northeastern Arizona. • It was built under a rock overhang and inhabited from approximately 1050-1270 CE. • The overhanging rock ledges offered protection from heavy rain and snow. • Mud Springs Pueblo is a an Ancestral Puebloan dwelling site located in southwestern Colorado. • It was built on relatively flat terrain and inhabited from approximately 1200-1250 CE. • This level surface allowed for the construction of large terraced buildings.","q":"The student wants to emphasize a similarity between Harmonium and Barren Ground. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The year was 2021, and the copyright to Ellen Glasgow’s Barren Ground had finally expired.","B":"Harmonium, a poetry collection by Wallace Stevens, and Barren Ground, a novel by Ellen Glasgow, recently entered the public domain.","C":"Harmonium is a poetry collection, whereas Barren Ground is a novel.","D":"Harmonium, a poetry collection by Wallace Stevens, entered the public domain in 2019, unlike Ellen Glasgow’s novel Barren Ground, which would do so later."},"a":"B"},{"s":"Rhetorical Synthesis","n":147,"p":"While researching a topic, a student has taken the following notes: • The Coachella Valley National Wildlife Refuge (NWR) is a protected natural area in California. • It encompasses 3,592 acres. • It was established to safeguard the habitat of the Coachella Valley fringe-toed lizard, an endangered species. • The Coachella Valley NWR is managed by the US Fish & Wildlife Service. • The US Fish & Wildlife Service limits human activities in the area.","q":"The student wants to explain an advantage of the Antelope House dwelling site. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The relatively flat terrain on which Antelope House was built allowed for the construction of large terraced buildings.","B":"Located in northeastern Arizona, Antelope House is an Ancestral Puebloan dwelling site that was inhabited from approximately 1050-1270CE.","C":"The location of Antelope House, an Ancestral Puebloan dwelling site in northeastern Arizona, provided an advantage to its inhabitants.","D":"Since it was built under a rock overhang, Antelope House was naturally protected from heavy rain and snow."},"a":"D"},{"s":"Rhetorical Synthesis","n":148,"p":"While researching a topic, a student has taken the following notes: • Mauritania is a country in North Africa. • A high percentage of Mauritania’s population (39.9 percent) is under fifteen years old. • It has the thirty-fourth-largest under-fifteen population in the world. • Roughly 40 percent of Africa’s population is under fifteen years old–the highest of any continent. • According to the United Nations (UN), Africa’s \"high number of young people is an opportunity for the continent’s growth – but only if the new generations are fully empowered to realize their best potential.\"","q":"The student wants to indicate the size of the Coachella Valley NWR. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The Coachella Valley NWR is a natural area in California, home to the Coachella Valley fringe-toed lizard.","B":"A protected natural area, the Coachella Valley NWR encompasses 3,592 acres of land in California.","C":"The Coachella Valley NWR is a protected natural area managed by the US Fish & Wildlife Service, which limits human activities there.","D":"Home to the Coachella Valley fringe-toed lizard, California’s Coachella Valley NWR is managed by the US Fish & Wildlife Service."},"a":"B"},{"s":"Rhetorical Synthesis","n":149,"p":"While researching a topic, a student has taken the following notes: • Elizabeth Catlett (1915-2012) was a celebrated African American artist. • She is best known for creating sculptures and prints that explore the Black experience. • Mahalia is a 2002 sculpture by Catlett. • Paulina is a 2009 print by Catlett.","q":"The student wants to emphasize the global rank of Mauritania’s youth population. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"With 39.9 percent of its population under fifteen years of age, Mauritania has the thirty-fourth largest population for that age range in the world.","B":"Africa’s high population of young people is due in part to the high percentage of young people in Mauritania.","C":"Making up roughly 40 percent of the continent’s total population, Africa’s under-fifteen population offers \"an opportunity for the continent’s growth,\" according to the UN.","D":"\"Only if these new generations are fully empowered to realize their best potential,\" says the UN, will Africa’s high percentage of young people lead to the continent’s growth."},"a":"A"},{"s":"Rhetorical Synthesis","n":150,"p":"While researching a topic, a student has taken the following notes: • Herpetology is primarily the study of amphibians and reptiles. • Mary Cynthia Dickerson was an American herpetologist born in 1866. • She is known for her research on frogs. • Biochemistry is primarily the study of the chemical makeup and activity of organisms. • Muriel Wheldale Onslow was a British biochemist born in 1880. • She is known for her research on the basis of petal color in dragon flowers.","q":"The student wants to provide an example of one of Catlett’s sculptures. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The sculpture Mahalia was created by celebrated artist Elizabeth Catlett in 2002.","B":"Elizabeth Catlett, a celebrated artist, was born in 1915.","C":"The print Paulina was created by celebrated artist Elizabeth Catlett in 2009.","D":"Artist Elizabeth Catlett is best known for creating sculptures and prints that explore the Black experience."},"a":"A"},{"s":"Rhetorical Synthesis","n":151,"p":"While researching a topic, a student has taken the following notes: • Hadramphus tuberculatus is an insect species. • It was believed to be extinct until a living specimen was identified in New Zealand in 2004. • Catagonus wagneri is a mammal species. • It was believed to be extinct until a living specimen was identified in Argentina in 1974. • They are considered Lazarus species. • \"Lazarus species\" is a term for living species of organisms that were once believed to be extinct.","q":"Which choice most effectively uses information from the given sentences to emphasize a similarity between Dickerson and Onslow?","o":{"A":"Mary Cynthia Dickerson conducted research on frogs; Muriel Wheldale Onslow, by contrast, is known for her research on the basis of petal color in dragon flowers.","B":"Herpetology and biochemistry are just two examples of the myriad fields in which scientists can specialize.","C":"Like herpetologist Mary Cynthia Dickerson, biochemist Muriel Wheldale Onslow dedicated her scientific career to the study of living organisms.","D":"The herpetologist Mary Cynthia Dickerson was born in 1866, but biochemist Muriel Wheldale Onslow was born later, in 1880."},"a":"C"},{"s":"Rhetorical Synthesis","n":152,"p":"While researching a topic, a student has taken the following notes: • In a 2021 study, researchers showed participants an unaltered image of a popular character or logo alongside two slightly altered versions. • Fred Flintstone is a cartoon man in a spotted tunic. • In the first alteration, the tunic had a striped pattern. • In the second alteration, the tunic had no pattern. • Participants were asked to identify the correct version. • 86.9% of participants selected the unaltered image, and 13.1% selected an altered version.","q":"The student wants to specify where Hadramphus tuberculatus was identified. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"In 1974, a living specimen of Catagonus wagneri was found in Argentina.","B":"A living specimen of Hadramphus tuberculatus, once believed to be extinct, was identified in 2004.","C":"Previously believed to be extinct, a living specimen of Hadramphus tuberculatus was identified in New Zealand.","D":"Examples of Lazarus species can be found in Hadramphus tuberculatus as well as Catagonus wagneri."},"a":"C"},{"s":"Rhetorical Synthesis","n":153,"p":"While researching a topic, a student has taken the following notes: • Body positions are a fundamental aspect of dance. • In Vaganova method ballet, there is a position for the dancer’s arms called first position. • In the position, both arms are rounded to roughly align the fingers with the navel. • In Royal Academy of Dance ballet, there is a position for the dancer’s arms called demi-seconde position. • In this position, both arms are out to the sides but angled downward.","q":"The student wants to emphasize how many participants selected an altered version of Fred Flintstone. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"When participants were asked to identify the correct version of Fred Flintstone, 86.9% selected the unaltered image.","B":"A study showed participants an unaltered image of Fred Flintstone, who is a cartoon man in a spotted tunic, alongside two altered versions.","C":"Participants were asked to identify the correct version of Fred Flintstone, who is a cartoon man in a spotted tunic.","D":"When shown three versions of Fred Flintstone and asked to select the correct one, 13.1% of participants chose an altered version."},"a":"D"},{"s":"Rhetorical Synthesis","n":154,"p":"While researching a topic, a student has taken the following notes: • Zora Neale Hurston was an acclaimed writer. • Her first published work of fiction was a short story. • It was called \"John Redding Goes to Sea.\" • It first appeared in Stylus in 1921.","q":"The student wants to emphasize similarity between the two positions. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"First position in Vaganova method ballet and demi-seconde position in Royal Academy of Dance ballet are both positions for the dancer’s arms.","B":"Both first position and demi-seconde position are positions in Royal Academy of Dance ballet.","C":"In first position, both arms are rounded to roughly align the fingers with the navel, in contrast to demi-seconde position, where both arms are out to the sides but angled downward.","D":"In Vaganova method ballet, there are a number of positions, including first position."},"a":"A"},{"s":"Rhetorical Synthesis","n":155,"p":"While researching a topic, a student has taken the following notes: • The Galápagos penguin is a species of bird that can be found on the Galápagos Island of Floreana. • It has an average weight of 2.5 kilograms. • The grey warbler finch is a species of bird that can be found on the Galápagos Island of Floreana. • It has an average weight of 9 grams.","q":"The student wants to identify the title of Zora Neale Hurston’s first published short story. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Zora Neale Hurston’s first published work of fiction appeared in 1921.","B":"Zora Neale Hurston’s first published short story was called \"John Redding Goes to Sea.\"","C":"In 1921, a short story by Zora Neale Hurston appeared in Stylus.","D":"Acclaimed writer Zora Neale Hurston’s first published work of fiction was a short story."},"a":"B"},{"s":"Rhetorical Synthesis","n":156,"p":"While researching a topic, a student has taken the following notes: • Element abundance is a relative measure of the amount of a chemical elements in a given environment. • Abundance can be expressed as a mass fraction. • A mass fraction is the ratio of the total mass of an element to the combined mass of all the elements in a given environment. • The mass fraction of iron (Fe) on Earth is 319,000 parts per million (ppm). • The mass fraction of strontium (Sr) on Earth is 13 ppm.","q":"The student wants to emphasize a similarity between the Galápagos penguin and the grey warbler finch. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"On average, the Galápagos penguin weighs 2.5 kilograms, while the grey warbler finch weighs 9 grams.","B":"The grey warbler finch, which weighs 9 grams on average, can be found on the Galápagos Island of Floreana.","C":"The grey warbler finch and the Galápagos penguin can both be found on the Galápagos Island of Floreana.","D":"The Galápagos Island of Floreana is home to several bird species, one of which is the Galapagos penguin."},"a":"C"},{"s":"Rhetorical Synthesis","n":157,"p":"While researching a topic, a student has taken the following notes: • Birds of Northern South America is an identification guidebook by ornithologists Robin Restall, Clemencia Rodner, and Miguel Lentino. • It lists the thirty-five hummingbird species found in Suriname. • The green-throated mango is a large hummingbird found in Suriname. • It is identifiable by its green throat and its long, black, curved bill. • The horned sungem is a medium-sized hummingbird found in Suriname. • It is identifiable by its distinctive multicolored, tufted crown and its short, black, straight bill.","q":"The student wants to specify the total mass of Earth’s iron relative to that of all elements. Which choice most effectively uses relevant data from the notes to accomplish this goal?","o":{"A":"The mass fraction of iron on Earth is 319,000 ppm.","B":"Iron’s mass relative to the combined mass of all elements on Earth is 13 ppm.","C":"Iron’s abundance can be expressed by a mass fraction, the element’s mass relative to that of all elements on Earth.","D":"Iron’s abundance on Earth is greater than strontium’s, as reflected by iron’s higher mass fraction."},"a":"A"},{"s":"Rhetorical Synthesis","n":158,"p":"While researching a topic, a student has taken the following notes: • If a moon orbiting a planet comes close enough to that planet, tidal forces can cause the moon to break apart. • In a 2022 study, researchers proposed that Saturn was once orbited by a large moon they named Chrysalis. • Their simulations indicated that Chrysalis would likely have come very close to Saturn around 160 million years ago. • At that distance, Chrysalis would have been broken apart by tidal forces. • The researchers hypothesized that the resulting debris formed Saturn’s rings.","q":"Which choice most effectively uses information from the given sentences to emphasize a similarity between two birds?","o":{"A":"Birds of Northern South America is an expertly compiled guidebook by ornithologists Robin Restall, Clemencia Rodner, and Miguel Lentino.","B":"Though they share several traits in common, the green-throated mango is larger than the horned sungem.","C":"While each exhibits unique traits in common, the green-throated mango and the horned sungem both have black bills.","D":"The horned sungem is a medium-sized hummingbird identifiable by its distinctive multicolored, tufted crown and its short, black, straight bill."},"a":"C"},{"s":"Rhetorical Synthesis","n":159,"p":"While researching a topic, a student has taken the following notes: • A multiyear study called GREEN SURGE examined forty-four different types of UNAs (urban natural areas) in cities throughout Europe. • A primary aim of the study was to determine the benefits of UNAs in these cities. • Large urban parks are among the types of UNAs included in the study. • Large urban parks are defined as green city areas reserved for recreational use. • They can benefit urban environments by contributing to biodiversity.","q":"The student wants to recount the sequence of events proposed by the researchers. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"According to researchers’ simulations, debris from Saturn’s rings would likely have caused Chrysalis – a large moon orbiting Saturn – to break apart around million years ago.","B":"In a study, researchers proposed that Saturn was once orbited by a large moon that broke apart.","C":"Around 160 million years ago, a large moon (Chrysalis) may have come close enough to Saturn that tidal forces broke the moon apart: its debris then formed the planet’s rings.","D":"If a moon orbiting a planet (like Saturn) comes close enough to that planet, tidal forces can cause the moon to break apart."},"a":"C"},{"s":"Rhetorical Synthesis","n":160,"p":"While researching a topic, a student has taken the following notes: • Maya Lin is an American artist known for her memorials and works of installation art. • She completed the Women’s Table in 1993. • It is a memorial sculpture consisting of a thirty-two-ton granite fountain, and it is designed to commemorate female students at Yale University. • She completed Silver Upper White River in 2015. • It is an installation composed of recycled silver that fills an entire gallery wall.","q":"The student wants to emphasize an objective of the GREEN SURGE study. Which choice most effectively uses relevant information from to accomplish this goal?","o":{"A":"For multiple years, the GREEN SURGE study was conducted in cities throughout Europe.","B":"To achieve its main objective, the GREEN SURGE study examined forty-four different types of UNAs, including large urban parks.","C":"Determining the benefits of UNAs in European cities was a primary aim of the GREEN SURGE study.","D":"Large urban parks, which were included in the GREEN SURGE study, can benefit urban environments by contributing to biodiversity."},"a":"C"},{"s":"Rhetorical Synthesis","n":161,"p":"While researching a topic, a student has taken the following notes: • Georeferencing is the process of assigning geographic coordinates to an image. • This process enables mapping software to place the image in its real-world location. • A 2017 project by Tania López Marrero and colleagues georeferenced a set of aerial photographs of Puerto Rico’s coastline taken in 1930. • These photographs are the earliest known aerial photographs of Puerto Rico. • López Marrero’s project provided data that can help researchers analyze changes in Puerto Rico’s coastline.","q":"The student wants to describe Silver Upper White River to a new audience. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Completed in 2015, Maya Lin’s Silver Upper White River is a large-scale installation artwork composed of recycled silver that fills an entire gallery wall.","B":"Artist Maya Lin is well known for her installation art, such as Silver Upper White River (2015), and for her memorials.","C":"Maya Lin’s Women’s Table is a granite memorial sculpture that commemorates female students at Yale University, while Silver Upper White River is an installation artwork.","D":"Though Maya Lin’s Silver Upper White River (2015) is not a memorial, its gallery-filling scale may call to mind the imposing Women’s Table, which consists of a thirty-two-ton granite fountain."},"a":"A"},{"s":"Rhetorical Synthesis","n":162,"p":"While researching a topic, a student has taken the following notes: • Grimanesa Amoros is a Peruvian American artist well known for her LED light sculptures. • Her sculpture Uros House is made of smooth multicolored LED domes. • It occupies 250 cubic feet of space. • Her sculpture Ocupante is made of entangled blue and white LED tubes. • It occupies 80,000 cubic feet of space.","q":"The student wants to define the term \"georeferencing.\" Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Tania Lopez Marrero and colleagues used georeferencing used in their analysis of the earliest known aerial photographs of Puerto Rico.","B":"Georeferencing is the process of assigning geographic coordinates to an image so that mapping software can place it in its real-world location.","C":"A project by Tania López Marrero and colleagues assigned geographic coordinates to photographs of Puerto Rico’s coastline and also used georeferencing.","D":"Georeferenced aerial photographs from López Marrero’s project can help researchers analyze changes in Puerto Rico’s coastline."},"a":"B"},{"s":"Rhetorical Synthesis","n":163,"p":"While researching a topic, a student has taken the following notes: • Dinosaur fossil specimens can be found at science museums all over the world. • A dinosaur fossil specimen nicknamed Stan is housed at the Black Hills Institute in Hill City, South Dakota. • Stan, a Tyrannosaurus, lived in the Late Cretaceous period. • A dinosaur fossil specimen nicknamed Horridus is housed at the Melbourne Museum in Melbourne, Australia. • Horridus, a Triceratops, lived in the Late Cretaceous period.","q":"The student wants to emphasize a similarity between Uros House and Ocupante. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"At 80,000 cubic feet in size, Grimanesa Amoros’s Ocupante cuts a larger figure than the cubic foot Uros House.","B":"Uros House is an LED light sculpture made by Grimanesa Amoros, as is Ocupante.","C":"The smooth LED domes of Grimanesa Amoros’s Uros House stand in contrast to the tangled LED tubes of Ocupante.","D":"Grimanesa Amoros is the artist behind Uros House–a sculpture made of smooth multicolored LED domes."},"a":"B"},{"s":"Rhetorical Synthesis","n":164,"p":"While researching a topic, a student has taken the following notes: • Soap forms as the result of a chemical reaction between fats and either sodium or potassium hydroxide. • One end of a soap molecule is hydrophobic (water repelling), and one end is hydrophilic (water attracting). • The hydrophobic ends of soap molecules adhere to hydrophobic surface contaminants, such as dirt and oils. • The soap molecules form circular structures (micelles) around contaminants. • The hydrophilic ends of the molecules encase the micelles in water, lifting the micelles and contaminants off surfaces.","q":"The student wants to emphasize a similarity between the two dinosaur fossil specimens. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Both the Tyrannosaurus fossil specimen Stan and the Triceratops fossil specimen Horridus lived in the Late Cretaceous period.","B":"While the Tyrannosaurus fossil specimen Stan is in Hill City, South Dakota, the Triceratops fossil specimen Horridus is in Melbourne, Australia.","C":"Dinosaur fossil specimens can be found at science museums all muse the world, including in Hill City, South Dakota, and Melbourne, Australia.","D":"The Black Hills Institute is home to Stan, a Tyrannosaurus fossil specimen from the Late Cretaceous period."},"a":"A"},{"s":"Rhetorical Synthesis","n":165,"p":"While researching a topic, a student has taken the following notes: • The United States has designated more
