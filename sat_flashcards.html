than 500 areas National Wildlife Refuges (NWRs). • Some NWRs were established specifically to protect endangered species. • The Bear Valley NWR is a 4,200-acre area in Oregon. • It was established to protect the endangered bald eagle. • The Ellicott Slough NWR is a 139-acre area in California.","q":"The student wants to explain how soap removes a surface contaminant. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Surface contaminants like dirt and oils are hydrophobic, not hydrophilic—meaning they repel water rather than attract it.","B":"Micelles are circular structures created when soap molecules attach themselves to dirt or oils.","C":"To remove dirt from a surface, soap molecules form a circular structure, or micelle, around the contaminant; next, the molecules encase the micelle in water, lifting it—and the dirt—off the surface.","D":"Dirt, an example of a hydrophobic surface contaminant, can be removed from a surface by soap, which forms as the result of a chemical reaction between fats and either sodium or potassium hydroxide."},"a":"C"},{"s":"Rhetorical Synthesis","n":166,"p":"While researching a topic, a student has taken the following notes: • In botany, strawberries (Fragaria ananassa) are classified as fruits. • In botany, green beans (Phaseolus vulgaris) are classified as fruits. • Green beans are commonly considered vegetables because they taste savory. • Strawberries are commonly considered fruits because they taste sweet.","q":"The student wants to emphasize a similarity between the two NWRs. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The US has designated more than 500 areas NWRS, including the Bear Valley NWR in Oregon.","B":"While the Bear Valley NWR extends across a 4,200-acre area, the Ellicott Slough NWR encompasses only 139 acres.","C":"Some NWRS, such as California’s Ellicott Slough, were established specifically to protect endangered species.","D":"Both the Bear Valley NWR and the Ellicott Slough NWR were established to protect endangered species."},"a":"D"},{"s":"Rhetorical Synthesis","n":167,"p":"While researching a topic, a student has taken the following notes: • Historian Isabel Wilkerson’s book The Warmth of Other Suns is about the Great Migration. • The Great Migration was a period in twentieth-century US history when over six million African Americans moved from the rural South to citles such as New New York. • To document this period, Wilkerson narrates the personal journeys of Ida Mae Gladney and Robert Pershing Foster, among others. • The book won the Hurston/Wright Legacy Award in 2011. • It also won the Heartland Prize in 2011.","q":"The student wants to emphasize a similarity between strawberries and green beans. Which cholce most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Unlike strawberries, green beans taste savory.","B":"In botany, strawberries (Fragaria ananassa) and green beans (Phaseolus vulgaris) are both classifled as fruits.","C":"While strawberrles are commonly considered fruits, green beans are commonly considered vegetables.","D":"Strawberries, which are botanically classified as fruits, taste sweet and thus are commonly considered fruits."},"a":"B"},{"s":"Rhetorical Synthesis","n":168,"p":"While researching a topic, a student has taken the following notes: • Field is a 1968 black-and-white linocut print by Black American artist Samella Lewis. • It features a laborer raising his fist in a symbol of liberation. • Relief printing is a technique in which an image is first carved onto a printing block made of wood, rubber, or other materials. • The block is then painted and stamped onto a print surface. • Lino cutting is a type of relief printing that uses linoleum tile as the printing block.","q":"Which choice most effectively uses information from the given sentences to emphasize how Wilkerson documents the Great Migration?","o":{"A":"The personal journey of Ida Mae Gladney is featured in the award-winning book The Warmth of Other Suns.","B":"New York, New York, Is one of the cities whose African American populations grew during the Great Migration.","C":"In 2011, Isabel Wilkerson’s book The Warmth of Other Suns won not only the Hurston/Wright Legacy Award but also the Heartland Prize.","D":"Isabel Wilkerson chronicles the complex history of the Great Migration in such riveting, personal detail by narrating the journeys of individuals, such as Ida Mae Gladney and Robert Pershing Foster."},"a":"D"},{"s":"Rhetorical Synthesis","n":169,"p":"While researching a topic, a student has taken the following notes: • Modularity of mind is the notion that the mind is at least partly composed of innate neural structures (modules) that perform fast, necessary tasks. • 1983: cognitive scientist Jerry A. Fodor hypothesized that low-level cognitive systems (e.g., perception, language) are modular. • In Fodorian modularity, high-level systems (e.g.,reasoning) are not modular. • 2003: cognitive scientist Peter Carruthers proposed the massive modularity hypothesis (MMH). • MMH expands modularity to include all cognitive systems.","q":"The student wants to describe the process of relief printing. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Lewis used relief printing to create the 1968 linocut Field.","B":"In relief printing, an image is carved onto a printing block, which is then painted and pressed ontoaprint surface.","C":"Lewis used a relief printing technique called lino cutting, carving an image onto linoleum tile.","D":"Relief printing is a technique that can use wood, rubber, and other materials as the printing block, not just linoleum tile."},"a":"B"},{"s":"Rhetorical Synthesis","n":170,"p":"While researching a topic, a student has taken the following notes: • Carbon can exist in several distinct structural forms called allotropes. • Graphite is a carbon allotrope. • Graphite is composed of stacked graphene sheets. • Each graphene sheet is composed of carbon atoms arranged in a flat honeycomb pattern. • Carbon nanotubes are carbon allotropes. • They are composed of one or more graphene sheets wrapped into acylindrical shape.","q":"The student wants to compare Fodor’s hypothesis with Carruthers’s. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"In 2003, Carruthers proposed the massive modularity hypothesis, disagreeing with Fodor’s earlier hypothesis that the mind is composed of innate neural structures.","B":"In considering some but not all cognitive systems modular, Fodorian modularity is not as expansive in its definition of modularity as MMH is.","C":"The hypotheses of Fodor and Carruthers differ in whether they consider low-level cognitive systems, such as perceptionend language, modular.","D":"Following Fodor’s 1983 hypothesis, Carruthers proposed that modularity of mind Includes all cognitive systems."},"a":"A"},{"s":"Rhetorical Synthesis","n":171,"p":"While researching a topic, a student has taken the following notes: • Today, more than twenty different national currencies are referred to as \"dollars.\" • The English word \"dollar\" comes from the German word \"thaler.\" • Kiribati’s currency is known as the Kiribati dollar","q":"The student wants to emphasize a difference between carbon nanotubes and graphite. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Composed of sheets wrapped into a cylindrical shape, carbon nanotubes contrast with graphite, a carbon allotrope composed of graphene sheets.","B":"Graphite and carbon nanotubes are allotropes composed of stacked or wrapped graphene sheets, but carbon can exist in several distinct structural forms.","C":"Unlike carbon nanotubes, which are composed of sheets of carbon atoms arranged in a flat honeycomb pattern, graphite is a cylindrical carbon allotrope.","D":"The graphene sheets in graphite are stacked, whereas in carbon nanotubes, they form a cylinder."},"a":"C"},{"s":"Rhetorical Synthesis","n":172,"p":"While researching a topic, a student has taken the following notes: • In a 2003 study, Alexander and Schrag tested the effect of plant litter on seedling emergence in a grassland setting. • The test site was a mesic grassland in a dry midlatitude climate in the United States. • The researchers found that in these environmental conditions the presence of plant litter had a positive effect on seedling emergence. • Seedling emergence is when a seedling sprouts above ground and begins photosynthesis.","q":"The student wants to provide an example of a country that uses the word \"dollar\" in the name of its currency. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Kiribati uses the Kiribati dollar as its national currency.","B":"Kiribati does not refer to its currency by the German word \"thaler.\"","C":"The German word \"thaler\" is the origin of the English word \"dollar.\"","D":"Today, many countries use the word \"dollar\" in naming their currencies."},"a":"A"},{"s":"Rhetorical Synthesis","n":173,"p":"While researching a topic, a student has taken the following notes: • Generally, an object will heat up when twisted. • The twisting of an object is known as torsion. • A 2019 study led by Zunfeng Liu and Ray Baughman tested the torsional heating of various fibers. • When a sample of four-ply nickel-titanium (NiTi) wire was twisted, its average surface temperature increased by 30.4°C. • When a sample of ethylene propylene diene monomer (EPDM) rubber fiber was twisted, Its average surface temperature increased by 12°C.","q":"Which choice most effectively uses information from the given sentences to present the study’s findings to an audience already familiar with the concept of seedling emergence?","o":{"A":"The findings of Alexander and Schrag’s study were published in 2003.","B":"In a 2003 study by Alexander and Schrag. plant litter was found to have a positive effect on seedling emergence, which is when a seedling sprouts and begins photosynthesis.","C":"The effect of plant litter, which includes dead leaves and other plant matter, on seedling emergence has been the subject of scientific study.","D":"Alexander and Schrag found that in a mesic grassland and a dry midlatitude climate the presence of plant litter had a positive effect on seedling emergence."},"a":"D"},{"s":"Rhetorical Synthesis","n":174,"p":"While researching a topic, a student has taken the following notes: • GA supercontinent is a single landmass made up of most or all of Eartht’s continents. • Over time, continents merge together to form supercontinents,which then break apart. • This procest is believed to take hundreds of millions of years and is known as the supercontinent cycle. • Ur was a supercontinentthat formed about 3.1 billion years ago. • Pangaea was a supercontinent that formed about 300 million years ago.","q":"The student wants to emphasize a similarity between EPDM rubber and four-ply NiTi wire fibers. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"In 2019, two research teams observed the effects of torsional heating on various fibers, including EPDM rubber and four-ply NiTi wire.","B":"Both EPDM rubber and four-ply NITI wire fibers heat up when twisted, according to a 2019 study.g sprouts and begins photosynthesis.","C":"Researchers determined that when the filbers were twisted, the average surface temperature of four-ply NiTi wire increased more than that of EPDM rubber.","D":"Twisting an object will generally cause its temperature to increase, a process known as torsional heating."},"a":"B"},{"s":"Rhetorical Synthesis","n":175,"p":"While researching a topic, a student has taken the following notes: • Most of the plant and bird species in Oahu, Hawaii, are non-native. • In a 2019 study, researchers wanted to know what role non-native birds play in dispersing plant seeds in Oahu. • Researchers catalogued plant seeds found in fecal samples from non-native birds. • Psydrax odorata, a flowering shrub, was one of fifteen native species catalogued. • Cestrum nocturnum, a nightshade, was one of twenty-nine non-native species catalogued. • Researchers concluded that non-native birds play a vital role in dispersing the seeds of na","q":"The student wants to emphasize the order in which the supercontinents were formed. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Ur formed about 3.1 billlon years ago but eventually broke apart.","B":"Ur and Pangaea were both supercontinents, single landmasses made up of most or all of Earth’s continents.","C":"The supercontinent Pangaea formed long after the supercontinent Ur.","D":"Forming and breaking apart over hundreds of millions of years, supercontinents are made up of most or all of Earth’s continents."},"a":"C"},{"s":"Rhetorical Synthesis","n":176,"p":"While researching a topic, a student has taken the following notes: • Tianguistengo is a municipality in the state of Hidalgo, Mexico. • Tianguistengo is a municipality in the state of Hidalgo, Mexico. Municipalities are governmental regions responsible for providing many public services to their residents. • One service they provide is traffic control. • Tianguistengo covers an area of roughly 256 km². • Hidalgo is divided into 84 municipalities.","q":"The student wants to emphasize the order in which the supercontinents were formed. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Most plant species found in Oahu, Hawall, like Cestrum nocturnum, are nonnative.","B":"Though Psydrax odorata and Cestrum nocturnum can both be found in Oahu, Hawaii, only the former plant is native.","C":"A 2019 study catalogued plant seeds found in bird fecal samples in Oahu, Hawaii, to determine what role non-native birds play in seed dispersal.","D":"Seeds from Psydrax odorata and Cestrum nocturnum plants were found in the fecal samples of non-native Hawaiian birds, according to a 2019 study."},"a":"B"},{"s":"Rhetorical Synthesis","n":177,"p":"While researching a topic, a student has taken the following notes: • The South Sudan Workers Trade Union Federation (SSWTUF) is a national union federation for the African nation of South Sudan. • It helps improve conditions for workers in that nation. • ITUC-Africa is a regional union federation that represents national union federations across Africa. • It represents the SSWTUF.","q":"The student wants to emphasize the size of Tianguistengo. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Tianguistengo is one of 84 governmental regions, known as municipalitles, acroSs Hidalgo.","B":"Providing traffic control is just one example of the public services that municipalities provide.","C":"Tianguistengo a governmental region in the state of Hidalgo, Mexico provides many public services to its residents.","D":"The municipality of Tianguistengo in Hidalgo, Mexico, covers an area of roughly 256 km²."},"a":"D"},{"s":"Rhetorical Synthesis","n":178,"p":"While researching a topic, a student has taken the following notes: • A soundscape refers to the sounds heard in a specific place. • The Japanese Ministry of the Environment made a list of 100 soundscapes ofJapan. • Each soundscape on the list was selected for its cultural significance to Japan. • The sound of black-tailed gulls at Hachinohe Port in Aomori Prefecture is on the list. • Aomori Prefecture is on northern Honshu Island, Japan.","q":"Which choice most effectively uses information from the given sentences to explain the purpose of national union federations?","o":{"A":"The SSWTUF is one ofthe national union federations represented by ITUC-Africa.","B":"Regional union federations like ITUC-Africa represent the national union federations in a specific area.","C":"National union federations, such as the SSWTUF, work to improve conditions for workers in their member nations.","D":"The SSWTUF is a national union federation in Africa."},"a":"C"},{"s":"Rhetorical Synthesis","n":179,"p":"While researching a topic, a student has taken the following notes: • Dinosaur fossil specimens can be found at science museums all over the world. • Many dinosaur fossil specimens are given nicknames. • The Denver Museum of Nature and Science in Denver, Colorado, houses a dinosaur fossil specimen nicknamed Pops. • Pops lived in the Late Cretaceous period, which ended more than 65 million years ago. • It is a member of the genus Triceratops.","q":"The student wants to specify where a soundscape of cultural significance to Japan can be heard. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The sound of black-tailed gulls was included on a list of 100 soundscapes.","B":"The soundscape was selected by the Japanese Ministry of the Environment for its cultural significance to Japan.","C":"The soundscape included the sounds heard in a specific place.","D":"The sound of black-tailed gulls at Hachinohe Port can be heard in Aomori Prefecture on northern Honshu Island, Japan."},"a":"D"},{"s":"Rhetorical Synthesis","n":180,"p":"While researching a topic, a student has taken the following notes: • The ratio of the total mass of an element to the combined mass of all elements in a given environment is called the mass fraction. • The mass fraction of chromium (Cr) on Earth is 4,700 parts per million (ppm). • This indicates that the relative abundance of chromium on Earth is 0.47%. • The ratio of the total number of atoms of an element to the total number of all atoms in a given environment is called the mole fraction. • The mole fraction of chromium on Earth is 2,300,000 parts per billion (ppb). • This indicates that th","q":"The student wants to provide an example of a dinosaur fossil specimen’s nickname. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Nicknames are given to many dinosaur fossil specimens, including one housed at a museum in Denver, Colorado.","B":"A Triceratops fossil specimen from the Late Cretaceous period, which ended more than 65 million years ago, is housed at the Denver Museum of Nature and Science.","C":"Dinosaur fossil specimens can be found at museums all over the world, and many of these specimens are given nicknames.","D":"Pops is the nickname of a Triceratops fossil specimen housed at the Denver Museum of Nature and Science in Denver, Colorado."},"a":"D"},{"s":"Rhetorical Synthesis","n":181,"p":"While researching a topic, a student has taken the following notes: • Cinematographers work with cameras and lighting. • They help translate film directors’ ideas into visual images. • Frida (2002) was directed by Julie Taymor. • Rodrigo Prieto was the film’s cinematographer.","q":"The student wants to provide an example of a dinosaur fossil specimen’s nickname. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"On Earth, the mass fraction of chromium is 4,700 ppm, or 0.47%, and the mole fraction is 2,300,000 ppb, or 0.23%.","B":"While mass fraction is a measure of relative mass and mole fraction is a measure of relative atom count, both indicate the relative abundance of elements on Earth.","C":"Both mass and mole fraction express the relative abundance of chromium on Earth as a ratio of the total mass of chromium to the combined mass of all atoms.","D":"The mass fraction of chromium indicates its relative mass; in addition, the element’s mole fraction indicates the relative number of chromium atoms."},"a":"B"},{"s":"Rhetorical Synthesis","n":182,"p":"While researching a topic, a student has taken the following notes: • Merle Oberon (1911-1979) was an actress born in Mumbai (then known as Bombay), India. • She was of Indian, Maori, and Irish heritage. • She was the first Indian-born actress to be nominated for an Academy Award. • Early in her career, she played many nameless, uncredited roles, such as her role in Alf’s Button (1930). • Later, she played many named, credited roles, such as Marjorie Ismay in Forever and a Day (1943).","q":"Which choice most effectively uses information from the given sentences to provide an example of a film Prieto worked on?","o":{"A":"Cinematographer Rodrigo Prieto worked with director Julie Taymor.","B":"The 2002 film Frida is one example of Rodrigo Prieto’s work as a cinematographer.","C":"In filmmaking, directors work with others to translate their ideas into the visual images that we encounter on the screen.","D":"As cinematographer, Rodrigo Prieto works with cameras and lighting to translate the film director’s ideas into visual images."},"a":"B"},{"s":"Rhetorical Synthesis","n":183,"p":"While researching a topic, a student has taken the following notes: • India Arie is an African American singer and songwriter. • The media outlet BBC Music has described her music as a \"blend of hip hop, soul and folk [that is] as subtle as it [is] inspired.\" • Her acclaimed albums feature many talented musicians. • Judeth Insel played viola on her first studio album, Acoustic Soul (2001). • David Davidson played violin on her second studio album, Voyage to India (2002).","q":"The student wants to make and support a generalization about Merle Oberon’s early career. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Alf’s Button (1930) was released early in Merle Oberon’s career, whereas Forever and a Day (1943) came out later.","B":"Merle Oberon wasn’t even listed in the credits of some of her early films, such as Alf’s Button (1930), where she played a nameless, uncredited role.","C":"Alf’s Button and Forever and a Day are both films that include Merle Oberon, the first Indian-born actress to be nominated for an Academy Award.","D":"In Alf’s Button (1930), actress Merle Oberon played a nameless, uncredited role."},"a":"B"},{"s":"Rhetorical Synthesis","n":184,"p":"While researching a topic, a student has taken the following notes: • Historian Isabel Wilkerson’s book The Warmth of Other Suns is about the Great Migration. • The Great Migration was a period in twentieth-century US history when over six million African Americans moved from the rural South to cities such as Detroit, Michigan. • To document this period, Wilkerson narrates the personal journeys of George Swanson Starling and Robert Pershing Foster, among others. • The book won the Mark Lynton History Prize in 2011. • It also won the National Book Critics Circle Award in 2011.","q":"The student wants to emphasize a similarity between Judeth Insel and David Davidson. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Judeth Insel played on India Arie’s first studio album, Acoustic Soul, which was released one year before her album Voyage to India.","B":"Acoustic Soul and Voyage to India, released in 2001 and 2002, respectively, are albums by singer and songwriter India Arie.","C":"Although both musicians have played on India Arie albums, Judeth Insel played viola, whereas David Davidson played violin.","D":"Judeth Insel and David Davidson both lent their musical talents to albums by India Arie in the earry 2000s."},"a":"D"},{"s":"Rhetorical Synthesis","n":185,"p":"While researching a topic, a student has taken the following notes: • Usually, a country’s capital is also its largest city by population. • The capital of the Philippines is Manila. • Its largest city by population is Quezon City. • The capital of Liechtenstein is Vaduz. • Its largest city by population is Schaan.","q":"Which choice most effectively uses information from the given sentences to emphasize how Wilkerson documents the Great Migration?","o":{"A":"Detroit, Michigan, is one of the cities whose African American populations grew during the Great Migration.","B":"Isabel Wilkerson chronicles the complex history of the Great Migration in such riveting, personal detail by narrating the journeys of individuals, such as George Swanson Starling and Robert Pershing Foster.","C":"In 2011, Isabel Wilkerson’s book Te Warmth of Other Suns won not only the Mark Lynton History Prize but also the National Book Critics Circle Award.","D":"The personal journey of George Swanson Starling is featured in the award winning book The Warmth of Other Suns."},"a":"B"},{"s":"Rhetorical Synthesis","n":186,"p":"While researching a topic, a student has taken the following notes: • Bread is a 1968 black-and-white linocut print by Black American artist Elizabeth Catlett. • It features a young girl eating a slice of bread. • Relief printing is a technique in which an image is first carved onto a printing block made of wood, rubber, or other materials. • The block is then painted and stamped on to a print surface. • Lino cutting is a type of relief printing that uses linoleum tile as the printing block.","q":"The student wants to emphasize a similarity between the two countries. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"In both the Philippines and Liechtenstein, the capital is not the country’s most populous city.","B":"While the most populous city in the Philippines is Quezon City, the most populous city in Liechtenstein is Schaan.","C":"The most populous city in the Philippines is Quezon City, but the country’s capital is Manila.","D":"The capital of the Philippines is Manila; the capital of Liechtenstein is Vaduz."},"a":"A"},{"s":"Rhetorical Synthesis","n":187,"p":"While researching a topic, a student has taken the following notes: • Digital Light Synthesis (DI.S) is a form of additive manufactiring that utilizes light to rapidly cure liquid resin into high-quality, 3D objects. • Step 1: Ultraviolet (UV) light images are projected up into a pool of liquid resin. where the object’s first layer takes shape. • Step 2: The partially cured resin object is raised, leaving a thin space (a \"dead zone) beneath it for oxygen and liquid resin to flow through. • Step 3: The UV light passes through the dead zoneand partially cures additional layers of the object -mai","q":"The student wants to emphasize a similarity between the two countries. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Relief printing is a technique that can use wood, rubber, and other materials as the printing block, not just linoleum tile.","B":"Catlett used a relief printing technique called lino cutting, carving an image onto linoleum tile.","C":"Catlett used relief printing to create the 1968 linocut Bread.","D":"In relief printing, an image is carved on to a printing block, which is then painted and pressed Vonto a print surface."},"a":"D"},{"s":"Rhetorical Synthesis","n":188,"p":"While researching a topic, a student has taken the following notes: • Most of the plant and bird species in Oahu, Hawali, are non-native. • It ranks No. 14 among the longest rivers in the world. • It is 4,200 kilometers long. • The Indus River is the ninth longest river in Asia • It ranks No. 19 among the longest rivers in the world. • It is 3,610 kilometers long.","q":"The student wants to describe how DL.S cures 3D objects. Which choice most effectively uses relevant Information from the notes to accomplish this goal?","o":{"A":"DLS cures 3D objects by passing through a \"dead zone,\" adding layers to the object, then curing the object in an oven.","B":"In DLS, UV light is projected into layers of liquid resin until the resin solidifies and passes through a \"dead zone,\" wherein the curing is completed.","C":"In DLS. UV light Images are projected into a liquid resin pool to cure a 3D object layer by layer: once solidified,the object is baked in an oven.","D":"DLS is a form of additive manufacturing that creates a \"dead zone\" in which UV light solidifies layer by layer before being baked in an oven, creating a highquality, 3D object."},"a":"D"},{"s":"Rhetorical Synthesis","n":189,"p":"While researching a topic, a student has taken the following notes: • Generally, an object will heat up when twisted. • The twisting of an object is known as torsion. • A 2019 study led by Zunfeng Liu and Ray Baughman tested the torsional heating of various fibers. • When a sample of ethylene propylene diene monomer (EPDM) rubber fiber was twisted, its average surface temperature increased by 12°C. • When a sample of natural rubber fiber was twisted, its average surface temperature increased by 15.3°C.","q":"The student wants to emphasize a difference between the two plants. Which cholce most effectively uses relevant Information from the notes to accomplish this goal?","o":{"A":"Most plant species found in Oahu, Hawaii, like Psidium cattleyanun, are non native.","B":"Though Pipturus albidus and Psidium cattleyanum can both be found in Oahu, Hawaii, only the former plant is native.","C":"A 2019 study catalogued plant seeds found in bird fecal samples in Oahu. Hawall. to determine what role non-native birds play in seed dispersal.","D":"Seeds from Pipturus albidus and Psidlum cattleyanum plants were found in the fecal samples of non-native Hawallan birds, according to a 2019 study."},"a":"B"},{"s":"Rhetorical Synthesis","n":190,"p":"While researching a topic, a student has taken the following notes: • India Arie is an African American singer and songwriter. • The media outlet NPR has described her music as having an \"acoustic guitar-driven groove and lyrics celebrating self-confidence.\" • Her acclaimed albums feature many talented musicians. • Ricky Quiñones played guitar on her second studio album, Voyage to India (2002). • John Catchings played cello on her first studio album, AcousticSoul (2001).","q":"The student wants to emphasize a similarity between EPDM rubber and natural rubber fibers. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"In 2019, two research teams observed the effects of torsional heating on various fibers, including EPDM rubber and natural rubber.","B":"Twisting an object will generally cause its temperature to increase, a process known as torsional heating.","C":"Researchers determined that when the fibers were twisted, the average surface temperature of natural rubber increased more than that of EPDM rubber.","D":"Both EPDM rubber and natural rubber fibers heat up when twisted, according to a 2019 study."},"a":"D"},{"s":"Rhetorical Synthesis","n":191,"p":"While researching a topic, a student has taken the following notes: • An isthmus is a strip of land that connects two larger pieces of land across an expanse of water. • It is also known as a land bridge. • The Isthmus of Suez is located in North Africa. • It connects the Mediterranean Sea to the Red Sea. • The Auckland Isthmus is located in New Zealand. • It connects the North Island to Auckland.","q":"The student wants to emphasize a difference between Ricky Quiñones and John Catchings. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Ricky Quiñones and John Catchings have both lent their musical talents to albums by India Arie.","B":"Both musicians have played on India Arie albums, but Ricky Quiñones played guitar, whereas John Catchings played cello.","C":"Ricky Quiñones played on India Arie’s second studio album, Voyage to India, which was released one year after her album Acoustic Soul.","D":"Acoustic Soul and Voyage to India, released in 2001 and 2002, respectively, are albums by singer and songwriter India Arie."},"a":"B"},{"s":"Rhetorical Synthesis","n":192,"p":"While researching a topic, a student has taken the following notes: • Body positions are an important part of dance. • In Cecchetti method ballet, there is a position called third position. • It is one of several positions for the dancer’s arms.","q":"The student wants to emphasize a similarity between the Isthmus of Suez and the Auckland Isthmus. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"An isthmus, or land bridge, is a strip of land that connects two larger pieces of land across an expanse of water.","B":"The Auckland Isthmus connects the North Island to Auckland.","C":"The Isthmus of Suez and the Auckland Isthmus both connect two larger pieces of land across an expanse of water.","D":"The Isthmus of Suez is a land bridge, located in North Africa."},"a":"C"},{"s":"Rhetorical Synthesis","n":193,"p":"While researching a topic, a student has taken the following notes: • Receptors in the human tongue can detect sweetness, saltiness, sourness, bitterness, and umami. • Umami is a rich, savory flavor. • Umami is triggered by the compounds in a variety of foods, including ham and mushrooms. • Participants in a research study tasted samples of ma-konbu (a type of brown seaweed) collected from Hokkaido, Japan. • On average, they rated its umami intensity as high.","q":"The student wants to provide an example of a position in Cecchetti method ballet. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"In dance, some positions are for the dancer’s arms.","B":"Cecchetti method ballet includes several dance positions for the dancer’s arms.","C":"Third position is an example ofa position in Cecchetti method ballet.","D":"Body positions are an important part of dance, including Cecchetti method ballet."},"a":"C"},{"s":"Rhetorical Synthesis","n":194,"p":"While researching a topic, a student has taken the following notes: • A U-shaped curve in a river channel is called a meander. • A meander forms when water erodes sediment from one side of the riverbank and redeposits that sediment on the opposite side. • Meanders will gradually change shape and migrate downstream over time. • A river with high sinuosity has many meanders, and a river with low sinuosity has few. • The Willapa River in the United States has high sinuosity.","q":"The student wants to emphasize the umami intensity of ma-konbu. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Umami is a rich, savory flavor triggered by compounds in foods such as ham and mushrooms.","B":"Samples of ma-konbu, a brown seaweed, have been collected in Hokkaido, Japan.","C":"Umami is triggered by compounds in ma-konbu, ham, and mushrooms.","D":"Participants in a research study found the umami intensity of ma-konbu, a brown seaweed, to be high."},"a":"D"},{"s":"Rhetorical Synthesis","n":195,"p":"While researching a topic, a student has taken the following notes: • Modern Pueblo tribal nations were preceded by the Ancestral Puebloan civilization, which occupied parts of the southwestern US until approximately 1600 CE. • Keet Seel in northeastern Arizona is a former Ancestral Puebloan settlement inhabited from approximately 1250-1300 CE. • It was constructed in a natural cliff alcove and had multistory adobe and stone buildings. • These buildings had cube-shaped, contiguous rooms that surrounded kivas. • Kivas are round rooms typically used for ceremonial purposes and as gathering space","q":"The student wants to identify what causes meanders. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"The erosion and redepositing of sediment from one side of a riverbank to the other forms meanders, or curves, over time.","B":"High sinuosity is caused by the formation of many meanders, or curves, in a riverbank over time.","C":"Over time, many meanders have formed in the Willapa River, a river in the United States with high sinuosity.","D":"The meanders in the Willapa River will change shape and shift downstream over time."},"a":"A"},{"s":"Rhetorical Synthesis","n":196,"p":"While researching a topic, a student has taken the following notes: • Claude McKay (1890-1948) was a Jamaican American poet. • McKay also worked as a novelist and journalist. • \"Labor’s Day\" is a poem by McKay. • It was published in the September 1919 issue of The Messenger. • The Messenger was an influential Black literary magazine.","q":"The student wants to provide a detailed overview of the structures at Keet Seel. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Located in northeastern Arizona, Keet Seel was designed with kivas, round rooms that were typically used for ceremonial purposes and as gathering spaces.","B":"Keet Seel, whose structures were built by Ancestral Puebloans in northeastern Arizona, was inhabited from approximately 1250-1300 CE.","C":"Constructed in a natural cliff alcove, Keet Seel’s multistory adobe and stone buildings featured round rooms called kivas surrounded by cube-shaped, contiguous rooms.","D":"The Ancestral Puebloans used adobe and stone in the construction of Keet Seel in northeastern Arizona."},"a":"C"},{"s":"Rhetorical Synthesis","n":197,"p":"While researching a topic, a student has taken the following notes: • Brussels sprouts are vegetables that contain ascorbic acid, an essential nutrient for humans. • Cranberries are fruits that contain ascorbic acid. • There is 80 milligrams (mg) of ascorbic acid per every 100 grams (g) of brussels sprouts. • There is 13 mg of ascorbic acid per every 100 g of cranberries. • Humans cannot make ascorbic acid in their bodies, so they must get it from foods, including fruits and vegetables. • Ascorbic acid is also known as vitamin C.","q":"The student wants to provide an example of a poem by McKay. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"McKay was a Jamaican American poet, novelist, and journalist.","B":"One example of a poem by McKay is \"Labor’s Day\" (1919).","C":"McKay published poetry in a literary magazine called The Messenger.","D":"The Messenger was an influential Black literary magazine that published poetry."},"a":"B"},{"s":"Rhetorical Synthesis","n":198,"p":"While researching a topic, a student has taken the following notes: • Kale is a vegetable that contains ascorbic acid, an essential nutrient for humans. • Apricots are fruits that contain ascorbic acid. • There is 120 milligrams (mg) of ascorbic acid per every 100 grams (g) of kale. • There is 10 mg of ascorbic acid per every 100 g of apricot. • Humans cannot make ascorbic acid in their bodies, so they must get it from foods, including fruits and vegetables. • Ascorbic acid is also known as vitamin C.","q":"The student wants to refute a claim that cranberries are a better source of vitamin C than brussels sprouts are. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Brussels sprouts contain ascorbic acid (also known as vitamin C), and cranberries do too.","B":"Brussels sprouts contain vitamin C (also known as ascorbic acid); in fact, there is 80 mg of vitamin C in every 100 g of brussels sprouts.","C":"With 80 mg of vitamin C per every 100 g, brussels sprouts are actually a better source of vitamin C than cranberries, which contain only 13 mg per every 100 g.","D":"Humans cannot make ascorbic acid in their bodies, but they can get it from brussels sprouts and cranberries."},"a":"C"},{"s":"Rhetorical Synthesis","n":199,"p":"While researching a topic, a student has taken the following notes: • Snow hydrologist Julie Koeberle helps maintain automated snow measurement stations. • They are called SNOTEL sites. • There are around 90 stations throughout Wyoming. • One is at Bear Trap Meadow. • The data collected can help researchers make downstream water supply predictions.","q":"The student wants to refute a claim that apricots are a better source of vitamin C than kale is. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Kale contains vitamin C (also known as ascorbic acid); in fact, there is 120 mg of vitamin C in every 100 g of kale.","B":"Kale contains ascorbic acid (also known as vitamin C), and apricots do too.","C":"Humans cannot make ascorbic acid in their bodies, but they can get it from kale and apricots.","D":"With 120 mg of vitamin C per every 100 g, kale is actually a better source of vitamin C than apricots, which contain only 10 mg per every 100 g."},"a":"D"},{"s":"Rhetorical Synthesis","n":200,"p":"While researching a topic, a student has taken the following notes: • The nautical mile (6,076 feet) is the measure of distance used in seafaring navigation. • A nautical mile directly correlates to one minute (1/60th of a degree) of latitude. • The curvature of Earth affects the accurate measurement of long distances when using flat maps. • Measuring distances with latitude and longitude coordinates takes into account Earth’s curvature. • Mariners use nautical charts marked with latitude and longitude to quickly calculate distances and positions.","q":"Whích choice most effectively uses information from the given sentences to provide an example of a SNOTEL site?","o":{"A":"The data collected by SNOTEL sites can help researchers predict downstream water supplies.","B":"The SNOTEL site at Bear Trap Meadow is one of around 90 automated snow measurement stations in Wyoming.","C":"Snow hydrologist Julie Koeberle helps maintain automated snow monitoring stations known as SNOTEL sites.","D":"Located throughout Wyoming, SNOTEL sites monitor snow conditions."},"a":"B"},{"s":"Rhetorical Synthesis","n":201,"p":"While researching a topic, a student has taken the following notes: • India Arie is an African American singer and songwriter. • The media outlet BBC Music has described her music as a \"blend of hip hop, soul and folk [that is] as subtle as it [is] inspired.\" • Her acclaimed albums feature many talented musicians. • Judeth Insel played viola on her first studio album, Acoustic Soul (2001). • Ricky Quiñones played guitar on her second studio album, Voyage to India (2002).","q":"The student wants to explain why nautical miles are used to measure distances in seafaring navigation. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Nautical miles are a measure of distance equal to one minute of latitude, which is a feature nautical charts use to calculate distances and positions.","B":"Nautical charts use latitude and longitude to measure long distances; these charts are more accurate than flat maps for measuring distances in seafaring navigation because they account for Earth’s curvature.","C":"Since they directly correlate to the coordinates on nautical charts, which take into account Earth’s curvature, nautical miles are an efficient way to calculate distances at sea.","D":"Using nautical miles for navigation at sea takes Earth’s curvature into account, whereas measuring distances with latitude and longitude coordinates does not."},"a":"C"},{"s":"Rhetorical Synthesis","n":202,"p":"While researching a topic, a student has taken the following notes: • A supercontinent is a single landmass made up of most or all of Earth’s continents. • Over time, continents merge together to form supercontinents, which then break apart. • This process is believed to take hundreds of millions of years and is known as the supercontinent cycle. • Vaalbara was a supercontinent that formed about 3.6 billion years ago. • Euramerica was a supercontinent that formed about 300 million years ago.","q":"The student wants to emphasize a difference between Judeth Insel and Ricky Quiñones. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Judeth Insel played on India Arie’s first studio album, Acoustic Soul, which was released one year before her album Voyage to India.","B":"Both musicians have played on India Arie albums, but Judeth Insel played viola, whereas Ricky Quiñones played guitar.","C":"Acoustic Soul and Voyage to India, released in 2001 and 2002, respectively, are albums by singer and songwriter India Arie.","D":"Judeth Insel and Ricky Quiñones have both lent their musical talents to albums by India Arie."},"a":"B"},{"s":"Rhetorical Synthesis","n":203,"p":"While researching a topic, a student has taken the following notes: • Grimanesa Amoros is a Peruvian American artist well known for her LED light sculptures. • Uros Island (2011) is from her Uros series of works. • It is made of smooth multicolored LED domes. • Golden Connection (2013) is from her Huanchaco series of works. • It is made of entangled blue and white LED tubes.","q":"The student wants to emphasize the order in which the supercontinents were formed. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Vaalbara and Euramerica were both supercontinents, single landmasses made up of most or all of Earth’s continents.","B":"The supercontinent Euramerica formed long after the supercontinent Vaalbara.","C":"Forming and breaking apart over hundreds of millions of years, supercontinents are made up of most or all of Earth’s continents.","D":"Vaalbara formed about 3.6 billion years ago but eventually broke apart."},"a":"B"},{"s":"Rhetorical Synthesis","n":204,"p":"While researching a topic, a student has taken the following notes: • Refrigerants are chemical compounds used in cooling technologies, such as air conditioners. • Air conditioners can use refrigerants to absorb heat and release cold air • The refrigerant dichloromethane is a hydrochlorocarbon (HCC). • HCCs are composed of the elements hydrogen, chlorine, and carbon. • The refrigerant tetradecafluorohexane is a perfluorocarbon (PFC). • TPFCs are composed of fluorine and carbon.","q":"The student wants to emphasize a difference between Uros Island and Golden Connection. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Grimanesa Amoros often employs LED lights in her work, but the smooth LED domes of Uros Island stand in contrast to the tangled LED tubes of Golden Connection.","B":"Uros Island and Golden Connection are two LED light sculptures by well-known artist Grimanesa Amoros.","C":"In 2011, Grimanesa Amoros debuted Uros Island, a part of her Uros series.","D":"Many of Grimanesa Amoros’s sculptures, like Uros Island and Golden Connection, incorporate LED lights in the form of domes or tubes."},"a":"A"},{"s":"Rhetorical Synthesis","n":205,"p":"While researching a topic, a student has taken the following notes: • The A.M. Turing Award is a prestigious award given by the Association for Computing Machinery (ACM). • The ACM gives the award for \"major contributions of lasting importance to computing.\" • is named after groundbreaking British mathematician Alan Turing. • Raj Reddy won the award in 1994 for pioneering the development of large-scale artificial intelligence systems.","q":"The student wants to contrast dichloromethane and tetradecafluorohexane. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"Dichloromethane, a hydrochlorocarbon, is composed of hydrogen, chlorine, and carbon; tetradecafluorohexane, a perfluorocarbon, is composed of fluorine and carbon.","B":"Dichloromethane and tetradecafluorohexane are chemical compounds used in cooling technologies; the compounds are known as refrigerants.","C":"The hydrochlorocarbon dichloromethane and the perfluorocarbon tetradecafluorohexane are both refrigerants that can be used in cooling technologies like air conditioners.","D":"Tetradecafluorohexane, a refrigerant, can be used in cooling technologies to absorb heat and release cold air."},"a":"A"},{"s":"Rhetorical Synthesis","n":206,"p":"","q":"The student wants to explain whom the award is named for. Which choice most effectively uses relevant information from the notes to accomplish this goal?","o":{"A":"In 1994, Raj Reddy won the A.M. Turing Award for pioneering the development of large-scale artificial intelligence systems.","B":"The A.M. Turing Award is given for \"major contributions of lasting importance to computing.\"","C":"The A.M. Turing Award is named for groundbreaking British mathematician Alan Turing.","D":"It was in 1994 that Raj Reddy won the A.M. Turing Award."},"a":"C"}];

let questions = [];
let currentSection = 'all';
let currentMode = 'random';
let currentIdx = 0;
let order = [];
let correctCount = 0;
let wrongCount = 0;
let answered = {}; // idx -> {chosen, correct}

function buildOrder() {
  order = questions.map((_, i) => i);
  if (currentMode === 'random') {
    for (let i = order.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [order[i], order[j]] = [order[j], order[i]];
    }
  }
  currentIdx = 0;
  correctCount = 0;
  wrongCount = 0;
  answered = {};
}

function filterQuestions(section) {
  if (section === 'all') questions = RAW;
  else questions = RAW.filter(q => q.s === section);
}

function init() {
  filterQuestions(currentSection);
  buildOrder();
  renderCard();
  updateUI();
}

function renderCard() {
  const container = document.getElementById('card-container');
  const navRow = document.getElementById('nav-row');

  if (!questions.length) {
    container.innerHTML = `<div class="empty-state"><h2>No questions found</h2><p>Select a section above</p></div>`;
    navRow.style.display = 'none';
    return;
  }

  navRow.style.display = 'flex';
  const qi = order[currentIdx];
  const q = questions[qi];
  const ans = answered[currentIdx];

  const isRS = q.s === 'Rhetorical Synthesis';

  let passageHtml = '';
  if (q.p) {
    const passageText = escHtml(q.p);
    if (isRS) {
      passageHtml = `<div class="card-passage">
        <div class="notes-label">📝 Notes</div>
        ${passageText.replace(/• /g, '<br>• ').replace(/^<br>/, '')}
      </div>`;
    } else {
      passageHtml = `<div class="card-passage">${passageText}</div>`;
    }
  }

  const letters = ['A','B','C','D'];
  let optHtml = '';
  for (const letter of letters) {
    const optText = q.o[letter];
    if (!optText) continue;

    let cls = '';
    let disabled = ans ? 'disabled' : '';
    if (ans) {
      if (letter === q.a) cls = ans.chosen === letter ? 'correct' : 'reveal-correct';
      else if (letter === ans.chosen && ans.chosen !== q.a) cls = 'wrong';
    }

    optHtml += `<button class="option ${cls}" ${disabled} onclick="selectAnswer('${letter}')">
      <span class="letter">${letter}</span>
      <span class="option-text">${escHtml(optText)}</span>
    </button>`;
  }

  let feedbackHtml = '';
  if (ans) {
    if (ans.chosen === q.a) {
      feedbackHtml = `<div class="feedback-bar correct-fb show">✓ Correct! The answer is ${q.a}.</div>`;
    } else {
      feedbackHtml = `<div class="feedback-bar wrong-fb show">✗ Incorrect. The correct answer is <strong>${q.a}</strong>.</div>`;
    }
  }

  container.innerHTML = `<div class="card">
    <div class="card-header">
      <span class="q-num-badge">Q${q.n}</span>
      <span class="q-section-badge">${q.s}</span>
    </div>
    ${passageHtml}
    <div class="card-question">${escHtml(q.q)}</div>
    <div class="options">${optHtml}</div>
    ${feedbackHtml}
  </div>`;

  updateUI();
}

function selectAnswer(letter) {
  if (answered[currentIdx]) return;
  const qi = order[currentIdx];
  const q = questions[qi];
  const correct = letter === q.a;

  answered[currentIdx] = { chosen: letter, correct };
  if (correct) correctCount++; else wrongCount++;

  renderCard();
}

function nextQuestion() {
  if (currentIdx < order.length - 1) {
    currentIdx++;
    renderCard();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function prevQuestion() {
  if (currentIdx > 0) {
    currentIdx--;
    renderCard();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('btn-sequential').className = mode === 'sequential' ? 'btn btn-primary' : 'btn';
  document.getElementById('btn-random').className = mode === 'random' ? 'btn btn-primary' : 'btn';
  init();
}

function resetSession() {
  buildOrder();
  renderCard();
  updateUI();
}

function updateUI() {
  const total = questions.length;
  const done = Object.keys(answered).length;
  const pct = total ? (done / total * 100) : 0;

  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('hdr-progress').textContent = `${done} / ${total}`;
  document.getElementById('hdr-correct').textContent = `✓ ${correctCount}`;
  document.getElementById('hdr-wrong').textContent = `✗ ${wrongCount}`;

  document.getElementById('stat-total').textContent = `${total} questions`;
  document.getElementById('stat-correct').textContent = `${correctCount} correct`;
  document.getElementById('stat-wrong').textContent = `${wrongCount} wrong`;

  const pos = document.getElementById('nav-pos');
  if (pos) pos.textContent = `${currentIdx + 1} / ${total}`;
}

// Section buttons
document.querySelectorAll('.section-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.section-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSection = btn.dataset.section;
    init();
  });
});

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init
init();
</script>
</body>
</html>
